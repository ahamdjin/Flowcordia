name: Flowcordia launch campaign readiness

on:
  workflow_dispatch:
    inputs:
      application_commit_sha:
        description: Exact lowercase Flowcordia candidate commit on main
        required: true
        type: string
      confirmation:
        description: Type CHECK_FLOWCORDIA_LAUNCH_CAMPAIGN_READINESS
        required: true
        type: string

permissions: {}

concurrency:
  group: flowcordia-launch-campaign-readiness-${{ inputs.application_commit_sha }}
  cancel-in-progress: false

jobs:
  request:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      application_commit_sha: ${{ steps.validate.outputs.application_commit_sha }}
    steps:
      - name: Validate exact non-destructive campaign request
        id: validate
        shell: bash
        env:
          APPLICATION_COMMIT_SHA: ${{ inputs.application_commit_sha }}
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          set -euo pipefail
          [[ "$GITHUB_REF" == "refs/heads/main" ]]
          [[ "$APPLICATION_COMMIT_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$APPLICATION_COMMIT_SHA" == "$GITHUB_SHA" ]]
          [[ "$(printf '%s' "$APPLICATION_COMMIT_SHA" | grep -o . | sort -u | wc -l)" -gt 1 ]]
          [[ "$CONFIRMATION" == "CHECK_FLOWCORDIA_LAUNCH_CAMPAIGN_READINESS" ]]
          echo "application_commit_sha=$APPLICATION_COMMIT_SHA" >> "$GITHUB_OUTPUT"

  publication:
    needs: request
    if: github.ref == 'refs/heads/main'
    environment: flowcordia-self-host-release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      FLOWCORDIA_CAMPAIGN_CONFIRMATION: ${{ inputs.confirmation }}
      FLOWCORDIA_CAMPAIGN_ENVIRONMENT_REACHED: flowcordia-self-host-release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
          fetch-depth: 1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
      - name: Validate publication environment without publishing
        id: stage
        shell: bash
        env:
          APPLICATION_COMMIT_SHA: ${{ needs.request.outputs.application_commit_sha }}
        run: |
          set -euo pipefail
          output="$RUNNER_TEMP/flowcordia-launch-campaign-publication.json"
          node scripts/flowcordia-launch-campaign-readiness.mjs stage \
            --stage publication \
            --application-sha "$APPLICATION_COMMIT_SHA" \
            --output "$output"
          echo "path=$output" >> "$GITHUB_OUTPUT"
          echo "state=$(node -e 'console.log(JSON.parse(require("node:fs").readFileSync(process.argv[1], "utf8")).state)' "$output")" >> "$GITHUB_OUTPUT"
      - name: Preserve bounded publication readiness
        if: always() && steps.stage.outputs.path != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flowcordia-launch-campaign-stage-publication-${{ github.run_id }}
          path: ${{ steps.stage.outputs.path }}
          if-no-files-found: error
          retention-days: 14
          include-hidden-files: false
      - name: Enforce publication readiness
        if: steps.stage.outputs.state != 'READY'
        run: exit 1

  lifecycle:
    needs: request
    if: github.ref == 'refs/heads/main'
    environment: flowcordia-self-host-lifecycle
    runs-on:
      - self-hosted
      - linux
      - x64
      - flowcordia-release
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      FLOWCORDIA_CAMPAIGN_CONFIRMATION: ${{ inputs.confirmation }}
      FLOWCORDIA_CAMPAIGN_ENVIRONMENT_REACHED: flowcordia-self-host-lifecycle
      FLOWCORDIA_LIFECYCLE_CURRENT_CONFIG_FILE: ${{ vars.FLOWCORDIA_LIFECYCLE_CURRENT_CONFIG_FILE }}
      FLOWCORDIA_LIFECYCLE_CURRENT_SECRETS_FILE: ${{ secrets.FLOWCORDIA_LIFECYCLE_CURRENT_SECRETS_FILE }}
      FLOWCORDIA_LIFECYCLE_TARGET_CONFIG_FILE: ${{ vars.FLOWCORDIA_LIFECYCLE_TARGET_CONFIG_FILE }}
      FLOWCORDIA_LIFECYCLE_TARGET_SECRETS_FILE: ${{ secrets.FLOWCORDIA_LIFECYCLE_TARGET_SECRETS_FILE }}
      FLOWCORDIA_LIFECYCLE_WORK_PARENT: ${{ vars.FLOWCORDIA_LIFECYCLE_WORK_PARENT }}
      FLOWCORDIA_LIFECYCLE_EVIDENCE_DIR: ${{ vars.FLOWCORDIA_LIFECYCLE_EVIDENCE_DIR }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
          fetch-depth: 1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
      - name: Validate dedicated lifecycle runner and protected paths
        id: stage
        shell: bash
        env:
          APPLICATION_COMMIT_SHA: ${{ needs.request.outputs.application_commit_sha }}
        run: |
          set -euo pipefail
          output="$RUNNER_TEMP/flowcordia-launch-campaign-lifecycle.json"
          node scripts/flowcordia-launch-campaign-readiness.mjs stage \
            --stage lifecycle \
            --application-sha "$APPLICATION_COMMIT_SHA" \
            --output "$output"
          echo "path=$output" >> "$GITHUB_OUTPUT"
          echo "state=$(node -e 'console.log(JSON.parse(require("node:fs").readFileSync(process.argv[1], "utf8")).state)' "$output")" >> "$GITHUB_OUTPUT"
      - name: Preserve bounded lifecycle readiness
        if: always() && steps.stage.outputs.path != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flowcordia-launch-campaign-stage-lifecycle-${{ github.run_id }}
          path: ${{ steps.stage.outputs.path }}
          if-no-files-found: error
          retention-days: 14
          include-hidden-files: false
      - name: Enforce lifecycle readiness
        if: steps.stage.outputs.state != 'READY'
        run: exit 1

  provider:
    needs: request
    if: github.ref == 'refs/heads/main'
    environment: flowcordia-provider-readiness
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      FLOWCORDIA_CAMPAIGN_CONFIRMATION: ${{ inputs.confirmation }}
      FLOWCORDIA_CAMPAIGN_ENVIRONMENT_REACHED: flowcordia-provider-readiness
      FLOWCORDIA_APPLICATION_COMMIT_SHA: ${{ vars.FLOWCORDIA_APPLICATION_COMMIT_SHA }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      APP_ORIGIN: ${{ vars.APP_ORIGIN }}
      LOGIN_ORIGIN: ${{ vars.LOGIN_ORIGIN }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      MAGIC_LINK_SECRET: ${{ secrets.MAGIC_LINK_SECRET }}
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
      FLOWCORDIA_GITHUB_APP_ID: ${{ vars.FLOWCORDIA_GITHUB_APP_ID }}
      FLOWCORDIA_GITHUB_APP_SLUG: ${{ vars.FLOWCORDIA_GITHUB_APP_SLUG }}
      GITHUB_APP_PRIVATE_KEY: ${{ secrets.GITHUB_APP_PRIVATE_KEY }}
      GITHUB_APP_WEBHOOK_SECRET: ${{ secrets.GITHUB_APP_WEBHOOK_SECRET }}
      FLOWCORDIA_PROPOSAL_WORKER_ENABLED: ${{ vars.FLOWCORDIA_PROPOSAL_WORKER_ENABLED }}
      FLOWCORDIA_PROPOSAL_EVENT_URL: ${{ vars.FLOWCORDIA_PROPOSAL_EVENT_URL }}
      FLOWCORDIA_PROPOSAL_EVENT_SECRET: ${{ secrets.FLOWCORDIA_PROPOSAL_EVENT_SECRET }}
      FLOWCORDIA_PROPOSAL_WORKER_POLL_INTERVAL_MS: ${{ vars.FLOWCORDIA_PROPOSAL_WORKER_POLL_INTERVAL_MS }}
      FLOWCORDIA_PROPOSAL_WORKER_SHUTDOWN_GRACE_MS: ${{ vars.FLOWCORDIA_PROPOSAL_WORKER_SHUTDOWN_GRACE_MS }}
      FLOWCORDIA_PROPOSAL_EVENT_TIMEOUT_MS: ${{ vars.FLOWCORDIA_PROPOSAL_EVENT_TIMEOUT_MS }}
      FLOWCORDIA_PROPOSAL_OUTBOX_BATCH_SIZE: ${{ vars.FLOWCORDIA_PROPOSAL_OUTBOX_BATCH_SIZE }}
      FLOWCORDIA_PROPOSAL_OUTBOX_LEASE_MS: ${{ vars.FLOWCORDIA_PROPOSAL_OUTBOX_LEASE_MS }}
      FLOWCORDIA_PROPOSAL_RECONCILIATION_BATCH_SIZE: ${{ vars.FLOWCORDIA_PROPOSAL_RECONCILIATION_BATCH_SIZE }}
      FLOWCORDIA_PROPOSAL_RECONCILIATION_LEASE_MS: ${{ vars.FLOWCORDIA_PROPOSAL_RECONCILIATION_LEASE_MS }}
      FLOWCORDIA_PROPOSAL_RECONCILIATION_STALE_MS: ${{ vars.FLOWCORDIA_PROPOSAL_RECONCILIATION_STALE_MS }}
      FLOWCORDIA_PROPOSAL_RECONCILIATION_REFRESH_MS: ${{ vars.FLOWCORDIA_PROPOSAL_RECONCILIATION_REFRESH_MS }}
      FLOWCORDIA_PROPOSAL_GITHUB_TIMEOUT_MS: ${{ vars.FLOWCORDIA_PROPOSAL_GITHUB_TIMEOUT_MS }}
      EMAIL_TRANSPORT: ${{ vars.EMAIL_TRANSPORT }}
      FROM_EMAIL: ${{ vars.FROM_EMAIL }}
      REPLY_TO_EMAIL: ${{ vars.REPLY_TO_EMAIL }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      SMTP_HOST: ${{ vars.SMTP_HOST }}
      SMTP_PORT: ${{ vars.SMTP_PORT }}
      SMTP_SECURE: ${{ vars.SMTP_SECURE }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      OBJECT_STORE_DEFAULT_PROTOCOL: ${{ vars.OBJECT_STORE_DEFAULT_PROTOCOL }}
      OBJECT_STORE_BASE_URL: ${{ vars.OBJECT_STORE_BASE_URL }}
      OBJECT_STORE_BUCKET: ${{ vars.OBJECT_STORE_BUCKET }}
      OBJECT_STORE_ACCESS_KEY_ID: ${{ secrets.OBJECT_STORE_ACCESS_KEY_ID }}
      OBJECT_STORE_SECRET_ACCESS_KEY: ${{ secrets.OBJECT_STORE_SECRET_ACCESS_KEY }}
      OBJECT_STORE_S3_BASE_URL: ${{ vars.OBJECT_STORE_S3_BASE_URL }}
      OBJECT_STORE_S3_BUCKET: ${{ vars.OBJECT_STORE_S3_BUCKET }}
      OBJECT_STORE_S3_ACCESS_KEY_ID: ${{ secrets.OBJECT_STORE_S3_ACCESS_KEY_ID }}
      OBJECT_STORE_S3_SECRET_ACCESS_KEY: ${{ secrets.OBJECT_STORE_S3_SECRET_ACCESS_KEY }}
      FLOWCORDIA_PROVIDER_TEST_RECIPIENT: ${{ secrets.FLOWCORDIA_PROVIDER_TEST_RECIPIENT }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
          fetch-depth: 1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
      - name: Validate provider campaign configuration without provider calls
        id: stage
        shell: bash
        env:
          APPLICATION_COMMIT_SHA: ${{ needs.request.outputs.application_commit_sha }}
        run: |
          set -euo pipefail
          output="$RUNNER_TEMP/flowcordia-launch-campaign-provider.json"
          node scripts/flowcordia-launch-campaign-readiness.mjs stage \
            --stage provider \
            --application-sha "$APPLICATION_COMMIT_SHA" \
            --output "$output"
          echo "path=$output" >> "$GITHUB_OUTPUT"
          echo "state=$(node -e 'console.log(JSON.parse(require("node:fs").readFileSync(process.argv[1], "utf8")).state)' "$output")" >> "$GITHUB_OUTPUT"
      - name: Preserve bounded provider readiness
        if: always() && steps.stage.outputs.path != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flowcordia-launch-campaign-stage-provider-${{ github.run_id }}
          path: ${{ steps.stage.outputs.path }}
          if-no-files-found: error
          retention-days: 14
          include-hidden-files: false
      - name: Enforce provider readiness
        if: steps.stage.outputs.state != 'READY'
        run: exit 1

  alert:
    needs: request
    if: github.ref == 'refs/heads/main'
    environment: flowcordia-alert-readiness
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      FLOWCORDIA_CAMPAIGN_CONFIRMATION: ${{ inputs.confirmation }}
      FLOWCORDIA_CAMPAIGN_ENVIRONMENT_REACHED: flowcordia-alert-readiness
      FLOWCORDIA_APPLICATION_COMMIT_SHA: ${{ vars.FLOWCORDIA_APPLICATION_COMMIT_SHA }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      APP_ORIGIN: ${{ vars.APP_ORIGIN }}
      DEPLOY_REGISTRY_HOST: ${{ vars.DEPLOY_REGISTRY_HOST }}
      V4_DEPLOY_REGISTRY_HOST: ${{ vars.V4_DEPLOY_REGISTRY_HOST }}
      CLICKHOUSE_URL: ${{ secrets.CLICKHOUSE_URL }}
      ALERTS_WORKER_ENABLED: "true"
      ALERTS_WORKER_REDIS_HOST: ${{ vars.ALERTS_WORKER_REDIS_HOST }}
      ALERTS_WORKER_REDIS_PORT: ${{ vars.ALERTS_WORKER_REDIS_PORT }}
      ALERTS_WORKER_REDIS_USERNAME: ${{ secrets.ALERTS_WORKER_REDIS_USERNAME }}
      ALERTS_WORKER_REDIS_PASSWORD: ${{ secrets.ALERTS_WORKER_REDIS_PASSWORD }}
      ALERTS_WORKER_REDIS_TLS_DISABLED: ${{ vars.ALERTS_WORKER_REDIS_TLS_DISABLED }}
      ALERTS_WORKER_CONCURRENCY_WORKERS: ${{ vars.ALERTS_WORKER_CONCURRENCY_WORKERS }}
      ALERTS_WORKER_CONCURRENCY_TASKS_PER_WORKER: ${{ vars.ALERTS_WORKER_CONCURRENCY_TASKS_PER_WORKER }}
      ALERTS_WORKER_CONCURRENCY_LIMIT: ${{ vars.ALERTS_WORKER_CONCURRENCY_LIMIT }}
      ALERTS_WORKER_POLL_INTERVAL: ${{ vars.ALERTS_WORKER_POLL_INTERVAL }}
      ALERTS_WORKER_SHUTDOWN_TIMEOUT_MS: ${{ vars.ALERTS_WORKER_SHUTDOWN_TIMEOUT_MS }}
      ALERT_EMAIL_TRANSPORT: ${{ vars.ALERT_EMAIL_TRANSPORT }}
      ALERT_FROM_EMAIL: ${{ vars.ALERT_FROM_EMAIL }}
      ALERT_REPLY_TO_EMAIL: ${{ vars.ALERT_REPLY_TO_EMAIL }}
      ALERT_RESEND_API_KEY: ${{ secrets.ALERT_RESEND_API_KEY }}
      ALERT_SMTP_HOST: ${{ vars.ALERT_SMTP_HOST }}
      ALERT_SMTP_PORT: ${{ vars.ALERT_SMTP_PORT }}
      ALERT_SMTP_SECURE: ${{ vars.ALERT_SMTP_SECURE }}
      ALERT_SMTP_USER: ${{ secrets.ALERT_SMTP_USER }}
      ALERT_SMTP_PASSWORD: ${{ secrets.ALERT_SMTP_PASSWORD }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
          fetch-depth: 1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
      - name: Validate alert campaign configuration without sending a canary
        id: stage
        shell: bash
        env:
          APPLICATION_COMMIT_SHA: ${{ needs.request.outputs.application_commit_sha }}
        run: |
          set -euo pipefail
          output="$RUNNER_TEMP/flowcordia-launch-campaign-alert.json"
          node scripts/flowcordia-launch-campaign-readiness.mjs stage \
            --stage alert \
            --application-sha "$APPLICATION_COMMIT_SHA" \
            --output "$output"
          echo "path=$output" >> "$GITHUB_OUTPUT"
          echo "state=$(node -e 'console.log(JSON.parse(require("node:fs").readFileSync(process.argv[1], "utf8")).state)' "$output")" >> "$GITHUB_OUTPUT"
      - name: Preserve bounded alert readiness
        if: always() && steps.stage.outputs.path != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flowcordia-launch-campaign-stage-alert-${{ github.run_id }}
          path: ${{ steps.stage.outputs.path }}
          if-no-files-found: error
          retention-days: 14
          include-hidden-files: false
      - name: Enforce alert readiness
        if: steps.stage.outputs.state != 'READY'
        run: exit 1

  connected:
    needs: request
    if: github.ref == 'refs/heads/main'
    environment: flowcordia-acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      FLOWCORDIA_CAMPAIGN_CONFIRMATION: ${{ inputs.confirmation }}
      FLOWCORDIA_CAMPAIGN_ENVIRONMENT_REACHED: flowcordia-acceptance
      FLOWCORDIA_ACCEPTANCE_BASE_URL: ${{ secrets.FLOWCORDIA_ACCEPTANCE_BASE_URL }}
      FLOWCORDIA_ACCEPTANCE_PAYLOAD_JSON: ${{ secrets.FLOWCORDIA_ACCEPTANCE_PAYLOAD_JSON }}
      FLOWCORDIA_ACCEPTANCE_STORAGE_STATE_B64: ${{ secrets.FLOWCORDIA_ACCEPTANCE_STORAGE_STATE_B64 }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
          fetch-depth: 1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
      - name: Validate connected acceptance configuration without browser execution
        id: stage
        shell: bash
        env:
          APPLICATION_COMMIT_SHA: ${{ needs.request.outputs.application_commit_sha }}
        run: |
          set -euo pipefail
          output="$RUNNER_TEMP/flowcordia-launch-campaign-connected.json"
          node scripts/flowcordia-launch-campaign-readiness.mjs stage \
            --stage connected \
            --application-sha "$APPLICATION_COMMIT_SHA" \
            --output "$output"
          echo "path=$output" >> "$GITHUB_OUTPUT"
          echo "state=$(node -e 'console.log(JSON.parse(require("node:fs").readFileSync(process.argv[1], "utf8")).state)' "$output")" >> "$GITHUB_OUTPUT"
      - name: Preserve bounded connected readiness
        if: always() && steps.stage.outputs.path != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flowcordia-launch-campaign-stage-connected-${{ github.run_id }}
          path: ${{ steps.stage.outputs.path }}
          if-no-files-found: error
          retention-days: 14
          include-hidden-files: false
      - name: Enforce connected readiness
        if: steps.stage.outputs.state != 'READY'
        run: exit 1

  promotion:
    needs: request
    if: github.ref == 'refs/heads/main'
    environment: flowcordia-promotion-acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      FLOWCORDIA_CAMPAIGN_CONFIRMATION: ${{ inputs.confirmation }}
      FLOWCORDIA_CAMPAIGN_ENVIRONMENT_REACHED: flowcordia-promotion-acceptance
      FLOWCORDIA_ACCEPTANCE_BASE_URL: ${{ secrets.FLOWCORDIA_ACCEPTANCE_BASE_URL }}
      FLOWCORDIA_ACCEPTANCE_STORAGE_STATE_B64: ${{ secrets.FLOWCORDIA_ACCEPTANCE_STORAGE_STATE_B64 }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
          fetch-depth: 1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
      - name: Validate promotion configuration without merging
        id: stage
        shell: bash
        env:
          APPLICATION_COMMIT_SHA: ${{ needs.request.outputs.application_commit_sha }}
        run: |
          set -euo pipefail
          output="$RUNNER_TEMP/flowcordia-launch-campaign-promotion.json"
          node scripts/flowcordia-launch-campaign-readiness.mjs stage \
            --stage promotion \
            --application-sha "$APPLICATION_COMMIT_SHA" \
            --output "$output"
          echo "path=$output" >> "$GITHUB_OUTPUT"
          echo "state=$(node -e 'console.log(JSON.parse(require("node:fs").readFileSync(process.argv[1], "utf8")).state)' "$output")" >> "$GITHUB_OUTPUT"
      - name: Preserve bounded promotion readiness
        if: always() && steps.stage.outputs.path != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flowcordia-launch-campaign-stage-promotion-${{ github.run_id }}
          path: ${{ steps.stage.outputs.path }}
          if-no-files-found: error
          retention-days: 14
          include-hidden-files: false
      - name: Enforce promotion readiness
        if: steps.stage.outputs.state != 'READY'
        run: exit 1

  production:
    needs: request
    if: github.ref == 'refs/heads/main'
    environment: flowcordia-production-acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      FLOWCORDIA_CAMPAIGN_CONFIRMATION: ${{ inputs.confirmation }}
      FLOWCORDIA_CAMPAIGN_ENVIRONMENT_REACHED: flowcordia-production-acceptance
      FLOWCORDIA_PRODUCTION_ACCEPTANCE_BASE_URL: ${{ secrets.FLOWCORDIA_PRODUCTION_ACCEPTANCE_BASE_URL }}
      FLOWCORDIA_PRODUCTION_ACCEPTANCE_PAYLOAD_JSON: ${{ secrets.FLOWCORDIA_PRODUCTION_ACCEPTANCE_PAYLOAD_JSON }}
      FLOWCORDIA_PRODUCTION_ACCEPTANCE_STORAGE_STATE_B64: ${{ secrets.FLOWCORDIA_PRODUCTION_ACCEPTANCE_STORAGE_STATE_B64 }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
          fetch-depth: 1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
      - name: Validate production acceptance configuration without execution
        id: stage
        shell: bash
        env:
          APPLICATION_COMMIT_SHA: ${{ needs.request.outputs.application_commit_sha }}
        run: |
          set -euo pipefail
          output="$RUNNER_TEMP/flowcordia-launch-campaign-production.json"
          node scripts/flowcordia-launch-campaign-readiness.mjs stage \
            --stage production \
            --application-sha "$APPLICATION_COMMIT_SHA" \
            --output "$output"
          echo "path=$output" >> "$GITHUB_OUTPUT"
          echo "state=$(node -e 'console.log(JSON.parse(require("node:fs").readFileSync(process.argv[1], "utf8")).state)' "$output")" >> "$GITHUB_OUTPUT"
      - name: Preserve bounded production readiness
        if: always() && steps.stage.outputs.path != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flowcordia-launch-campaign-stage-production-${{ github.run_id }}
          path: ${{ steps.stage.outputs.path }}
          if-no-files-found: error
          retention-days: 14
          include-hidden-files: false
      - name: Enforce production readiness
        if: steps.stage.outputs.state != 'READY'
        run: exit 1

  webhook:
    needs: request
    if: github.ref == 'refs/heads/main'
    environment: flowcordia-webhook-acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      FLOWCORDIA_CAMPAIGN_CONFIRMATION: ${{ inputs.confirmation }}
      FLOWCORDIA_CAMPAIGN_ENVIRONMENT_REACHED: flowcordia-webhook-acceptance
      FLOWCORDIA_WEBHOOK_ACCEPTANCE_BASE_URL: ${{ secrets.FLOWCORDIA_WEBHOOK_ACCEPTANCE_BASE_URL }}
      FLOWCORDIA_WEBHOOK_ACCEPTANCE_PAYLOAD_JSON: ${{ secrets.FLOWCORDIA_WEBHOOK_ACCEPTANCE_PAYLOAD_JSON }}
      FLOWCORDIA_WEBHOOK_ACCEPTANCE_HMAC_SECRET: ${{ secrets.FLOWCORDIA_WEBHOOK_ACCEPTANCE_HMAC_SECRET }}
      FLOWCORDIA_WEBHOOK_ACCEPTANCE_STORAGE_STATE_B64: ${{ secrets.FLOWCORDIA_WEBHOOK_ACCEPTANCE_STORAGE_STATE_B64 }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
          fetch-depth: 1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
      - name: Validate webhook acceptance configuration without requests
        id: stage
        shell: bash
        env:
          APPLICATION_COMMIT_SHA: ${{ needs.request.outputs.application_commit_sha }}
        run: |
          set -euo pipefail
          output="$RUNNER_TEMP/flowcordia-launch-campaign-webhook.json"
          node scripts/flowcordia-launch-campaign-readiness.mjs stage \
            --stage webhook \
            --application-sha "$APPLICATION_COMMIT_SHA" \
            --output "$output"
          echo "path=$output" >> "$GITHUB_OUTPUT"
          echo "state=$(node -e 'console.log(JSON.parse(require("node:fs").readFileSync(process.argv[1], "utf8")).state)' "$output")" >> "$GITHUB_OUTPUT"
      - name: Preserve bounded webhook readiness
        if: always() && steps.stage.outputs.path != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flowcordia-launch-campaign-stage-webhook-${{ github.run_id }}
          path: ${{ steps.stage.outputs.path }}
          if-no-files-found: error
          retention-days: 14
          include-hidden-files: false
      - name: Enforce webhook readiness
        if: steps.stage.outputs.state != 'READY'
        run: exit 1

  rollback:
    needs: request
    if: github.ref == 'refs/heads/main'
    environment: flowcordia-rollback-acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      FLOWCORDIA_CAMPAIGN_CONFIRMATION: ${{ inputs.confirmation }}
      FLOWCORDIA_CAMPAIGN_ENVIRONMENT_REACHED: flowcordia-rollback-acceptance
      FLOWCORDIA_ROLLBACK_ACCEPTANCE_BASE_URL: ${{ secrets.FLOWCORDIA_ROLLBACK_ACCEPTANCE_BASE_URL }}
      FLOWCORDIA_ROLLBACK_ACCEPTANCE_STORAGE_STATE_B64: ${{ secrets.FLOWCORDIA_ROLLBACK_ACCEPTANCE_STORAGE_STATE_B64 }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
          fetch-depth: 1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
      - name: Validate rollback configuration without proposal mutation
        id: stage
        shell: bash
        env:
          APPLICATION_COMMIT_SHA: ${{ needs.request.outputs.application_commit_sha }}
        run: |
          set -euo pipefail
          output="$RUNNER_TEMP/flowcordia-launch-campaign-rollback.json"
          node scripts/flowcordia-launch-campaign-readiness.mjs stage \
            --stage rollback \
            --application-sha "$APPLICATION_COMMIT_SHA" \
            --output "$output"
          echo "path=$output" >> "$GITHUB_OUTPUT"
          echo "state=$(node -e 'console.log(JSON.parse(require("node:fs").readFileSync(process.argv[1], "utf8")).state)' "$output")" >> "$GITHUB_OUTPUT"
      - name: Preserve bounded rollback readiness
        if: always() && steps.stage.outputs.path != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flowcordia-launch-campaign-stage-rollback-${{ github.run_id }}
          path: ${{ steps.stage.outputs.path }}
          if-no-files-found: error
          retention-days: 14
          include-hidden-files: false
      - name: Enforce rollback readiness
        if: steps.stage.outputs.state != 'READY'
        run: exit 1

  dossier:
    needs: request
    if: github.ref == 'refs/heads/main'
    environment: flowcordia-release-evidence
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      FLOWCORDIA_CAMPAIGN_CONFIRMATION: ${{ inputs.confirmation }}
      FLOWCORDIA_CAMPAIGN_ENVIRONMENT_REACHED: flowcordia-release-evidence
      FLOWCORDIA_RELEASE_PR_APP_CLIENT_ID: ${{ vars.FLOWCORDIA_RELEASE_PR_APP_CLIENT_ID }}
      FLOWCORDIA_RELEASE_PR_APP_PRIVATE_KEY: ${{ secrets.FLOWCORDIA_RELEASE_PR_APP_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
          fetch-depth: 1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
      - name: Probe release-evidence GitHub App authentication
        id: app-token
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.FLOWCORDIA_RELEASE_PR_APP_CLIENT_ID }}
          private-key: ${{ secrets.FLOWCORDIA_RELEASE_PR_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - name: Probe repository installation without mutation
        id: app-probe
        if: steps.app-token.outcome == 'success'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh api "repos/$GITHUB_REPOSITORY" --jq '.full_name' >/dev/null
      - name: Validate dossier configuration without creating a branch or pull request
        id: stage
        shell: bash
        env:
          APPLICATION_COMMIT_SHA: ${{ needs.request.outputs.application_commit_sha }}
          FLOWCORDIA_CAMPAIGN_APP_TOKEN_READY: ${{ steps.app-token.outcome }}
          FLOWCORDIA_CAMPAIGN_APP_PROBE_READY: ${{ steps.app-probe.outcome }}
        run: |
          set -euo pipefail
          output="$RUNNER_TEMP/flowcordia-launch-campaign-dossier.json"
          node scripts/flowcordia-launch-campaign-readiness.mjs stage \
            --stage dossier \
            --application-sha "$APPLICATION_COMMIT_SHA" \
            --output "$output"
          echo "path=$output" >> "$GITHUB_OUTPUT"
          echo "state=$(node -e 'console.log(JSON.parse(require("node:fs").readFileSync(process.argv[1], "utf8")).state)' "$output")" >> "$GITHUB_OUTPUT"
      - name: Preserve bounded dossier readiness
        if: always() && steps.stage.outputs.path != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flowcordia-launch-campaign-stage-dossier-${{ github.run_id }}
          path: ${{ steps.stage.outputs.path }}
          if-no-files-found: error
          retention-days: 14
          include-hidden-files: false
      - name: Enforce dossier readiness
        if: steps.stage.outputs.state != 'READY'
        run: exit 1

  readiness:
    needs:
      - request
      - publication
      - lifecycle
      - provider
      - alert
      - connected
      - promotion
      - production
      - webhook
      - rollback
      - dossier
    if: always() && github.ref == 'refs/heads/main' && needs.request.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
          fetch-depth: 1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
      - name: Download exact stage evidence from this run
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: flowcordia-launch-campaign-stage-*-${{ github.run_id }}
          path: ${{ runner.temp }}/flowcordia-launch-campaign-stages
          merge-multiple: false
      - name: Assemble exact campaign readiness
        id: assemble
        shell: bash
        env:
          APPLICATION_COMMIT_SHA: ${{ needs.request.outputs.application_commit_sha }}
        run: |
          set -euo pipefail
          output="$RUNNER_TEMP/flowcordia-launch-campaign-readiness-$GITHUB_RUN_ID.json"
          node scripts/flowcordia-launch-campaign-readiness.mjs assemble \
            --application-sha "$APPLICATION_COMMIT_SHA" \
            --evidence-root "$RUNNER_TEMP/flowcordia-launch-campaign-stages" \
            --output "$output"
          echo "path=$output" >> "$GITHUB_OUTPUT"
          echo "state=$(node -e 'console.log(JSON.parse(require("node:fs").readFileSync(process.argv[1], "utf8")).state)' "$output")" >> "$GITHUB_OUTPUT"
      - name: Preserve sanitized campaign readiness
        if: always() && steps.assemble.outputs.path != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flowcordia-launch-campaign-readiness-${{ github.run_id }}
          path: ${{ steps.assemble.outputs.path }}
          if-no-files-found: error
          retention-days: 30
          include-hidden-files: false
      - name: Enforce exact READY campaign
        if: steps.assemble.outputs.state != 'READY'
        run: exit 1
