name: Finalize PR 101 formatting

on:
  push:
    branches:
      - agent/flowcordia-pr101-multi-workflow-proposal-closure

permissions:
  contents: write

concurrency:
  group: flowcordia-pr101-finalize-format
  cancel-in-progress: false

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout proposal branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: agent/flowcordia-pr101-multi-workflow-proposal-closure
          fetch-depth: 0
          persist-credentials: true

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
          cache: pnpm

      - name: Apply canonical formatting and remove helper
        shell: bash
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          pnpm exec oxfmt .
          git fetch origin main
          git checkout origin/main -- .github/workflows/code-quality.yml
          rm .github/workflows/pr101-finalize-format.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git diff --cached --quiet && { echo "No formatter changes to commit"; exit 1; }
          git commit -m "style: finalize PR 101 formatting"
          git push origin HEAD:agent/flowcordia-pr101-multi-workflow-proposal-closure
