name: Flowcordia PR95 format export

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/flowcordia-actions-runtime-compatibility.yml
      - .github/workflows/flowcordia-pr95-format-export.yml
      - apps/webapp/test/flowcordia/actionsRuntimeCompatibility.test.ts
      - flowcordia/runbooks/github-actions-runtime-compatibility.md
      - flowcordia/security/github-actions-upgrade-policy.md
      - scripts/flowcordia-actions-runtime-evidence.d.mts
      - scripts/flowcordia-actions-runtime-evidence.mjs

permissions:
  contents: read

jobs:
  format:
    if: >-
      github.repository == 'ahamdjin/Flowcordia' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
          cache: pnpm

      - name: Install exact dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply canonical formatting
        run: |
          pnpm exec oxfmt \
            .github/workflows/flowcordia-actions-runtime-compatibility.yml \
            apps/webapp/test/flowcordia/actionsRuntimeCompatibility.test.ts \
            flowcordia/runbooks/github-actions-runtime-compatibility.md \
            flowcordia/security/github-actions-upgrade-policy.md \
            scripts/flowcordia-actions-runtime-evidence.d.mts \
            scripts/flowcordia-actions-runtime-evidence.mjs
          git diff --check

      - name: Upload exact formatted files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flowcordia-pr95-formatted-${{ github.run_id }}
          path: |
            .github/workflows/flowcordia-actions-runtime-compatibility.yml
            apps/webapp/test/flowcordia/actionsRuntimeCompatibility.test.ts
            flowcordia/runbooks/github-actions-runtime-compatibility.md
            flowcordia/security/github-actions-upgrade-policy.md
            scripts/flowcordia-actions-runtime-evidence.d.mts
            scripts/flowcordia-actions-runtime-evidence.mjs
          if-no-files-found: error
          retention-days: 1
          include-hidden-files: true
