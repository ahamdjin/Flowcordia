name: Temporary Flowcordia PR 15 diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Print decoded runtime test section
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api /repos/${GITHUB_REPOSITORY}/actions/jobs/87734867568/logs > /tmp/hardening.log
          python - <<'PY'
          import re
          from pathlib import Path
          text = Path('/tmp/hardening.log').read_text(errors='replace')
          text = re.sub(r'\x1b\[[0-9;]*[A-Za-z]', '', text)
          marker = '> @flowcordia/runtime@0.1.0 test'
          start = text.find(marker)
          print(text[start:start + 12000] if start >= 0 else text[-12000:])
          PY
