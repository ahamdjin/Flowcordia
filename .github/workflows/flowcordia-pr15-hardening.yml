name: Temporary Flowcordia PR 15 diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Print focused validation errors
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api /repos/${GITHUB_REPOSITORY}/actions/jobs/87733994931/logs > /tmp/hardening.log
          grep -E "error TS[0-9]+:|FAIL |AssertionError|Expected:|Received:|Test Files|Tests |ERR_PNPM|Failed:" /tmp/hardening.log | tail -n 160 || true
