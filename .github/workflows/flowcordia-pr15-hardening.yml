name: Temporary Flowcordia PR 15 diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Print runtime module errors
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api /repos/${GITHUB_REPOSITORY}/actions/jobs/87734867568/logs > /tmp/hardening.log
          grep -E "Cannot find|does not provide|Failed to load|Transform failed|SyntaxError|TypeError|ReferenceError|Error:|Caused by|allowImportingTsExtensions|ERR_" /tmp/hardening.log | tail -n 160 || true
