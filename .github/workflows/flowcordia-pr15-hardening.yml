name: Temporary Flowcordia PR 15 hardening

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  harden:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: agent/flowcordia-custom-function-bridge
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 10.33.2
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20.20.2
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Apply guarded Studio edits
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def regex_replace(path: str, pattern: str, replacement: str):
              file = Path(path)
              text = file.read_text()
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise SystemExit(f"{path}: expected one semantic match, found {count}")
              file.write_text(updated)

          editor_test = "packages/flowcordia-workflow/test/editor.test.ts"
          regex_replace(
              editor_test,
              r'''    expect\(applyWorkflowEdit\(source, \{ type: "remove_node", nodeId: node\.id \}\)\)\.toMatchObject\(\{\n      success: false,\n      code: "developer_owned",\n    \}\);''',
              '''    const removed = applyWorkflowEdit(source, { type: "remove_node", nodeId: node.id });
            expect(removed.success).toBe(true);
            if (!removed.success) return;
            expect(removed.workflow.nodes.some((candidate) => candidate.id === node.id)).toBe(false);''',
          )

          ui = "apps/webapp/app/features/flowcordia/workflows/studio/WorkflowStudio.tsx"
          file = Path(ui)
          text = file.read_text()
          replacements = [
              (
                  "Behavior and configuration are owned by the referenced repository export. Studio can\n              move or rename this node but cannot rewrite or delete its code.",
                  "Implementation and configuration are owned by the referenced repository export. Studio\n              may move, rename, connect, or remove the workflow reference; every change still requires Git review.",
              ),
              (
                  '{lastTest.success ? "Preview passed" : "Preview failed"}',
                  '''{lastTest.success
                    ? graph?.nodes.some((node) => node.ownership === "developer")
                      ? "Structural preview passed"
                      : "Preview passed"
                    : "Preview failed"}''',
              ),
              (
                  '{WORKFLOW_STUDIO_NODE_TEMPLATES.map((template) => (',
                  '''{WORKFLOW_STUDIO_NODE_TEMPLATES.filter(
                          (template) => template.id !== "code_task"
                        ).map((template) => (''',
              ),
          ]
          for old, new in replacements:
              if text.count(old) != 1:
                  raise SystemExit(f"{ui}: expected one match for {old[:40]!r}, found {text.count(old)}")
              text = text.replace(old, new)
          file.write_text(text)

          regex_replace(
              ui,
              r'''          \{node\.ownership === "visual" && \(\n            <Button\n              className="w-full justify-center"\n              variant="secondary/small"\n              disabled=\{busy\}\n              onClick=\{\(\) => onCommand\(\{ type: "remove_node", nodeId: node\.id \}\)\}\n            >\n              Remove node\n            </Button>\n          \)\}''',
              '''          <Button
            className="w-full justify-center"
            variant="secondary/small"
            disabled={busy}
            onClick={() => onCommand({ type: "remove_node", nodeId: node.id })}
          >
            Remove node
          </Button>''',
          )

          Path(".github/workflows/flowcordia-pr15-hardening.yml").unlink()
          Path("flowcordia/.pr15-hardening-trigger").unlink()
          PY
      - name: Format intended files
        run: |
          pnpm exec oxfmt --write \
            apps/webapp/app/features/flowcordia/workflows/studio/WorkflowStudio.tsx \
            packages/flowcordia-workflow/src/function-schema.ts \
            packages/flowcordia-workflow/src/functions.ts \
            packages/flowcordia-workflow/src/editor.ts \
            packages/flowcordia-workflow/src/index.ts \
            packages/flowcordia-workflow/test/editor.test.ts \
            packages/flowcordia-workflow/test/functions.test.ts \
            packages/flowcordia-workflow/schema/functions-0.1.json \
            packages/flowcordia-runtime/src/compiler.ts \
            packages/flowcordia-runtime/src/runtime.ts \
            packages/flowcordia-runtime/src/types.ts \
            packages/flowcordia-runtime/test/function-contract.test.ts \
            packages/flowcordia-runtime/test/reference-repository.test.ts \
            packages/flowcordia-runtime/test/fixtures/reference-repository/src/functions/qualifyLead.ts \
            packages/flowcordia-runtime/test/fixtures/reference-repository/trigger-sdk.d.ts \
            packages/flowcordia-runtime/tsconfig.test.json
      - name: Validate focused packages
        run: |
          pnpm --filter @flowcordia/workflow typecheck
          pnpm --filter @flowcordia/workflow test -- --run
          pnpm --filter @flowcordia/runtime typecheck
          pnpm --filter @flowcordia/runtime test -- --run
      - name: Commit validated hardening
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Harden repository function contracts and workflow references"
          git push origin HEAD:agent/flowcordia-custom-function-bridge
