name: Workflow Checks

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
      - ".github/zizmor.yml"
      - ".github/actionlint.yaml"
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
      - ".github/zizmor.yml"
      - ".github/actionlint.yaml"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: Actionlint
    runs-on: ${{ vars.FLOWCORDIA_CI_RUNNER_SMALL || 'ubuntu-latest' }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: docker://rhysd/actionlint:1.7.12@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667

  zizmor:
    name: Zizmor
    # The audit runs in every repository and blocks low-or-higher findings.
    # SARIF upload is opt-in because private repositories require GitHub
    # Advanced Security. Set ENABLE_WORKFLOW_SECURITY_SCAN='true' to publish
    # results to the Security tab; otherwise findings remain in the job log.
    runs-on: ${{ vars.FLOWCORDIA_CI_RUNNER_SMALL || 'ubuntu-latest' }}
    permissions:
      security-events: write # Used only when SARIF upload is explicitly enabled
      contents: read # Read workflow files for analysis
      actions: read # Read workflow run metadata
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          min-severity: low
          advanced-security: ${{ vars.ENABLE_WORKFLOW_SECURITY_SCAN == 'true' }}
