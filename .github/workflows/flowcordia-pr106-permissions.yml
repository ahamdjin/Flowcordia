name: Fix PR 106 approval reviewer permissions

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  fix:
    if: ${{ github.head_ref == 'agent/flowcordia-pr105-human-approval' && github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout proposal branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: agent/flowcordia-pr105-human-approval
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
          cache: pnpm

      - name: Apply permission corrections
        shell: bash
        run: |
          set -euo pipefail
          diagnostic="$RUNNER_TEMP/flowcordia-pr106-permissions.log"
          if ! python3 - <<'PY' >"$diagnostic" 2>&1
          from pathlib import Path

          def read(path: str) -> str:
              return Path(path).read_text()

          def write(path: str, text: str) -> None:
              Path(path).write_text(text)

          def replace(path: str, old: str, new: str, count: int = 1) -> None:
              text = read(path)
              actual = text.count(old)
              if actual != count:
                  raise SystemExit(f"{path}: expected {count}, found {actual}: {old[:140]!r}")
              write(path, text.replace(old, new))

          repository = "apps/webapp/app/features/flowcordia/workflows/approval/repository.server.ts"
          text = read(repository)
          start = text.index("function receiptItem(")
          end = text.index("export async function queryFlowcordiaApprovalInbox")
          public_projection = text[start:end]
          actor_line = "    decidedByUserId: receipt.decidedByUserId,\n"
          if public_projection.count(actor_line) != 1:
              raise SystemExit("Expected one public actor projection line.")
          public_projection = public_projection.replace(actor_line, "")
          text = text[:start] + public_projection + text[end:]
          null_actor = "        decidedByUserId: null,\n"
          if text.count(null_actor) != 1:
              raise SystemExit("Expected one empty public actor projection line.")
          write(repository, text.replace(null_actor, ""))

          route = "apps/webapp/app/routes/_app.orgs.$organizationSlug.projects.$projectParam.env.$envParam.flowcordia.workflows/route.tsx"
          permission_block = "\n".join([
              "      const approvalInboxWithPermissions = {",
              "        ...approvalInbox,",
              "        items: approvalInbox.items.map((item) => ({",
              "          ...item,",
              '          canDecide: ability.can("write", { type: "waitpoints", id: item.waitpointId }),',
              "        })),",
              "      };",
              "      const canTriggerPreview",
          ])
          replace(route, "      const canTriggerPreview", permission_block)
          replace(
              route,
              "        approvalInbox,\n        canDecideApprovals: canWrite,\n",
              "        approvalInbox: approvalInboxWithPermissions,\n",
          )
          replace(route, "          canDecideApprovals: false,\n", "")
          replace(route, "                    canDecide={data.canDecideApprovals}\n", "")

          panel = "apps/webapp/app/features/flowcordia/workflows/approval/WorkflowApprovalInboxPanel.tsx"
          attempt_block = "\n".join([
              "type ApprovalAttempt = {",
              "  requestId: string;",
              '  decision: "approved" | "rejected";',
              "};",
              "",
          ])
          permission_types = attempt_block + "\n".join([
              "type ApprovalInboxItem = FlowcordiaApprovalInboxItem & { canDecide: boolean };",
              'type ApprovalInboxProjection = Omit<FlowcordiaApprovalInboxProjection, "items"> & {',
              "  items: ApprovalInboxItem[];",
              "};",
              "",
          ])
          replace(panel, attempt_block, permission_types)
          replace(panel, "  canDecide,\n", "", count=2)
          replace(panel, "  canDecide: boolean;\n", "", count=2)
          replace(panel, "  item: FlowcordiaApprovalInboxItem;\n", "  item: ApprovalInboxItem;\n")
          replace(panel, "  inbox: FlowcordiaApprovalInboxProjection;\n", "  inbox: ApprovalInboxProjection;\n")
          replace(panel, "    canDecide &&\n", "    item.canDecide &&\n")
          replace(
              panel,
              "              disabled={!canDecide || busy || attempt !== null}\n",
              "              disabled={!item.canDecide || busy || attempt !== null}\n",
          )
          replace(panel, "          {!canDecide && (\n", "          {!item.canDecide && (\n")
          replace(panel, "              canDecide={canDecide}\n", "")

          command_route = "apps/webapp/app/routes/resources.orgs.$organizationSlug.projects.$projectParam.env.$envParam.flowcordia.workflow-approvals/route.ts"
          replace(
              command_route,
              '    authorization: { action: "write", resource: { type: "github" } },',
              '    authorization: { action: "read", resource: { type: "github" } },',
          )
          PY
          then
            tail -n 80 "$diagnostic" > .github/flowcordia-pr106-permissions-diagnostic.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/flowcordia-pr106-permissions-diagnostic.txt
            git commit -m "chore: record PR 106 permission diagnostic"
            git push origin HEAD:agent/flowcordia-pr105-human-approval
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Generate Prisma client
        run: pnpm --filter @trigger.dev/database generate

      - name: Format corrected files
        run: >-
          pnpm exec oxfmt --write
          apps/webapp/app/features/flowcordia/workflows/approval/WorkflowApprovalInboxPanel.tsx
          apps/webapp/app/features/flowcordia/workflows/approval/repository.server.ts
          apps/webapp/app/routes/_app.orgs.$organizationSlug.projects.$projectParam.env.$envParam.flowcordia.workflows/route.tsx
          apps/webapp/app/routes/resources.orgs.$organizationSlug.projects.$projectParam.env.$envParam.flowcordia.workflow-approvals/route.ts

      - name: Validate permission corrections
        run: |
          pnpm --filter webapp test --run \
            test/flowcordia/approvalDecision.test.ts \
            test/flowcordia/approvalInboxPresentation.test.ts \
            test/flowcordia/workflowStudioApprovalConfiguration.test.ts
          pnpm typecheck --filter webapp

      - name: Commit permanent permission corrections
        shell: bash
        run: |
          set -euo pipefail
          git rm -f --ignore-unmatch \
            .github/flowcordia-pr106-permissions-diagnostic.txt \
            .github/workflows/flowcordia-pr106-permissions.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix: separate approval authority from repository writes"
          git push origin HEAD:agent/flowcordia-pr105-human-approval
