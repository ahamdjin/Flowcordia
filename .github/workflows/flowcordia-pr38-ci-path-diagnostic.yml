name: "Flowcordia PR38 CI path diagnostic"

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/flowcordia-pr38-ci-path-diagnostic.yml"

permissions:
  contents: read

jobs:
  locate:
    if: github.head_ref == 'agent/flowcordia-pr38-connected-acceptance-harness'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: false

      - name: Collect PR Checks workflow
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p diagnostics
          path="$(grep -R -l 'dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d' .github/workflows | head -n 1)"
          test -n "$path"
          printf '%s\n' "$path" > diagnostics/path.txt
          cp "$path" diagnostics/workflow.yml

      - name: Upload workflow source
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flowcordia-pr38-ci-path-diagnostic
          path: diagnostics
          retention-days: 1
