name: Trigger PR 102 builder

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: flowcordia-pr102-pull-request-builder
  cancel-in-progress: false

jobs:
  build:
    if: github.head_ref == 'agent/flowcordia-pr102-closure-deployment-proof' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: agent/flowcordia-pr102-closure-deployment-proof
          fetch-depth: 0
          persist-credentials: true

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
          cache: pnpm

      - name: Execute validated branch builder
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          from pathlib import Path
          from textwrap import dedent

          source = Path('.github/workflows/pr102-build.yml').read_text()
          source = source.replace("'  ProposalListQuery,\\n'", "'  ProposalAuditEventInput,\\n'", 1)
          source = source.replace(
              "'  ProposalClosureIdentity,\\n  ProposalListQuery,\\n'",
              "'  ProposalAuditEventInput,\\n  ProposalClosureIdentity,\\n'",
              1,
          )
          marker = '        run: |\n'
          if source.count(marker) != 1:
              raise SystemExit('Expected one builder run block.')
          script = dedent(source.split(marker, 1)[1])
          exact_helper = '''def replace(path, old, new):
              text = read(path)
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one replacement, found {count}: {old[:100]!r}")
              write(path, text.replace(old, new))
          '''
          normalized_helper = '''def replace(path, old, new):
              text = read(path)
              count = text.count(old)
              if count == 1:
                  write(path, text.replace(old, new))
                  return
              if (
                  count == 2
                  and old == '["WAITING_FOR_DEPLOYMENT", "DEPLOYING"].includes(preview.state)'
              ):
                  write(path, text.replace(old, new))
                  return
              old_lines = old.splitlines()
              text_lines = text.splitlines(keepends=True)
              matches = []
              for index in range(len(text_lines) - len(old_lines) + 1):
                  candidate = text_lines[index : index + len(old_lines)]
                  if [line.strip() for line in candidate] == [line.strip() for line in old_lines]:
                      matches.append(index)
              if len(matches) != 1:
                  raise SystemExit(
                      f"{path}: expected one replacement, found {count} exact and {len(matches)} normalized: {old[:100]!r}"
                  )
              index = matches[0]
              start = sum(len(line) for line in text_lines[:index])
              end = start + sum(len(line) for line in text_lines[index : index + len(old_lines)])
              write(path, text[:start] + new + text[end:])
          '''
          if script.count(exact_helper) != 1:
              raise SystemExit('Builder replacement helper changed unexpectedly.')
          script = script.replace(exact_helper, normalized_helper)
          Path('/tmp/flowcordia-pr102-build.sh').write_text(script)
          PY
          rm .github/workflows/pr102-build-pr.yml
          rm -f flowcordia/pr102-builder-error.txt
          if ! bash /tmp/flowcordia-pr102-build.sh > /tmp/flowcordia-pr102-build.log 2>&1; then
            git checkout HEAD -- .github/workflows/pr102-build.yml .github/workflows/pr102-build-pr.yml
            tail -n 80 /tmp/flowcordia-pr102-build.log > flowcordia/pr102-builder-error.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add flowcordia/pr102-builder-error.txt
            git commit -m "ci: record PR 102 builder failure"
            git push origin HEAD:agent/flowcordia-pr102-closure-deployment-proof
            exit 1
          fi
