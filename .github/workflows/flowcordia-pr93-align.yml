name: Flowcordia PR93 align campaign readiness

on:
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: flowcordia-pr93-align-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  align:
    if: github.head_ref == 'agent/flowcordia-pr92-launch-campaign-readiness'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: true
          fetch-depth: 1
      - name: Publish exact pre-cleanup tree identity
        shell: bash
        run: |
          set -euo pipefail
          path='flowcordia/.tmp/pr93-base-tree-sha.txt'
          mkdir -p "$(dirname "$path")"
          git rev-parse 'HEAD^{tree}' > "$path"
          git add "$path"
          git config user.name flowcordia-launch-readiness
          git config user.email flowcordia-launch-readiness@users.noreply.github.com
          git commit -m 'Record exact PR93 cleanup tree identity'
          git push origin "HEAD:refs/heads/${GITHUB_HEAD_REF}"
