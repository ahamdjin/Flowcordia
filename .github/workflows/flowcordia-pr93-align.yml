name: Flowcordia PR93 align campaign readiness

on:
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: flowcordia-pr93-align-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  align:
    if: github.head_ref == 'agent/flowcordia-pr92-launch-campaign-readiness'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: true
          fetch-depth: 1
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
          cache: pnpm
      - name: Install exact dependencies
        run: pnpm install --frozen-lockfile
      - name: Align readiness with official provider and alert contracts
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          from pathlib import Path

          script = Path("scripts/flowcordia-launch-campaign-readiness.mjs")
          text = script.read_text(encoding="utf-8")
          replacements = [
              (
                  '''function postgresUrl(value) {
  if (!boundedString(value, 12, 8192)) return false;
  try {
    const url = new URL(value);
    return ["postgres:", "postgresql:"].includes(url.protocol) && url.hostname.length > 0;
  } catch {
    return false;
  }
}

function redisHost(value) {''',
                  '''function httpServiceUrl(value, allowCredentials = false) {
  if (!boundedString(value, 8, 8192)) return false;
  try {
    const url = new URL(value);
    return (
      ["http:", "https:"].includes(url.protocol) &&
      url.hostname.length > 0 &&
      url.hash === "" &&
      (allowCredentials || (url.username === "" && url.password === ""))
    );
  } catch {
    return false;
  }
}

function registryHost(value) {
  if (!boundedString(value, 1, 512) || value.includes("://")) return false;
  try {
    const url = new URL(`https://${value}`);
    return (
      url.hostname.length > 0 &&
      url.username === "" &&
      url.password === "" &&
      url.pathname === "/" &&
      url.search === "" &&
      url.hash === ""
    );
  } catch {
    return false;
  }
}

function integerSetting(value, fallback, minimum, maximum) {
  if (value === undefined || value === "") return fallback;
  if (!positiveIntegerString(value, minimum, maximum)) return null;
  return Number(value);
}

function postgresUrl(value) {
  if (!boundedString(value, 12, 8192)) return false;
  try {
    const url = new URL(value);
    return ["postgres:", "postgresql:"].includes(url.protocol) && url.hostname.length > 0;
  } catch {
    return false;
  }
}

function redisHost(value) {''',
              ),
              (
                  '''function emailProviderReady(environment, prefix = "") {
  const transport = environment[`${prefix}EMAIL_TRANSPORT`];
  const sender = environment[`${prefix}FROM_EMAIL`];
  const reply = environment[`${prefix}REPLY_TO_EMAIL`];
  if (!EMAIL.test(sender ?? "") || (reply && !EMAIL.test(reply))) return false;
  if (transport === "resend") {
    return boundedSecret(environment[`${prefix}RESEND_API_KEY`], 16, 4096);
  }
  if (transport === "smtp") {
    return (
      redisHost(environment[`${prefix}SMTP_HOST`]) &&
      positiveIntegerString(environment[`${prefix}SMTP_PORT`], 1, 65535) &&
      exactBoolean(environment[`${prefix}SMTP_SECURE`]) &&
      boundedString(environment[`${prefix}SMTP_USER`], 1, 512) &&
      boundedSecret(environment[`${prefix}SMTP_PASSWORD`], 8, 4096)
    );
  }
  if (transport === "aws-ses") {
    const regionReady = boundedString(environment.AWS_REGION, 3, 64);
    const access = environment.AWS_ACCESS_KEY_ID;
    const secret = environment.AWS_SECRET_ACCESS_KEY;
    return (
      regionReady &&
      ((!access && !secret) || (boundedString(access, 12, 256) && boundedSecret(secret, 16, 4096)))
    );
  }
  return false;
}

function alertEmailProviderReady(environment) {
  const transport = environment.ALERT_EMAIL_TRANSPORT;
  if (
    !EMAIL.test(environment.ALERT_FROM_EMAIL ?? "") ||
    (environment.ALERT_REPLY_TO_EMAIL && !EMAIL.test(environment.ALERT_REPLY_TO_EMAIL))
  ) {
    return false;
  }
  if (transport === "resend") {
    return boundedSecret(environment.ALERT_RESEND_API_KEY, 16, 4096);
  }
  if (transport === "smtp") {
    return (
      redisHost(environment.ALERT_SMTP_HOST) &&
      positiveIntegerString(environment.ALERT_SMTP_PORT, 1, 65535) &&
      exactBoolean(environment.ALERT_SMTP_SECURE) &&
      boundedString(environment.ALERT_SMTP_USER, 1, 512) &&
      boundedSecret(environment.ALERT_SMTP_PASSWORD, 8, 4096)
    );
  }
  if (transport === "aws-ses") {
    return boundedString(environment.AWS_REGION, 3, 64);
  }
  return false;
}

function objectStoreReady(environment) {
  const inheritedBucket = environment.OBJECT_STORE_BUCKET;
  const inheritedBase = environment.OBJECT_STORE_BASE_URL;
  const s3Bucket = environment.OBJECT_STORE_S3_BUCKET;
  const s3Base = environment.OBJECT_STORE_S3_BASE_URL;
  const bucket = inheritedBucket || s3Bucket;
  const base = inheritedBase || s3Base;
  if (!boundedString(bucket, 3, 255) || !boundedString(base, 8, 2048)) return false;
  let baseReady = false;
  try {
    const url = new URL(base);
    baseReady = ["https:", "http:"].includes(url.protocol) && url.hostname.length > 0;
  } catch {
    baseReady = false;
  }
  const access =
    environment.OBJECT_STORE_ACCESS_KEY_ID || environment.OBJECT_STORE_S3_ACCESS_KEY_ID;
  const secret =
    environment.OBJECT_STORE_SECRET_ACCESS_KEY || environment.OBJECT_STORE_S3_SECRET_ACCESS_KEY;
  return (
    baseReady &&
    ((!access && !secret) || (boundedString(access, 3, 512) && boundedSecret(secret, 8, 4096)))
  );
}''',
                  '''function pairedOptionalCredentials(user, password) {
  const hasUser = boundedString(user, 1, 512);
  const hasPassword = boundedSecret(password, 8, 4096);
  return (!user && !password) || (hasUser && hasPassword);
}

function emailProviderReady(environment, prefix = "") {
  const transport = environment[`${prefix}EMAIL_TRANSPORT`];
  const sender = environment[`${prefix}FROM_EMAIL`];
  const reply = environment[`${prefix}REPLY_TO_EMAIL`];
  if (!EMAIL.test(sender ?? "") || !EMAIL.test(reply ?? "")) return false;
  if (transport === "resend") {
    return boundedSecret(environment[`${prefix}RESEND_API_KEY`], 16, 4096);
  }
  if (transport === "smtp") {
    return (
      boundedString(environment[`${prefix}SMTP_HOST`], 1, 512) &&
      positiveIntegerString(environment[`${prefix}SMTP_PORT`], 1, 65535) &&
      pairedOptionalCredentials(
        environment[`${prefix}SMTP_USER`],
        environment[`${prefix}SMTP_PASSWORD`]
      )
    );
  }
  if (transport === "aws-ses") {
    return (
      boundedString(environment.AWS_REGION, 3, 64) &&
      boundedString(environment.AWS_ACCESS_KEY_ID, 12, 256) &&
      boundedSecret(environment.AWS_SECRET_ACCESS_KEY, 16, 4096)
    );
  }
  return false;
}

function alertEmailProviderReady(environment) {
  const transport = environment.ALERT_EMAIL_TRANSPORT;
  if (!transport) return true;
  if (
    !EMAIL.test(environment.ALERT_FROM_EMAIL ?? "") ||
    !EMAIL.test(environment.ALERT_REPLY_TO_EMAIL ?? "")
  ) {
    return false;
  }
  if (transport === "resend") {
    return boundedSecret(environment.ALERT_RESEND_API_KEY, 16, 4096);
  }
  if (transport === "smtp") {
    return (
      boundedString(environment.ALERT_SMTP_HOST, 1, 512) &&
      positiveIntegerString(environment.ALERT_SMTP_PORT, 1, 65535) &&
      pairedOptionalCredentials(environment.ALERT_SMTP_USER, environment.ALERT_SMTP_PASSWORD)
    );
  }
  return false;
}

function objectStoreReady(environment) {
  const protocol = environment.OBJECT_STORE_DEFAULT_PROTOCOL;
  if (protocol && protocol !== "s3") return false;
  const prefix = protocol === "s3" ? "OBJECT_STORE_S3_" : "OBJECT_STORE_";
  const base = environment[`${prefix}BASE_URL`];
  const bucket = environment[`${prefix}BUCKET`];
  const access = environment[`${prefix}ACCESS_KEY_ID`];
  const secret = environment[`${prefix}SECRET_ACCESS_KEY`];
  const staticCredentials =
    boundedString(access, 3, 512) && boundedSecret(secret, 8, 4096);
  const awsCredentialChain =
    boundedString(environment.AWS_ACCESS_KEY_ID, 12, 256) &&
    boundedSecret(environment.AWS_SECRET_ACCESS_KEY, 16, 4096);
  return (
    httpServiceUrl(base) &&
    boundedString(bucket, 3, 255) &&
    Boolean(staticCredentials || awsCredentialChain)
  );
}

function alertWorkerConfiguration(environment) {
  const host = environment.ALERTS_WORKER_REDIS_HOST;
  const port = integerSetting(environment.ALERTS_WORKER_REDIS_PORT, 6379, 1, 65535);
  const tlsDisabled = environment.ALERTS_WORKER_REDIS_TLS_DISABLED || "false";
  const workers = integerSetting(environment.ALERTS_WORKER_CONCURRENCY_WORKERS, 1, 1, 64);
  const tasksPerWorker = integerSetting(
    environment.ALERTS_WORKER_CONCURRENCY_TASKS_PER_WORKER,
    10,
    1,
    100
  );
  const concurrencyLimit = integerSetting(
    environment.ALERTS_WORKER_CONCURRENCY_LIMIT,
    10,
    1,
    1000
  );
  const pollInterval = integerSetting(
    environment.ALERTS_WORKER_POLL_INTERVAL,
    1000,
    50,
    60000
  );
  const shutdownTimeout = integerSetting(
    environment.ALERTS_WORKER_SHUTDOWN_TIMEOUT_MS,
    60000,
    5000,
    300000
  );
  const redisReady =
    environment.ALERTS_WORKER_ENABLED === "true" &&
    redisHost(host) &&
    port !== null &&
    ["true", "false"].includes(tlsDisabled);
  const limitsReady =
    workers !== null &&
    tasksPerWorker !== null &&
    concurrencyLimit !== null &&
    concurrencyLimit >= Math.min(workers * tasksPerWorker, 1000) &&
    pollInterval !== null &&
    shutdownTimeout !== null &&
    shutdownTimeout > pollInterval;
  return { redisReady, limitsReady };
}''',
              ),
              (
                  '''  if (stage === "alert") {
    const workerNumbers = [
      "ALERTS_WORKER_CONCURRENCY_WORKERS",
      "ALERTS_WORKER_CONCURRENCY_TASKS_PER_WORKER",
      "ALERTS_WORKER_CONCURRENCY_LIMIT",
      "ALERTS_WORKER_POLL_INTERVAL",
      "ALERTS_WORKER_SHUTDOWN_TIMEOUT_MS",
    ];
    checks.push(''',
                  '''  if (stage === "alert") {
    const worker = alertWorkerConfiguration(environment);
    checks.push(''',
              ),
              (
                  '''        safeHttpsUrl(environment.APP_ORIGIN) &&
          safeHttpsUrl(environment.DEPLOY_REGISTRY_HOST) &&
          safeHttpsUrl(environment.V4_DEPLOY_REGISTRY_HOST) &&
          boundedString(environment.CLICKHOUSE_URL, 8, 4096),''',
                  '''        safeHttpsUrl(environment.APP_ORIGIN) &&
          registryHost(environment.DEPLOY_REGISTRY_HOST) &&
          registryHost(environment.V4_DEPLOY_REGISTRY_HOST) &&
          httpServiceUrl(environment.CLICKHOUSE_URL, true),''',
              ),
              (
                  '''        redisHost(environment.ALERTS_WORKER_REDIS_HOST) &&
          positiveIntegerString(environment.ALERTS_WORKER_REDIS_PORT, 1, 65535) &&
          exactBoolean(environment.ALERTS_WORKER_REDIS_TLS_DISABLED) &&
          boundedSecret(environment.ALERTS_WORKER_REDIS_PASSWORD, 8, 4096),''',
                  '''        worker.redisReady,''',
              ),
              (
                  '''        workerNumbers.every((key) => positiveIntegerString(environment[key], 1, 86_400_000)),''',
                  '''        worker.limitsReady,''',
              ),
              (
                  '''        "A supported alert delivery transport is configured.",
        "No supported alert delivery transport is fully configured."''',
                  '''        "Any configured global alert email transport is complete.",
        "The configured global alert email transport is incomplete or unsupported."''',
              ),
          ]
          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"Expected one script alignment replacement, found {count}: {old[:100]}")
              text = text.replace(old, new)
          script.write_text(text, encoding="utf-8")

          workflow = Path(".github/workflows/flowcordia-launch-campaign-readiness.yml")
          workflow_text = workflow.read_text(encoding="utf-8")
          workflow_replacements = [
              (
                  '''      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      OBJECT_STORE_BASE_URL: ${{ vars.OBJECT_STORE_BASE_URL }}''',
                  '''      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      OBJECT_STORE_DEFAULT_PROTOCOL: ${{ vars.OBJECT_STORE_DEFAULT_PROTOCOL }}
      OBJECT_STORE_BASE_URL: ${{ vars.OBJECT_STORE_BASE_URL }}''',
              ),
              (
                  '''      FLOWCORDIA_APPLICATION_COMMIT_SHA: ${{ vars.FLOWCORDIA_APPLICATION_COMMIT_SHA }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}''',
                  '''      FLOWCORDIA_APPLICATION_COMMIT_SHA: ${{ vars.FLOWCORDIA_APPLICATION_COMMIT_SHA }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}''',
              ),
              (
                  '''      CLICKHOUSE_URL: ${{ secrets.CLICKHOUSE_URL }}
      ALERTS_WORKER_REDIS_HOST:''',
                  '''      CLICKHOUSE_URL: ${{ secrets.CLICKHOUSE_URL }}
      ALERTS_WORKER_ENABLED: "true"
      ALERTS_WORKER_REDIS_HOST:''',
              ),
              (
                  '''      ALERTS_WORKER_REDIS_PORT: ${{ vars.ALERTS_WORKER_REDIS_PORT }}
      ALERTS_WORKER_REDIS_PASSWORD:''',
                  '''      ALERTS_WORKER_REDIS_PORT: ${{ vars.ALERTS_WORKER_REDIS_PORT }}
      ALERTS_WORKER_REDIS_USERNAME: ${{ secrets.ALERTS_WORKER_REDIS_USERNAME }}
      ALERTS_WORKER_REDIS_PASSWORD:''',
              ),
              (
                  '''      ALERT_SMTP_USER: ${{ secrets.ALERT_SMTP_USER }}
      ALERT_SMTP_PASSWORD: ${{ secrets.ALERT_SMTP_PASSWORD }}
      AWS_REGION: ${{ vars.AWS_REGION }}''',
                  '''      ALERT_SMTP_USER: ${{ secrets.ALERT_SMTP_USER }}
      ALERT_SMTP_PASSWORD: ${{ secrets.ALERT_SMTP_PASSWORD }}''',
              ),
          ]
          for old, new in workflow_replacements:
              count = workflow_text.count(old)
              if count != 1:
                  raise SystemExit(f"Expected one workflow alignment replacement, found {count}: {old[:100]}")
              workflow_text = workflow_text.replace(old, new)
          workflow.write_text(workflow_text, encoding="utf-8")

          test = Path("apps/webapp/test/flowcordia/launchCampaignReadiness.test.ts")
          test_text = test.read_text(encoding="utf-8")
          marker = '''  it("returns bounded BLOCKED evidence for invalid browser configuration", async () => {'''
          addition = '''  it("accepts host-style registries and official alert-worker defaults", async () => {
    const evidence = await createFlowcordiaLaunchCampaignStageEvidence({
      stage: "alert",
      applicationCommitSha,
      environment: {
        ...baseEnvironment("alert"),
        FLOWCORDIA_APPLICATION_COMMIT_SHA: applicationCommitSha,
        DATABASE_URL: "postgresql://flowcordia:private@db.example.com:5432/flowcordia",
        DIRECT_URL: "postgresql://flowcordia:private@db.example.com:5432/flowcordia",
        APP_ORIGIN: "https://app.example.com",
        DEPLOY_REGISTRY_HOST: "registry.example.com:5000",
        V4_DEPLOY_REGISTRY_HOST: "v4.registry.example.com",
        CLICKHOUSE_URL: "https://default:private@clickhouse.example.com:8443",
        ALERTS_WORKER_ENABLED: "true",
        ALERTS_WORKER_REDIS_HOST: "redis.example.com",
      },
      checkedAt,
    });

    expect(evidence.state).toBe("READY");
    expect(evidence.checks.find((check) => check.key === "application_dependencies")).toMatchObject({
      state: "READY",
    });
    expect(evidence.checks.find((check) => check.key === "worker_redis")).toMatchObject({
      state: "READY",
    });
    expect(evidence.checks.find((check) => check.key === "worker_limits")).toMatchObject({
      state: "READY",
    });
    expect(evidence.checks.find((check) => check.key === "alert_transport")).toMatchObject({
      state: "READY",
    });
  });

'''
          if test_text.count(marker) != 1:
              raise SystemExit("Expected one alert alignment test insertion point")
          test.write_text(test_text.replace(marker, addition + marker), encoding="utf-8")

          runbook = Path("flowcordia/runbooks/launch-campaign-readiness.md")
          runbook_text = runbook.read_text(encoding="utf-8")
          old = "| Alert | `flowcordia-alert-readiness` | Exact application, database/deployment dependencies, alerts-worker Redis, bounded worker limits, supported alert transport |"
          new = "| Alert | `flowcordia-alert-readiness` | Exact application, database/deployment dependencies, alerts-worker Redis and official defaulted limits, plus any configured global email transport; the selected Slack/webhook/email channel remains database-bound |"
          if runbook_text.count(old) != 1:
              raise SystemExit("Expected one alert runbook alignment point")
          runbook.write_text(runbook_text.replace(old, new), encoding="utf-8")
          PY
      - name: Apply canonical formatting
        run: |
          pnpm exec oxfmt --write \
            scripts/flowcordia-launch-campaign-readiness.mjs \
            .github/workflows/flowcordia-launch-campaign-readiness.yml \
            apps/webapp/test/flowcordia/launchCampaignReadiness.test.ts \
            flowcordia/runbooks/launch-campaign-readiness.md
      - name: Run focused readiness tests
        run: pnpm --filter webapp exec vitest run test/flowcordia/launchCampaignReadiness.test.ts
      - name: Commit only aligned product files
        shell: bash
        run: |
          set -euo pipefail
          allowed="$RUNNER_TEMP/flowcordia-pr93-align-allowed.txt"
          actual="$RUNNER_TEMP/flowcordia-pr93-align-actual.txt"
          cat > "$allowed" <<'EOF'
          .github/workflows/flowcordia-launch-campaign-readiness.yml
          apps/webapp/test/flowcordia/launchCampaignReadiness.test.ts
          flowcordia/runbooks/launch-campaign-readiness.md
          scripts/flowcordia-launch-campaign-readiness.mjs
          EOF
          git diff --check
          git diff --name-only | sort > "$actual"
          if comm -23 "$actual" "$allowed" | grep -q .; then
            echo "Alignment changed a file outside the allowlist." >&2
            comm -23 "$actual" "$allowed" >&2
            exit 1
          fi
          test -s "$actual"
          git add --pathspec-from-file="$allowed"
          git config user.name flowcordia-launch-readiness
          git config user.email flowcordia-launch-readiness@users.noreply.github.com
          git commit -m "Align launch readiness with official environment contracts"
          git push origin "HEAD:refs/heads/${GITHUB_HEAD_REF}"
