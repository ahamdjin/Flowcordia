name: Flowcordia PR93 align campaign readiness

on:
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: flowcordia-pr93-align-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  align:
    if: github.head_ref == 'agent/flowcordia-pr92-launch-campaign-readiness'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
          fetch-depth: 1
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
          cache: pnpm
      - name: Install exact dependencies
        run: pnpm install --frozen-lockfile
      - name: Apply reviewed contract alignment
        run: python .github/scripts/flowcordia-pr93-align.py
      - name: Apply canonical formatting
        run: |
          pnpm exec oxfmt --write \
            scripts/flowcordia-launch-campaign-readiness.mjs \
            .github/workflows/flowcordia-launch-campaign-readiness.yml \
            apps/webapp/test/flowcordia/launchCampaignReadiness.test.ts \
            flowcordia/runbooks/launch-campaign-readiness.md
      - name: Run focused readiness tests
        run: pnpm --filter webapp exec vitest run test/flowcordia/launchCampaignReadiness.test.ts
      - name: Stage only validated product files
        shell: bash
        run: |
          set -euo pipefail
          allowed="$RUNNER_TEMP/flowcordia-pr93-align-allowed.txt"
          actual="$RUNNER_TEMP/flowcordia-pr93-align-actual.txt"
          export_root="$RUNNER_TEMP/flowcordia-pr93-aligned"
          cat > "$allowed" <<'EOF'
          .github/workflows/flowcordia-launch-campaign-readiness.yml
          apps/webapp/test/flowcordia/launchCampaignReadiness.test.ts
          flowcordia/runbooks/launch-campaign-readiness.md
          scripts/flowcordia-launch-campaign-readiness.mjs
          EOF
          git diff --check
          git diff --name-only | sort > "$actual"
          if comm -23 "$actual" "$allowed" | grep -q .; then
            echo "Alignment changed a file outside the allowlist." >&2
            comm -23 "$actual" "$allowed" >&2
            exit 1
          fi
          if ! diff -u "$allowed" "$actual"; then
            echo "Alignment must change exactly the four reviewed product files." >&2
            exit 1
          fi
          mkdir -p "$export_root"
          while IFS= read -r path; do
            install -D -m 0600 "$path" "$export_root/$path"
          done < "$allowed"
          printf '%s\n' "$GITHUB_SHA" > "$export_root/source-head-sha.txt"
      - name: Upload bounded validated alignment
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flowcordia-pr93-aligned-${{ github.run_id }}
          path: ${{ runner.temp }}/flowcordia-pr93-aligned
          if-no-files-found: error
          retention-days: 1
          include-hidden-files: true
