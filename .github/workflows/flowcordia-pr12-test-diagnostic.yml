name: Temporary Flowcordia PR 12 test diagnostic

on:
  pull_request:
    branches:
      - agent/flowcordia-workflow-index-studio-canvas

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Print exact package test failure
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api /repos/${GITHUB_REPOSITORY}/actions/jobs/87601048517/logs > /tmp/package.log
          grep -E "FAIL|AssertionError|expected|Expected|editor\.test|workflow draft editor|Error:|Test Files|Tests " /tmp/package.log | tail -n 120 || true
