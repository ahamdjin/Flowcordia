name: "Flowcordia PR38 Studio diff minimizer v3"

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/flowcordia-pr38-minimize-studio-diff-v3.yml"

permissions:
  contents: write

jobs:
  minimize:
    if: github.head_ref == 'agent/flowcordia-pr38-connected-acceptance-harness'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply minimal Studio acceptance contract
        run: |
          sed -i 's#origin/main#7170f1a37f3ec7adda71d7cc937af8926dd189f2#' \
            scripts/flowcordia-pr38-minimize-studio-diff.py
          sed -i 's/source.count(root) != 1/source.count(root) < 1/' \
            scripts/flowcordia-pr38-minimize-studio-diff.py
          python scripts/flowcordia-pr38-minimize-studio-diff.py

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
          cache: "pnpm"

      - name: Validate minimized Studio boundary
        run: |
          pnpm install --frozen-lockfile --ignore-scripts
          pnpm exec oxfmt apps/webapp/app/features/flowcordia/workflows/studio/WorkflowStudio.tsx
          pnpm --filter webapp exec vitest run --no-file-parallelism \
            test/flowcordia/connectedAcceptanceContract.test.ts
          test "$(grep -c 'data-testid="flowcordia-workflow-studio"' apps/webapp/app/features/flowcordia/workflows/studio/WorkflowStudio.tsx)" -eq 1
          test "$(grep -c 'data-testid="flowcordia-preview-status"' apps/webapp/app/features/flowcordia/workflows/studio/WorkflowStudio.tsx)" -eq 1
          git diff --check

      - name: Remove temporary cleanup files
        run: |
          rm .github/workflows/flowcordia-pr38-minimize-studio-diff.yml
          rm .github/workflows/flowcordia-pr38-minimize-studio-diff-v2.yml
          rm .github/workflows/flowcordia-pr38-minimize-studio-diff-v3.yml
          rm .github/workflows/flowcordia-pr38-minimizer-diagnostic.yml
          rm scripts/flowcordia-pr38-minimize-studio-diff.py

      - name: Commit minimized review diff
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Minimize connected acceptance Studio diff"
          git push origin HEAD:${{ github.head_ref }}
