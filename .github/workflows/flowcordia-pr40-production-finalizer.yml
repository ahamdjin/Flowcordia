name: "Flowcordia production proof finalizer"

# Temporary one-shot finalizer. Removed before review.
on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/flowcordia-pr40-production-finalizer.yml"
      - "scripts/flowcordia-pr40-production-proof.py"
      - "apps/webapp/app/features/flowcordia/workflows/production/**"
      - "apps/webapp/app/features/flowcordia/workflows/studio/query.server.ts"
      - "apps/webapp/app/features/flowcordia/workflows/studio/README.md"
      - "apps/webapp/app/routes/**flowcordia.workflows/route.tsx"
      - "apps/webapp/app/routes/**flowcordia.workflow-production/route.ts"
      - "apps/webapp/test/flowcordia/workflowProductionProof.test.ts"
      - "flowcordia/connections/README.md"
      - "flowcordia/product/roadmap.md"

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'agent/flowcordia-pr40-production-execution-proof'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply asserted production integration
        run: python scripts/flowcordia-pr40-production-proof.py

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Format production boundary
        run: |
          pnpm exec oxfmt \
            apps/webapp/app/features/flowcordia/workflows/production \
            apps/webapp/app/features/flowcordia/workflows/studio/query.server.ts \
            apps/webapp/app/features/flowcordia/workflows/studio/README.md \
            'apps/webapp/app/routes/_app.orgs.$organizationSlug.projects.$projectParam.env.$envParam.flowcordia.workflows/route.tsx' \
            'apps/webapp/app/routes/resources.orgs.$organizationSlug.projects.$projectParam.flowcordia.workflow-production/route.ts' \
            apps/webapp/test/flowcordia/workflowProductionProof.test.ts \
            flowcordia/connections/README.md \
            flowcordia/product/roadmap.md

      - name: Capture production validation
        id: validate
        continue-on-error: true
        shell: bash
        run: |
          set +e
          {
            pnpm --filter webapp exec vitest run --no-file-parallelism \
              test/flowcordia/workflowProductionProof.test.ts
            pnpm --filter webapp typecheck
            ! grep -R -E 'sessionStorage|process\.env|\.\/commands\.server' \
              apps/webapp/app/features/flowcordia/workflows/production/WorkflowProductionProofPanel.tsx
            test "$(grep -c 'data-testid="flowcordia-production-proof"' apps/webapp/app/features/flowcordia/workflows/production/WorkflowProductionProofPanel.tsx)" -eq 1
            test "$(grep -c 'WorkflowProductionProofPanel' 'apps/webapp/app/routes/_app.orgs.$organizationSlug.projects.$projectParam.env.$envParam.flowcordia.workflows/route.tsx')" -eq 2
            git diff --check
          } > "$RUNNER_TEMP/production-validation.log" 2>&1
          status=$?
          cat "$RUNNER_TEMP/production-validation.log"
          exit "$status"

      - name: Upload production diagnostics
        if: steps.validate.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flowcordia-pr40-production-diagnostics
          path: ${{ runner.temp }}/production-validation.log
          if-no-files-found: error
          retention-days: 1

      - name: Stop on production validation failure
        if: steps.validate.outcome == 'failure'
        run: exit 1

      - name: Remove temporary finalizer
        run: |
          rm .github/workflows/flowcordia-pr40-production-finalizer.yml
          rm scripts/flowcordia-pr40-production-proof.py

      - name: Commit finalized production proof
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize exact production execution proof"
          git push origin HEAD:${{ github.head_ref }}
