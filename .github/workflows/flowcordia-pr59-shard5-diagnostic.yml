name: "Flowcordia PR59 shard 5 diagnostic"

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/flowcordia-pr59-shard5-diagnostic.yml"

permissions:
  actions: read
  contents: write

jobs:
  diagnose:
    if: github.head_ref == 'agent/flowcordia-pr59-alert-readiness'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TARGET_JOB_ID: "88800131519"
    steps:
      - name: Checkout exact PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Extract bounded failure summary
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p flowcordia/testing
          raw="$RUNNER_TEMP/pr59-shard5.log"
          gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/$GITHUB_REPOSITORY/actions/jobs/$TARGET_JOB_ID/logs" > "$raw"
          python <<'PY'
          from pathlib import Path
          import re

          raw = Path(__import__('os').environ['RUNNER_TEMP']) / 'pr59-shard5.log'
          text = raw.read_text(errors='replace')
          text = re.sub(r'\x1b\[[0-9;]*[A-Za-z]', '', text)
          lines = text.splitlines()
          patterns = re.compile(
              r'(FAIL|Failed Suites|Failed Tests|AssertionError|Error:|TypeError:|ReferenceError:|'
              r'Test Files|Tests\s|Unhandled|timed out|timeout|::error|ERR_|Command failed)',
              re.IGNORECASE,
          )
          indexes = [index for index, line in enumerate(lines) if patterns.search(line)]
          selected = []
          for index in indexes:
              start = max(0, index - 3)
              end = min(len(lines), index + 9)
              selected.extend(lines[start:end])
          if not selected:
              selected = lines[-160:]
          deduped = []
          for line in selected:
              line = re.sub(r'^\d{4}-\d{2}-\d{2}T[^Z]+Z\s*', '', line)
              line = line.replace('##[group]', '').replace('##[endgroup]', '')
              if line not in deduped:
                  deduped.append(line)
          bounded = deduped[-240:]
          output = Path('flowcordia/testing/pr59-shard5-failure-diagnostic.md')
          output.write_text(
              '# PR59 webapp shard 5 failure diagnostic\n\n'
              f'Target job: `{__import__("os").environ["TARGET_JOB_ID"]}`\n\n'
              '```text\n' + '\n'.join(bounded) + '\n```\n'
          )
          PY

      - name: Commit bounded diagnostic and remove workflow
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          rm .github/workflows/flowcordia-pr59-shard5-diagnostic.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Capture PR59 webapp shard 5 failure"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_HEAD_REF}"
