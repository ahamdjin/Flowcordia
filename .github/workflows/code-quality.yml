name: "🎨 Format & Lint"

on:
  workflow_call:

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Print exact formatter tail
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api /repos/${GITHUB_REPOSITORY}/actions/jobs/87863989337/logs > /tmp/format.log
          tail -n 45 /tmp/format.log
