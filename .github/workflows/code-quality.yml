name: "🎨 Format & Lint"

on:
  workflow_call:

permissions:
  actions: read
  contents: read

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Print exact formatter diagnostics
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api /repos/${GITHUB_REPOSITORY}/actions/jobs/87863301430/logs > /tmp/format.log
          grep -E "would be reformatted|Failed to format|Formatting issues" /tmp/format.log || true
