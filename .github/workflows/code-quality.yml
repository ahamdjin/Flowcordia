name: "🎨 Format & Lint"

on:
  workflow_call:

permissions:
  contents: read

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Print exact TypeScript diagnostics
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api /repos/${GITHUB_REPOSITORY}/actions/jobs/87870864770/logs > /tmp/typecheck.log
          grep -E "error TS[0-9]+:|ERROR: command finished with error|Failed:" /tmp/typecheck.log || true
