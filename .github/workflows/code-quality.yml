name: "🎨 Format & Lint"

on:
  workflow_call:

permissions:
  contents: read

jobs:
  code-quality:
    runs-on: ${{ vars.FLOWCORDIA_CI_RUNNER_SMALL || 'ubuntu-latest' }}

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: ⎔ Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.2

      - name: ⎔ Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
          cache: "pnpm"

      - name: 📥 Download deps
        run: pnpm install --frozen-lockfile

      - name: 💅 Produce exact formatted files
        run: |
          pnpm exec oxfmt \
            apps/webapp/app/features/flowcordia/workflows/studio/WorkflowSourceWorkspace.tsx \
            'apps/webapp/app/routes/resources.orgs.$organizationSlug.projects.$projectParam.flowcordia.workflow-drafts/route.ts'

      - name: 📎 Upload exact formatted files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: flowcordia-exact-formatted-files
          path: |
            apps/webapp/app/features/flowcordia/workflows/studio/WorkflowSourceWorkspace.tsx
            apps/webapp/app/routes/resources.orgs.$organizationSlug.projects.$projectParam.flowcordia.workflow-drafts/route.ts
          if-no-files-found: error
          retention-days: 1

      - name: ⛔ Keep diagnostic head non-final
        run: exit 1
