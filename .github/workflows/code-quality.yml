name: "🎨 Format & Lint"

on:
  workflow_call:

permissions:
  contents: read

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 10.33.2
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20.20.2
          cache: pnpm
      - name: Print compact diagnostics
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pnpm install --frozen-lockfile >/dev/null 2>&1
          pnpm exec oxfmt --write \
            apps/webapp/app/features/flowcordia/proposals/github.server.ts \
            packages/flowcordia-github-workflows/src/index.ts \
            packages/flowcordia-github-workflows/src/types.ts \
            packages/flowcordia-github-workflows/src/repository/source-patch.ts \
            packages/flowcordia-github-workflows/src/repository/source-patch-store.ts \
            packages/flowcordia-github-workflows/test/source-patch.test.ts \
            packages/flowcordia-github-workflows/test/source-patch-store.test.ts \
            packages/flowcordia-github-proposals/src/index.ts \
            packages/flowcordia-github-proposals/src/proposal/source-patch-service.ts \
            packages/flowcordia-github-proposals/test/source-patch-service.test.ts >/dev/null
          echo '--- FORMAT DIFF ---'
          git diff --unified=1 -- \
            apps/webapp/app/features/flowcordia/proposals/github.server.ts \
            packages/flowcordia-github-workflows \
            packages/flowcordia-github-proposals
          echo '--- WEBAPP FAILURE ---'
          gh api /repos/${GITHUB_REPOSITORY}/actions/jobs/87897977055/logs > /tmp/webapp.log
          grep -E "FAIL|Error:|error TS|AssertionError|Test Files|Tests |Timed out|ECONN|SIG" /tmp/webapp.log | tail -n 80 || true
