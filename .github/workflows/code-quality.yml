name: "🎨 Format & Lint"

on:
  workflow_call:

permissions:
  contents: read

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: agent/flowcordia-schema-driven-function-testing
          fetch-depth: 0
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 10.33.2
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20.20.2
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile >/dev/null 2>&1
      - name: Format Studio source
        run: pnpm exec oxfmt --write apps/webapp/app/features/flowcordia/workflows/studio/WorkflowStudio.tsx
      - name: Upload formatted Studio source
        uses: actions/upload-artifact@v4
        with:
          name: formatted-workflow-studio
          path: apps/webapp/app/features/flowcordia/workflows/studio/WorkflowStudio.tsx
          if-no-files-found: error
          retention-days: 1
