name: "🎨 Format & Lint"

on:
  workflow_call:

permissions:
  contents: write

jobs:
  replay-schema-testing:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout schema testing branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: agent/flowcordia-schema-driven-function-testing
          fetch-depth: 0
      - name: Replay exact product diff on merged main
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout 851d1486e6f1e28b51c5ebca87d9678aba831742 -- \
            apps/webapp/app/features/flowcordia/workflows/studio/WorkflowFunctionInputForm.tsx \
            apps/webapp/app/features/flowcordia/workflows/studio/WorkflowFunctionTestPanel.tsx \
            apps/webapp/app/features/flowcordia/workflows/studio/WorkflowStudioTestingShell.tsx \
            apps/webapp/app/features/flowcordia/workflows/studio/function-test-input.ts \
            apps/webapp/app/features/flowcordia/workflows/studio/presentation.ts \
            'apps/webapp/app/routes/_app.orgs.$organizationSlug.projects.$projectParam.env.$envParam.flowcordia.workflows/route.tsx' \
            apps/webapp/test/flowcordia/workflowDraftPresentation.test.ts \
            apps/webapp/test/flowcordia/workflowFunctionTestInput.test.ts \
            flowcordia/architecture/custom-typed-functions.md \
            flowcordia/product/capability-matrix.md \
            flowcordia/product/roadmap.md \
            flowcordia/testing/schema-driven-function-testing.md
          git checkout origin/main -- .github/workflows/code-quality.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Rebase schema-driven function testing onto merged typed functions"
          git push origin HEAD:agent/flowcordia-schema-driven-function-testing

  code-quality:
    runs-on: ${{ vars.FLOWCORDIA_CI_RUNNER_SMALL || 'ubuntu-latest' }}
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: ⎔ Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 10.33.2
      - name: ⎔ Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20.20.2
          cache: "pnpm"
      - name: 📥 Download deps
        run: pnpm install --frozen-lockfile
      - name: 💅 Check formatting
        run: pnpm exec oxfmt --check .
      - name: 🔎 Lint
        run: pnpm exec oxlint .
