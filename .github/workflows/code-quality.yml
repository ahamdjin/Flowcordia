name: "🎨 Format & Lint"

on:
  workflow_call:

permissions:
  contents: read

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Print exact formatter diff
        run: |
          rm -rf /tmp/flowcordia-format
          git clone --quiet --branch agent/flowcordia-schema-driven-function-testing --single-branch https://github.com/${GITHUB_REPOSITORY}.git /tmp/flowcordia-format
          cd /tmp/flowcordia-format
          corepack enable
          corepack prepare pnpm@10.33.2 --activate >/dev/null 2>&1
          pnpm install --frozen-lockfile >/dev/null 2>&1
          pnpm exec oxfmt --write apps/webapp/app/features/flowcordia/workflows/studio/WorkflowStudio.tsx >/dev/null
          git diff --unified=1 -- apps/webapp/app/features/flowcordia/workflows/studio/WorkflowStudio.tsx
