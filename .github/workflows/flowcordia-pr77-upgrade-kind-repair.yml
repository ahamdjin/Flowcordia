name: Flowcordia PR77 upgrade kind repair

on:
  push:
    branches:
      - agent/flowcordia-pr77-release-candidate-gate

permissions: {}

concurrency:
  group: flowcordia-pr77-upgrade-kind-repair
  cancel-in-progress: true

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: agent/flowcordia-pr77-release-candidate-gate
          persist-credentials: false
          fetch-depth: 0

      - name: Repair release candidate upgrade kind narrowing
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("apps/webapp/app/features/flowcordia/acceptance/release-candidate-evidence.server.ts")
          source = path.read_text()
          old = '''  if (!(upgrade.kind === "application_only" || upgrade.kind === "append_only_migrations")) {
            throw new Error("upgrade.kind is invalid.");
          }'''
          new = '''  const kind = upgrade.kind;
          if (!(kind === "application_only" || kind === "append_only_migrations")) {
            throw new Error("upgrade.kind is invalid.");
          }'''
          if source.count(old) != 1:
              raise SystemExit("expected one upgrade kind narrowing anchor")
          source = source.replace(old, new, 1)
          old_return = '''    kind: upgrade.kind,'''
          if source.count(old_return) != 1:
              raise SystemExit("expected one upgrade kind return anchor")
          path.write_text(source.replace(old_return, '''    kind,''', 1))
          PY
          rm .github/workflows/flowcordia-pr77-upgrade-kind-repair.yml
          git diff --check

      - name: Publish repaired product file
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            apps/webapp/app/features/flowcordia/acceptance/release-candidate-evidence.server.ts \
            .github/workflows/flowcordia-pr77-upgrade-kind-repair.yml
          git commit -m "Repair release candidate upgrade kind narrowing"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:agent/flowcordia-pr77-release-candidate-gate
