name: "Flowcordia PR52 connected product slice"

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/flowcordia-pr52-connected-product-slice.yml"
      - "scripts/flowcordia-pr52-connected-product-slice.py"
      - "apps/webapp/app/features/flowcordia/acceptance/**"
      - "apps/webapp/app/features/flowcordia/workflows/studio/WorkflowStudio.tsx"
      - "apps/webapp/test/flowcordia/connectedAcceptanceContract.test.ts"
      - "apps/webapp/test/flowcordia/releaseEvidence*.ts"
      - "tests/flowcordia-connected/**"
      - "flowcordia/testing/release-evidence-registry.md"
      - "flowcordia/runbooks/release-acceptance.md"

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'agent/flowcordia-pr52-connected-product-slice'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate and finalize release capability evidence
        shell: bash
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          set +e
          {
            python scripts/flowcordia-pr52-connected-product-slice.py &&
            pnpm exec oxfmt \
              apps/webapp/app/features/flowcordia/acceptance/contract.ts \
              apps/webapp/app/features/flowcordia/acceptance/release-manifest.server.ts \
              apps/webapp/app/features/flowcordia/workflows/studio/WorkflowStudio.tsx \
              apps/webapp/test/flowcordia/connectedAcceptanceContract.test.ts \
              apps/webapp/test/flowcordia/releaseEvidenceFixture.ts \
              apps/webapp/test/flowcordia/releaseEvidenceManifest.test.ts \
              tests/flowcordia-connected/flowcordia.connected.spec.ts \
              flowcordia/testing/release-evidence-registry.md \
              flowcordia/runbooks/release-acceptance.md &&
            git diff --check &&
            pnpm --filter @trigger.dev/database generate &&
            pnpm --filter @flowcordia/workflow build &&
            pnpm --filter webapp exec vitest run \
              test/flowcordia/connectedAcceptanceContract.test.ts \
              test/flowcordia/releaseEvidenceManifest.test.ts \
              test/flowcordia/releaseEvidenceAssembly.test.ts \
              --no-file-parallelism &&
            pnpm exec playwright test --config=playwright.flowcordia-connected.config.ts --list &&
            pnpm run typecheck
          } 2>&1 | tee pr52-validation.log
          status=${PIPESTATUS[0]}
          set -e

          if [ "$status" -ne 0 ]; then
            mkdir -p flowcordia/testing
            cp pr52-validation.log flowcordia/testing/pr52-connected-product-slice-diagnostic.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add flowcordia/testing/pr52-connected-product-slice-diagnostic.txt
            git commit -m "Capture PR52 product-slice evidence diagnostic"
            git push origin HEAD:${{ github.head_ref }}
            exit "$status"
          fi

          rm scripts/flowcordia-pr52-connected-product-slice.py
          rm .github/workflows/flowcordia-pr52-connected-product-slice.yml
          rm -f flowcordia/testing/pr52-connected-product-slice-diagnostic.txt
          rm pr52-validation.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Bind release evidence to the connected product slice"
          git push origin HEAD:${{ github.head_ref }}
