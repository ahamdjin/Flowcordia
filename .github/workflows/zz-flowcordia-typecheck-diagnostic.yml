name: Temporary Flowcordia typecheck diagnostic

on:
  push:
    branches:
      - agent/pr11-typecheck-diagnostic

permissions:
  actions: read
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: agent/pr11-typecheck-diagnostic
          fetch-depth: 0
      - name: Extract compiler errors from completed job
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api /repos/${GITHUB_REPOSITORY}/actions/jobs/87506147934/logs > /tmp/typecheck.zip
          unzip -p /tmp/typecheck.zip > /tmp/typecheck.log
          {
            echo "source_job=87506147934"
            echo
            grep -E "error TS[0-9]+:|ERROR:|command finished with error|Failed:" /tmp/typecheck.log || true
          } > flowcordia/typecheck-diagnostic.log
      - name: Commit diagnostic
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add flowcordia/typecheck-diagnostic.log
          git commit -m "Extract PR 11 typecheck errors"
          git push origin HEAD:agent/pr11-typecheck-diagnostic
