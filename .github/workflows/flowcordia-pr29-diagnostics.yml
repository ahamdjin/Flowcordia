name: "Flowcordia PR29 diagnostics"

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/flowcordia-pr29-diagnostics.yml"
      - "apps/webapp/app/features/flowcordia/workflows/readiness/**"
      - "apps/webapp/app/routes/**flowcordia**"
      - "apps/webapp/test/flowcordia/repositoryReadiness.test.ts"

permissions:
  contents: read

jobs:
  diagnostics:
    if: github.head_ref == 'agent/flowcordia-pr29-repository-readiness'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate repository clients
        run: pnpm run generate

      - name: Capture diagnostics
        shell: bash
        run: |
          mkdir -p diagnostics
          pnpm exec oxfmt .
          git diff --binary > diagnostics/format.patch
          tar -czf diagnostics/formatted-files.tar.gz \
            apps/webapp/app/features/flowcordia/workflows/readiness/RepositoryReadinessPanel.tsx \
            apps/webapp/app/features/flowcordia/workflows/readiness/configuration.ts \
            apps/webapp/app/features/flowcordia/workflows/readiness/github.server.ts \
            apps/webapp/app/features/flowcordia/workflows/readiness/presentation.ts \
            apps/webapp/app/features/flowcordia/workflows/readiness/query.server.ts
          pnpm run typecheck --filter webapp > diagnostics/typecheck.log 2>&1 || true
          pnpm run build --filter webapp > diagnostics/build.log 2>&1 || true

      - name: Upload diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flowcordia-pr29-diagnostics
          path: diagnostics/*
          retention-days: 1
