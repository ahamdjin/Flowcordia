name: "Flowcordia governed promotion acceptance finalizer"

# Temporary one-shot finalizer. Removed before review.
on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/flowcordia-pr39-governed-promotion-finalizer.yml"
      - "scripts/flowcordia-pr39-governed-promotion-acceptance.py"
      - ".github/workflows/flowcordia-promotion-acceptance.yml"
      - "playwright.flowcordia-promotion.config.ts"
      - "tests/flowcordia-connected/promotion*"
      - "apps/webapp/app/features/flowcordia/acceptance/promotion-contract.ts"
      - "apps/webapp/app/features/flowcordia/proposals/workspace/ProposalWorkspace.tsx"
      - "apps/webapp/app/routes/**flowcordia.proposals/route.tsx"
      - "apps/webapp/test/flowcordia/promotionAcceptanceContract.test.ts"
      - "flowcordia/testing/governed-promotion-acceptance.md"
      - "flowcordia/connections/README.md"
      - "flowcordia/product/roadmap.md"
      - "flowcordia/runbooks/proposal-governance-rollout.md"
      - "flowcordia/runbooks/release-acceptance.md"

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'agent/flowcordia-pr39-governed-promotion-acceptance'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Capture asserted promotion transform
        id: transform
        continue-on-error: true
        run: python scripts/flowcordia-pr39-governed-promotion-acceptance.py > "$RUNNER_TEMP/transform.log" 2>&1

      - name: Upload transform diagnostics
        if: steps.transform.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flowcordia-pr39-transform-diagnostics
          path: ${{ runner.temp }}/transform.log
          if-no-files-found: error
          retention-days: 1

      - name: Stop on transform failure
        if: steps.transform.outcome == 'failure'
        run: |
          cat "$RUNNER_TEMP/transform.log"
          exit 1

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Capture focused promotion validation
        id: focused
        continue-on-error: true
        shell: bash
        run: |
          set +e
          {
            pnpm exec oxfmt \
              .github/workflows/flowcordia-promotion-acceptance.yml \
              playwright.flowcordia-promotion.config.ts \
              tests/flowcordia-connected/promotion-evidence.ts \
              tests/flowcordia-connected/promotion.connected.spec.ts \
              apps/webapp/app/features/flowcordia/acceptance/promotion-contract.ts \
              apps/webapp/app/features/flowcordia/proposals/workspace/ProposalWorkspace.tsx \
              'apps/webapp/app/routes/_app.orgs.$organizationSlug.projects.$projectParam.env.$envParam.flowcordia.proposals/route.tsx' \
              apps/webapp/test/flowcordia/promotionAcceptanceContract.test.ts \
              flowcordia/testing/governed-promotion-acceptance.md
            pnpm --filter webapp exec vitest run --no-file-parallelism \
              test/flowcordia/promotionAcceptanceContract.test.ts
            storage_state="$RUNNER_TEMP/flowcordia-promotion-list-storage.json"
            printf '%s' '{"cookies":[],"origins":[]}' > "$storage_state"
            FLOWCORDIA_PROMOTION_CONFIRMATION=PROMOTE_FLOWCORDIA_REFERENCE_PROPOSAL \
            FLOWCORDIA_PROMOTION_BASE_URL=https://flowcordia.example.com \
            FLOWCORDIA_PROMOTION_STUDIO_PATH=/orgs/acme/projects/reference/env/prod/flowcordia/workflows \
            FLOWCORDIA_PROMOTION_PROPOSAL_PATH=/orgs/acme/projects/reference/env/prod/flowcordia/proposals \
            FLOWCORDIA_PROMOTION_WORKFLOW_ID=reference_workflow \
            FLOWCORDIA_PROMOTION_PROPOSAL_ID=proposal_reference_123 \
            FLOWCORDIA_PROMOTION_EXPECTED_HEAD_SHA=aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa \
            FLOWCORDIA_PROMOTION_REPOSITORY_OWNER=acme \
            FLOWCORDIA_PROMOTION_REPOSITORY_NAME=flowcordia-reference \
            FLOWCORDIA_PROMOTION_REPOSITORY_BRANCH=main \
            FLOWCORDIA_PROMOTION_MERGE_METHOD=squash \
            FLOWCORDIA_PROMOTION_STORAGE_STATE_PATH="$storage_state" \
            FLOWCORDIA_PROMOTION_EVIDENCE_PATH="$RUNNER_TEMP/flowcordia-promotion-list-evidence.json" \
              pnpm exec playwright test --config=playwright.flowcordia-promotion.config.ts --list
            docker run --rm \
              --volume "$GITHUB_WORKSPACE:/workspace:ro" \
              --workdir /workspace \
              ghcr.io/zizmorcore/zizmor:1.25.2@sha256:14ea7f5cc7c67933394a35b5a38a277397818d232602635edb2010b313afb110 \
              --persona=regular \
              --min-severity=low \
              --no-online-audits \
              -- \
              .github/workflows/flowcordia-promotion-acceptance.yml
            ! grep -R -E 'process\.env.*(TOKEN|COOKIE)|trace: "on"|screenshot: "on"|video: "on"' \
              tests/flowcordia-connected/promotion* \
              playwright.flowcordia-promotion.config.ts
            test "$(grep -c 'data-testid="flowcordia-proposal-workspace"' apps/webapp/app/features/flowcordia/proposals/workspace/ProposalWorkspace.tsx)" -eq 1
            test "$(grep -c 'data-testid="flowcordia-promotion-confirm"' apps/webapp/app/features/flowcordia/proposals/workspace/ProposalWorkspace.tsx)" -eq 1
            git diff --check
          } > "$RUNNER_TEMP/focused.log" 2>&1
          status=$?
          cat "$RUNNER_TEMP/focused.log"
          exit "$status"

      - name: Upload focused validation diagnostics
        if: steps.focused.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flowcordia-pr39-focused-diagnostics
          path: ${{ runner.temp }}/focused.log
          if-no-files-found: error
          retention-days: 1

      - name: Stop on focused validation failure
        if: steps.focused.outcome == 'failure'
        run: exit 1

      - name: Remove temporary finalizer
        run: |
          rm .github/workflows/flowcordia-pr39-governed-promotion-finalizer.yml
          rm scripts/flowcordia-pr39-governed-promotion-acceptance.py

      - name: Commit finalized promotion boundary
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize governed promotion acceptance"
          git push origin HEAD:${{ github.head_ref }}
