name: "Flowcordia production webhook acceptance"

on:
  workflow_dispatch:
    inputs:
      studio_path:
        description: "Relative Flowcordia Studio path without query parameters"
        required: true
        type: string
      workflow_id:
        description: "Exact public Flowcordia workflow ID"
        required: true
        type: string
      node_id:
        description: "Exact visual webhook node ID"
        required: true
        type: string
      application_commit_sha:
        description: "Exact deployed Flowcordia application commit"
        required: true
        type: string
      confirmation:
        description: "Type EXECUTE_EXACT_FLOWCORDIA_WEBHOOK_ACCEPTANCE"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: flowcordia-webhook-acceptance-${{ inputs.workflow_id }}-${{ inputs.node_id }}
  cancel-in-progress: false

jobs:
  acceptance:
    if: github.ref == 'refs/heads/main'
    name: "Exact production webhook lifecycle"
    runs-on: ubuntu-latest
    timeout-minutes: 40
    environment: flowcordia-webhook-acceptance
    env:
      FLOWCORDIA_WEBHOOK_ACCEPTANCE_BASE_URL: ${{ secrets.FLOWCORDIA_WEBHOOK_ACCEPTANCE_BASE_URL }}
      FLOWCORDIA_WEBHOOK_ACCEPTANCE_STUDIO_PATH: ${{ inputs.studio_path }}
      FLOWCORDIA_WEBHOOK_ACCEPTANCE_WORKFLOW_ID: ${{ inputs.workflow_id }}
      FLOWCORDIA_WEBHOOK_ACCEPTANCE_NODE_ID: ${{ inputs.node_id }}
      FLOWCORDIA_WEBHOOK_ACCEPTANCE_APPLICATION_COMMIT_SHA: ${{ inputs.application_commit_sha }}
      FLOWCORDIA_WEBHOOK_ACCEPTANCE_PAYLOAD_JSON: ${{ secrets.FLOWCORDIA_WEBHOOK_ACCEPTANCE_PAYLOAD_JSON }}
      FLOWCORDIA_WEBHOOK_ACCEPTANCE_HMAC_SECRET: ${{ secrets.FLOWCORDIA_WEBHOOK_ACCEPTANCE_HMAC_SECRET }}
      FLOWCORDIA_WEBHOOK_ACCEPTANCE_STORAGE_STATE_B64: ${{ secrets.FLOWCORDIA_WEBHOOK_ACCEPTANCE_STORAGE_STATE_B64 }}
      FLOWCORDIA_WEBHOOK_ACCEPTANCE_TIMEOUT_SECONDS: "1200"

    steps:
      - name: Checkout exact main harness revision
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
          cache: pnpm

      - name: Prepare private webhook acceptance files
        shell: bash
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          set -euo pipefail
          [[ "$GITHUB_REF" == "refs/heads/main" ]]
          [[ "$CONFIRMATION" == "EXECUTE_EXACT_FLOWCORDIA_WEBHOOK_ACCEPTANCE" ]]
          [[ "$FLOWCORDIA_WEBHOOK_ACCEPTANCE_WORKFLOW_ID" =~ ^[a-z][a-z0-9_-]{2,127}$ ]]
          [[ "$FLOWCORDIA_WEBHOOK_ACCEPTANCE_NODE_ID" =~ ^[A-Za-z][A-Za-z0-9_-]{0,127}$ ]]
          [[ "$FLOWCORDIA_WEBHOOK_ACCEPTANCE_APPLICATION_COMMIT_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ -n "$FLOWCORDIA_WEBHOOK_ACCEPTANCE_BASE_URL" ]]
          [[ -n "$FLOWCORDIA_WEBHOOK_ACCEPTANCE_PAYLOAD_JSON" ]]
          [[ -n "$FLOWCORDIA_WEBHOOK_ACCEPTANCE_HMAC_SECRET" ]]
          [[ -n "$FLOWCORDIA_WEBHOOK_ACCEPTANCE_STORAGE_STATE_B64" ]]

          private_dir="$(mktemp -d "$RUNNER_TEMP/flowcordia-webhook-acceptance.XXXXXX")"
          chmod 700 "$private_dir"
          storage_path="$private_dir/storage-state.json"
          evidence_path="$private_dir/evidence.json"
          output_path="$private_dir/playwright-output"
          {
            echo "FLOWCORDIA_WEBHOOK_ACCEPTANCE_PRIVATE_DIR=$private_dir"
            echo "FLOWCORDIA_WEBHOOK_ACCEPTANCE_STORAGE_STATE_PATH=$storage_path"
            echo "FLOWCORDIA_WEBHOOK_ACCEPTANCE_EVIDENCE_PATH=$evidence_path"
            echo "FLOWCORDIA_WEBHOOK_ACCEPTANCE_OUTPUT_DIR=$output_path"
          } >> "$GITHUB_ENV"

          EVIDENCE_PATH="$evidence_path" node <<'NODE'
          const fs = require("node:fs");
          const workflowId = /^[a-z][a-z0-9_-]{2,127}$/.test(process.env.FLOWCORDIA_WEBHOOK_ACCEPTANCE_WORKFLOW_ID || "")
            ? process.env.FLOWCORDIA_WEBHOOK_ACCEPTANCE_WORKFLOW_ID
            : "invalid_workflow";
          const now = new Date().toISOString();
          fs.writeFileSync(process.env.EVIDENCE_PATH, JSON.stringify({
            schemaVersion: "0.1",
            mode: "webhook_production",
            result: "FAILED",
            stage: "configuration",
            workflowId,
            startedAt: now,
            completedAt: now,
            failure: {
              code: "INVALID_CONFIGURATION",
              message: "The protected production webhook acceptance configuration is invalid."
            }
          }, null, 2) + "\n", { mode: 0o600 });
          NODE

          printf '%s' "$FLOWCORDIA_WEBHOOK_ACCEPTANCE_STORAGE_STATE_B64" | base64 --decode > "$storage_path"
          chmod 600 "$storage_path"
          node -e 'const fs=require("node:fs"); const value=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); if (!value || typeof value!=="object" || !Array.isArray(value.cookies) || !Array.isArray(value.origins)) process.exit(1);' "$storage_path"

      - name: Install repository dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Install isolated Chromium runtime
        run: pnpm exec playwright install --with-deps chromium

      - name: Execute exact signed webhook lifecycle
        run: pnpm exec playwright test --config=playwright.flowcordia-webhook-production.config.ts

      - name: Upload sanitized webhook evidence only
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flowcordia-webhook-production-${{ inputs.workflow_id }}-${{ github.run_id }}
          path: ${{ env.FLOWCORDIA_WEBHOOK_ACCEPTANCE_EVIDENCE_PATH }}
          if-no-files-found: error
          retention-days: 30
          include-hidden-files: false

      - name: Remove private browser state, secret-bearing environment, and transient output
        if: always()
        shell: bash
        run: |
          unset FLOWCORDIA_WEBHOOK_ACCEPTANCE_HMAC_SECRET
          unset FLOWCORDIA_WEBHOOK_ACCEPTANCE_PAYLOAD_JSON
          unset FLOWCORDIA_WEBHOOK_ACCEPTANCE_STORAGE_STATE_B64
          if [ -n "${FLOWCORDIA_WEBHOOK_ACCEPTANCE_PRIVATE_DIR:-}" ]; then
            rm -rf "$FLOWCORDIA_WEBHOOK_ACCEPTANCE_PRIVATE_DIR"
          fi
