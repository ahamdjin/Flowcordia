name: "Flowcordia PR61 bootstrap test repair"

on:
  push:
    branches: [agent/flowcordia-pr61-starter-templates]

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: agent/flowcordia-pr61-starter-templates
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
          cache: pnpm

      - name: Repair stale source assertion
        shell: python
        run: |
          from pathlib import Path
          path = Path("apps/webapp/test/flowcordia/repositoryBootstrap.test.ts")
          source = path.read_text()
          old = '    expect(panel).toContain("flowcordia-bootstrap-template-api_transform");\n'
          new = '''    expect(panel).toContain(\n      'data-testid={`flowcordia-bootstrap-template-${template.id}`}'\n    );\n    expect(FLOWCORDIA_STARTER_TEMPLATES.map((template) => template.id)).toContain(\n      "api_transform"\n    );\n'''
          if source.count(old) != 1:
              raise SystemExit("Expected exactly one stale bootstrap assertion")
          path.write_text(source.replace(old, new))

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format and test repair
        run: |
          pnpm exec oxfmt apps/webapp/test/flowcordia/repositoryBootstrap.test.ts
          pnpm --filter webapp exec vitest run test/flowcordia/repositoryBootstrap.test.ts
          git diff --check

      - name: Publish repaired product head
        run: |
          rm .github/workflows/flowcordia-pr61-bootstrap-test-repair.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Repair starter template source contract test"
          git push origin HEAD:agent/flowcordia-pr61-starter-templates
