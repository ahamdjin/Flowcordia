name: "Flowcordia PR61 bootstrap test repair"

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/flowcordia-pr61-bootstrap-test-repair.yml"
      - "apps/webapp/test/flowcordia/repositoryBootstrap.test.ts"

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'agent/flowcordia-pr61-starter-templates'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
          cache: pnpm

      - name: Repair stale source assertion
        shell: python
        run: |
          from pathlib import Path
          path = Path("apps/webapp/test/flowcordia/repositoryBootstrap.test.ts")
          source = path.read_text()
          old = '    expect(panel).toContain("flowcordia-bootstrap-template-api_transform");\n'
          new = '''    expect(panel).toContain(\n      'data-testid={`flowcordia-bootstrap-template-${template.id}`}'\n    );\n    expect(FLOWCORDIA_STARTER_TEMPLATES.map((template) => template.id)).toContain(\n      "api_transform"\n    );\n'''
          if source.count(old) != 1:
              raise SystemExit("Expected exactly one stale bootstrap assertion")
          path.write_text(source.replace(old, new))

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format repaired test
        run: |
          pnpm exec oxfmt apps/webapp/test/flowcordia/repositoryBootstrap.test.ts
          git diff --check

      - name: Test repair through workspace graph
        id: repair-tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pnpm exec turbo run test --filter=webapp -- --run test/flowcordia/repositoryBootstrap.test.ts 2>&1 | tee pr61-bootstrap-test.log

      - name: Upload bootstrap diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr61-bootstrap-test-${{ github.run_attempt }}
          path: pr61-bootstrap-test.log
          retention-days: 1

      - name: Enforce bootstrap test result
        if: steps.repair-tests.outcome == 'failure'
        run: exit 1

      - name: Publish repaired product head
        run: |
          rm .github/workflows/flowcordia-pr61-bootstrap-test-repair.yml
          rm -f pr61-bootstrap-test.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Repair starter template source contract test"
          git push origin "HEAD:$GITHUB_HEAD_REF"
