name: "Flowcordia PR56 database recovery proof"

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/flowcordia-pr56-database-recovery-proof.yml"
      - "scripts/flowcordia-pr56-finalize.py"
      - "scripts/flowcordia-pr56-docs.py"
      - "scripts/flowcordia-database-backup.ts"
      - "scripts/flowcordia-database-restore-rehearsal.ts"
      - "apps/webapp/app/features/flowcordia/operations/database-recovery.ts"
      - "apps/webapp/app/features/flowcordia/operations/database-recovery.server.ts"
      - "apps/webapp/test/flowcordia/databaseRecovery.test.ts"
      - "package.json"
      - "flowcordia/README.md"
      - "flowcordia/connections/README.md"
      - "flowcordia/product/capability-matrix.md"
      - "flowcordia/product/release-readiness.md"
      - "flowcordia/product/roadmap.md"
      - "flowcordia/runbooks/database-backup-restore.md"
      - "flowcordia/runbooks/installation-preflight.md"
      - "flowcordia/runbooks/live-dependency-preflight.md"

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'agent/flowcordia-pr56-database-recovery-proof'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate and finalize database recovery proof
        shell: bash
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          set -uo pipefail

          validate() {
            echo "[phase] apply recovery hardening"
            python scripts/flowcordia-pr56-finalize.py || return $?

            echo "[phase] align product documentation"
            python scripts/flowcordia-pr56-docs.py || return $?

            echo "[phase] format product files"
            pnpm exec oxfmt \
              apps/webapp/app/features/flowcordia/operations/database-recovery.ts \
              apps/webapp/app/features/flowcordia/operations/database-recovery.server.ts \
              apps/webapp/test/flowcordia/databaseRecovery.test.ts \
              scripts/flowcordia-database-backup.ts \
              scripts/flowcordia-database-restore-rehearsal.ts \
              package.json \
              flowcordia/README.md \
              flowcordia/connections/README.md \
              flowcordia/product/capability-matrix.md \
              flowcordia/product/release-readiness.md \
              flowcordia/product/roadmap.md \
              flowcordia/runbooks/database-backup-restore.md \
              flowcordia/runbooks/installation-preflight.md \
              flowcordia/runbooks/live-dependency-preflight.md || return $?

            echo "[phase] check patch integrity"
            git diff --check || return $?

            echo "[phase] generate Prisma client"
            pnpm --filter @trigger.dev/database generate || return $?

            echo "[phase] run recovery and inherited preflight tests"
            pnpm --filter webapp exec vitest run \
              test/flowcordia/databaseRecovery.test.ts \
              test/flowcordia/dependencyPreflight.test.ts \
              test/flowcordia/installationPreflight.test.ts \
              --no-file-parallelism || return $?

            echo "[phase] prove CLIs reject repository-local recovery artifacts"
            pnpm exec tsx scripts/flowcordia-database-backup.ts \
              --release-id release-2026.07.21 \
              --output-dir ./flowcordia/testing/unsafe-recovery > /tmp/flowcordia-backup-cli.out 2>&1
            backup_status=$?
            pnpm exec tsx scripts/flowcordia-database-restore-rehearsal.ts \
              --archive ./flowcordia/testing/unsafe.dump \
              --manifest ./flowcordia/testing/unsafe.json \
              --evidence ./flowcordia/testing/unsafe-evidence.json > /tmp/flowcordia-restore-cli.out 2>&1
            restore_status=$?

            if [ "$backup_status" -ne 2 ]; then
              echo "backup CLI returned $backup_status; expected repository-path rejection status 2"
              cat /tmp/flowcordia-backup-cli.out
              return 1
            fi
            if [ "$restore_status" -ne 2 ]; then
              echo "restore CLI returned $restore_status; expected repository-path rejection status 2"
              cat /tmp/flowcordia-restore-cli.out
              return 1
            fi
            if ! grep -q "must be stored outside the repository" /tmp/flowcordia-backup-cli.out; then
              echo "backup CLI did not emit the bounded repository-path rejection"
              cat /tmp/flowcordia-backup-cli.out
              return 1
            fi
            if ! grep -q "must be stored outside the repository" /tmp/flowcordia-restore-cli.out; then
              echo "restore CLI did not emit the bounded repository-path rejection"
              cat /tmp/flowcordia-restore-cli.out
              return 1
            fi

            echo "[phase] run full monorepo typecheck"
            pnpm run typecheck || return $?
          }

          set +e
          validate 2>&1 | tee pr56-validation.log
          status=${PIPESTATUS[0]}
          set -e

          if [ "$status" -ne 0 ]; then
            mkdir -p flowcordia/testing
            cp pr56-validation.log flowcordia/testing/pr56-database-recovery-diagnostic.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add flowcordia/testing/pr56-database-recovery-diagnostic.txt
            git commit -m "Capture PR56 database recovery diagnostic"
            git push origin HEAD:${{ github.head_ref }}
            exit "$status"
          fi

          rm .github/workflows/flowcordia-pr56-database-recovery-proof.yml
          rm scripts/flowcordia-pr56-finalize.py
          rm scripts/flowcordia-pr56-docs.py
          rm -f flowcordia/testing/pr56-database-recovery-diagnostic.txt
          rm pr56-validation.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add versioned database recovery proof"
          git push origin HEAD:${{ github.head_ref }}
