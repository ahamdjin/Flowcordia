name: "Flowcordia PR50 credential management"

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/flowcordia-pr50-credential-management.yml"
      - "scripts/flowcordia-pr50-credential-management.py"
      - "apps/webapp/app/features/flowcordia/workflows/credentials/**"
      - "apps/webapp/app/features/flowcordia/workflows/studio/**"
      - "apps/webapp/app/routes/**flowcordia.workflow-credentials/**"
      - "apps/webapp/app/routes/**flowcordia.workflows/**"
      - "apps/webapp/test/flowcordia/workflowCredentialManagement.test.ts"
      - "apps/webapp/test/flowcordia/workflowStudioCredentialReferences.test.ts"
      - "apps/webapp/test/flowcordia/workflowDraftCredentialCommand.test.ts"
      - "flowcordia/architecture/credential-management.md"
      - "flowcordia/product/**"

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'agent/flowcordia-pr50-credential-management'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate and finalize credential boundary
        shell: bash
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          set +e
          {
            python scripts/flowcordia-pr50-credential-management.py &&
            pnpm exec oxfmt \
              apps/webapp/app/features/flowcordia/workflows/credentials/binding.ts \
              apps/webapp/app/features/flowcordia/workflows/credentials/commands.server.ts \
              apps/webapp/app/features/flowcordia/workflows/credentials/contract.ts \
              apps/webapp/app/features/flowcordia/workflows/credentials/query.server.ts \
              apps/webapp/app/features/flowcordia/workflows/credentials/WorkflowStudioCredentialManager.tsx \
              apps/webapp/app/features/flowcordia/workflows/studio/WorkflowStudio.tsx \
              'apps/webapp/app/routes/_app.orgs.$organizationSlug.projects.$projectParam.env.$envParam.flowcordia.workflows/route.tsx' \
              'apps/webapp/app/routes/resources.orgs.$organizationSlug.projects.$projectParam.env.$envParam.flowcordia.workflow-credentials/route.ts' \
              apps/webapp/test/flowcordia/workflowCredentialManagement.test.ts \
              flowcordia/architecture/credential-management.md \
              flowcordia/product/capability-matrix.md \
              flowcordia/product/roadmap.md &&
            git diff --check &&
            pnpm --filter @trigger.dev/database generate &&
            pnpm --filter webapp exec vitest run \
              test/flowcordia/workflowCredentialManagement.test.ts \
              test/flowcordia/workflowStudioCredentialReferences.test.ts \
              test/flowcordia/workflowDraftCredentialCommand.test.ts \
              --no-file-parallelism &&
            pnpm run typecheck
          } 2>&1 | tee pr50-validation.log
          status=${PIPESTATUS[0]}
          set -e

          if [ "$status" -ne 0 ]; then
            mkdir -p flowcordia/testing
            cp pr50-validation.log flowcordia/testing/pr50-credential-management-diagnostic.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add flowcordia/testing/pr50-credential-management-diagnostic.txt
            git commit -m "Capture PR50 credential validation diagnostic"
            git push origin HEAD:${{ github.head_ref }}
            exit "$status"
          fi

          rm scripts/flowcordia-pr50-credential-management.py
          rm .github/workflows/flowcordia-pr50-credential-management.yml
          rm -f flowcordia/testing/pr50-credential-management-diagnostic.txt
          rm pr50-validation.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add write-only environment credential management"
          git push origin HEAD:${{ github.head_ref }}
