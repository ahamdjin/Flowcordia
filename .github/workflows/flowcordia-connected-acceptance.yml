name: "Flowcordia connected acceptance"

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Connected acceptance boundary to prove"
        required: true
        type: choice
        options:
          - readiness
          - structural
          - preview
      studio_path:
        description: "Relative Flowcordia Studio path without query parameters"
        required: true
        type: string
      workflow_id:
        description: "Exact public Flowcordia workflow ID"
        required: true
        type: string
      expected_head_sha:
        description: "Required 40-character proposal head for preview mode"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: flowcordia-connected-acceptance-${{ inputs.workflow_id }}
  cancel-in-progress: false

jobs:
  acceptance:
    name: "Connected ${{ inputs.mode }} acceptance"
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: flowcordia-acceptance
    env:
      FLOWCORDIA_ACCEPTANCE_MODE: ${{ inputs.mode }}
      FLOWCORDIA_ACCEPTANCE_BASE_URL: ${{ secrets.FLOWCORDIA_ACCEPTANCE_BASE_URL }}
      FLOWCORDIA_ACCEPTANCE_STUDIO_PATH: ${{ inputs.studio_path }}
      FLOWCORDIA_ACCEPTANCE_WORKFLOW_ID: ${{ inputs.workflow_id }}
      FLOWCORDIA_ACCEPTANCE_EXPECTED_HEAD_SHA: ${{ inputs.expected_head_sha }}
      FLOWCORDIA_ACCEPTANCE_PAYLOAD_JSON: ${{ secrets.FLOWCORDIA_ACCEPTANCE_PAYLOAD_JSON }}
      FLOWCORDIA_ACCEPTANCE_STORAGE_STATE_B64: ${{ secrets.FLOWCORDIA_ACCEPTANCE_STORAGE_STATE_B64 }}

    steps:
      - name: Checkout exact repository revision
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
          cache: "pnpm"

      - name: Prepare private acceptance files
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$FLOWCORDIA_ACCEPTANCE_BASE_URL" ]; then
            echo "The protected environment is missing the connected base URL." >&2
            exit 1
          fi
          if [ -z "$FLOWCORDIA_ACCEPTANCE_STORAGE_STATE_B64" ]; then
            echo "The protected environment is missing browser storage state." >&2
            exit 1
          fi
          private_dir="$(mktemp -d "$RUNNER_TEMP/flowcordia-acceptance.XXXXXX")"
          chmod 700 "$private_dir"
          storage_path="$private_dir/storage-state.json"
          evidence_path="$private_dir/evidence.json"
          output_path="$private_dir/playwright-output"
          printf '%s' "$FLOWCORDIA_ACCEPTANCE_STORAGE_STATE_B64" | base64 --decode > "$storage_path"
          chmod 600 "$storage_path"
          node -e 'const fs=require("node:fs"); const value=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); if (!value || typeof value!=="object" || !Array.isArray(value.cookies) || !Array.isArray(value.origins)) process.exit(1);' "$storage_path"
          {
            echo "FLOWCORDIA_ACCEPTANCE_PRIVATE_DIR=$private_dir"
            echo "FLOWCORDIA_ACCEPTANCE_STORAGE_STATE_PATH=$storage_path"
            echo "FLOWCORDIA_ACCEPTANCE_EVIDENCE_PATH=$evidence_path"
            echo "FLOWCORDIA_ACCEPTANCE_OUTPUT_DIR=$output_path"
          } >> "$GITHUB_ENV"

      - name: Install repository dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Install isolated Chromium runtime
        run: pnpm exec playwright install --with-deps chromium

      - name: Run connected acceptance
        run: pnpm exec playwright test --config=playwright.flowcordia-connected.config.ts

      - name: Upload sanitized evidence only
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flowcordia-connected-${{ inputs.mode }}-${{ inputs.workflow_id }}-${{ github.run_id }}
          path: ${{ env.FLOWCORDIA_ACCEPTANCE_EVIDENCE_PATH }}
          if-no-files-found: error
          retention-days: 14
          include-hidden-files: false

      - name: Remove private browser state and transient output
        if: always()
        shell: bash
        run: |
          if [ -n "${FLOWCORDIA_ACCEPTANCE_PRIVATE_DIR:-}" ]; then
            rm -rf "$FLOWCORDIA_ACCEPTANCE_PRIVATE_DIR"
          fi
