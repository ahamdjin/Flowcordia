name: "Flowcordia PR60 Zizmor diagnostic"

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/flowcordia-pr60-zizmor-diagnostic.yml"

permissions:
  actions: read
  contents: write

jobs:
  diagnose:
    if: github.head_ref == 'agent/flowcordia-pr60-operational-release-evidence'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TARGET_JOB_ID: "88808609679"
    steps:
      - name: Checkout exact PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Extract bounded Zizmor findings
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p flowcordia/testing
          raw="$RUNNER_TEMP/pr60-zizmor.log"
          gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/$GITHUB_REPOSITORY/actions/jobs/$TARGET_JOB_ID/logs" > "$raw"
          python <<'PY'
          from pathlib import Path
          import os
          import re

          text = (Path(os.environ["RUNNER_TEMP"]) / "pr60-zizmor.log").read_text(errors="replace")
          text = re.sub(r"\x1b\[[0-9;]*[A-Za-z]", "", text)
          lines = text.splitlines()
          pattern = re.compile(
              r"(error\[|warning\[|audit|confidence|severity|flowcordia-provider-readiness|"
              r"flowcordia-assemble-release-evidence|flowcordia-pr60-operational-release-evidence)",
              re.IGNORECASE,
          )
          indexes = [index for index, line in enumerate(lines) if pattern.search(line)]
          selected = []
          for index in indexes:
              selected.extend(lines[max(0, index - 2):min(len(lines), index + 9)])
          if not selected:
              selected = lines[-180:]
          deduped = []
          for line in selected:
              line = re.sub(r"^\d{4}-\d{2}-\d{2}T[^Z]+Z\s*", "", line)
              line = line.replace("##[group]", "").replace("##[endgroup]", "")
              if line not in deduped:
                  deduped.append(line)
          Path("flowcordia/testing/pr60-zizmor-diagnostic.md").write_text(
              "# PR60 Zizmor diagnostic\n\n"
              f"Target job: `{os.environ['TARGET_JOB_ID']}`\n\n"
              "```text\n" + "\n".join(deduped[-260:]) + "\n```\n"
          )
          PY

      - name: Commit bounded diagnostic and remove workflow
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          rm .github/workflows/flowcordia-pr60-zizmor-diagnostic.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Capture PR60 Zizmor finding"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_HEAD_REF}"
