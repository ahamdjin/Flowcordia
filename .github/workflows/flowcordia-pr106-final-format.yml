name: Finalize PR 106 formatting

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  finalize:
    if: ${{ github.head_ref == 'agent/flowcordia-pr105-human-approval' && github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout proposal branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: agent/flowcordia-pr105-human-approval
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Canonicalize permanent diff
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          mapfile -t files < <(
            git diff --name-only --diff-filter=ACMR origin/main...HEAD |
              grep -E '\.(ts|tsx|md|prisma|json|yml|yaml)$' || true
          )
          if [ "${#files[@]}" -gt 0 ]; then
            pnpm exec oxfmt --write "${files[@]}"
          fi
          pnpm format

      - name: Validate catalog and approval regressions
        shell: bash
        run: |
          set -euo pipefail
          diagnostic="$RUNNER_TEMP/flowcordia-pr106-final-regression.log"
          if ! (
            set -euo pipefail
            pnpm --filter @flowcordia/workflow test --run
            pnpm --filter @flowcordia/runtime test --run test/approval-runtime.test.ts
            pnpm --filter webapp test --run \
              test/flowcordia/approvalDecision.test.ts \
              test/flowcordia/approvalInboxPresentation.test.ts \
              test/flowcordia/workflowStudioApprovalConfiguration.test.ts
          ) >"$diagnostic" 2>&1; then
            git reset --hard HEAD
            git clean -fd
            tail -n 180 "$diagnostic" > .github/flowcordia-pr106-final-diagnostic.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/flowcordia-pr106-final-diagnostic.txt
            git commit -m "chore: record PR 106 final regression diagnostic"
            git push origin HEAD:agent/flowcordia-pr105-human-approval
            exit 1
          fi

      - name: Commit canonical permanent tree
        shell: bash
        run: |
          set -euo pipefail
          git rm -f --ignore-unmatch \
            .github/flowcordia-pr106-final-diagnostic.txt \
            .github/workflows/flowcordia-pr106-final-format.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "chore: canonicalize durable approval boundary"
          git push origin HEAD:agent/flowcordia-pr105-human-approval
