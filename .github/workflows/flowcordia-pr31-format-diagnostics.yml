name: "Flowcordia PR31 format diagnostics"

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/flowcordia-pr31-format-diagnostics.yml"
      - "apps/webapp/app/features/flowcordia/workflows/readiness/configuration.ts"
      - "apps/webapp/test/flowcordia/repositoryReadiness.test.ts"

permissions:
  contents: read

jobs:
  format:
    if: github.head_ref == 'agent/flowcordia-repository-readiness-final'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Format exact files
        run: |
          mkdir -p diagnostics
          pnpm exec oxfmt \
            apps/webapp/app/features/flowcordia/workflows/readiness/configuration.ts \
            apps/webapp/test/flowcordia/repositoryReadiness.test.ts
          git diff --binary > diagnostics/format.patch
          tar -czf diagnostics/formatted-files.tar.gz \
            apps/webapp/app/features/flowcordia/workflows/readiness/configuration.ts \
            apps/webapp/test/flowcordia/repositoryReadiness.test.ts

      - name: Upload formatter output
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flowcordia-pr31-format-diagnostics
          path: diagnostics/*
          retention-days: 1
