name: Build PR 106 durable approval core

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  build:
    if: ${{ github.head_ref == 'agent/flowcordia-pr105-human-approval' && github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout proposal branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: agent/flowcordia-pr105-human-approval
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
          cache: pnpm

      - name: Apply canonical approval and runtime changes
        shell: bash
        run: |
          set -euo pipefail
          diagnostic="$RUNNER_TEMP/flowcordia-pr106-core.log"
          if ! {
            python3 .github/scripts/flowcordia-pr106-core-correct.py
            python3 .github/scripts/flowcordia-pr106-core.py
          } >"$diagnostic" 2>&1; then
            tail -n 50 "$diagnostic" > .github/flowcordia-pr106-core-diagnostic.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/flowcordia-pr106-core-diagnostic.txt
            git commit -m "chore: record PR 106 core diagnostic"
            git push origin HEAD:agent/flowcordia-pr105-human-approval
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Format permanent files
        run: >-
          pnpm exec oxfmt --write
          packages/flowcordia-workflow/src/approval.ts
          packages/flowcordia-workflow/src/index.ts
          packages/flowcordia-workflow/src/catalog.ts
          packages/flowcordia-workflow/src/types.ts
          packages/flowcordia-workflow/src/editor.ts
          packages/flowcordia-workflow/test/approval.test.ts
          packages/flowcordia-runtime/src/analyze.ts
          packages/flowcordia-runtime/src/types.ts
          packages/flowcordia-runtime/src/runtime.ts
          packages/flowcordia-runtime/src/compiler.ts
          packages/flowcordia-runtime/test/approval-runtime.test.ts
          apps/webapp/app/features/flowcordia/workflows/studio/node-configuration.ts
          apps/webapp/app/features/flowcordia/workflows/studio/WorkflowStudioNodeConfigurationEditor.tsx
          apps/webapp/app/features/flowcordia/workflows/studio/presentation.ts
          apps/webapp/test/flowcordia/workflowStudioApprovalConfiguration.test.ts

      - name: Validate approval core
        shell: bash
        run: |
          set -euo pipefail
          diagnostic="$RUNNER_TEMP/flowcordia-pr106-validation.log"
          if ! {
            pnpm --filter @flowcordia/workflow test --run test/approval.test.ts
            pnpm --filter @flowcordia/runtime test --run test/approval-runtime.test.ts
            pnpm --filter webapp test --run test/flowcordia/workflowStudioApprovalConfiguration.test.ts
            pnpm --filter @flowcordia/workflow typecheck
            pnpm --filter @flowcordia/runtime typecheck
          } >"$diagnostic" 2>&1; then
            git reset --hard HEAD
            git clean -fd
            tail -n 100 "$diagnostic" > .github/flowcordia-pr106-core-diagnostic.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/flowcordia-pr106-core-diagnostic.txt
            git commit -m "chore: record PR 106 validation diagnostic"
            git push origin HEAD:agent/flowcordia-pr105-human-approval
            exit 1
          fi

      - name: Commit permanent approval core
        shell: bash
        run: |
          set -euo pipefail
          diagnostic="$RUNNER_TEMP/flowcordia-pr106-commit.log"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          set +e
          (
            set -euo pipefail
            git rm -f --ignore-unmatch .github/flowcordia-pr106-core-diagnostic.txt
            git rm \
              .github/scripts/flowcordia-pr106-core-correct.py \
              .github/scripts/flowcordia-pr106-core.py \
              .github/workflows/flowcordia-pr106-core.yml
            git add -A
            git diff --cached --check
            git commit -m "feat: add durable approval workflow core"
            git push origin HEAD:agent/flowcordia-pr105-human-approval
          ) >"$diagnostic" 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            git reset --hard HEAD
            git clean -fd
            tail -n 80 "$diagnostic" > .github/flowcordia-pr106-core-diagnostic.txt
            git add .github/flowcordia-pr106-core-diagnostic.txt
            git commit -m "chore: record PR 106 cleanup diagnostic"
            git push origin HEAD:agent/flowcordia-pr105-human-approval
            exit "$status"
          fi
