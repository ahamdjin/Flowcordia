name: Finalize PR 104 production closure evidence

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  finalize:
    if: ${{ github.head_ref == 'agent/flowcordia-pr104-production-closure-acceptance' && github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout proposal branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: agent/flowcordia-pr104-production-closure-acceptance
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
          cache: pnpm

      - name: Apply dossier validation and documentation
        shell: bash
        run: |
          set -euo pipefail
          diagnostic="$RUNNER_TEMP/flowcordia-pr104-finalizer.log"
          if ! {
            python3 .github/scripts/flowcordia-pr104-correct-finalizer.py
            python3 .github/scripts/flowcordia-pr104-finalize.py
          } >"$diagnostic" 2>&1; then
            tail -n 40 "$diagnostic" > .github/flowcordia-pr104-diagnostic.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/flowcordia-pr104-diagnostic.txt
            git commit -m "chore: record PR 104 finalizer diagnostic"
            git push origin HEAD:agent/flowcordia-pr104-production-closure-acceptance
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Format permanent files
        run: >-
          pnpm exec oxfmt --write
          .github/workflows/flowcordia-production-acceptance.yml
          apps/webapp/app/features/flowcordia/acceptance/production-contract.ts
          apps/webapp/app/features/flowcordia/acceptance/release-manifest.server.ts
          apps/webapp/test/flowcordia/productionAcceptanceContract.test.ts
          apps/webapp/test/flowcordia/releaseEvidenceFixture.ts
          apps/webapp/test/flowcordia/releaseEvidenceManifest.test.ts
          tests/flowcordia-connected/production.connected.spec.ts
          flowcordia/architecture/production-closure-acceptance.md
          flowcordia/product/capability-matrix.md
          flowcordia/testing/production-acceptance-harness.md
          flowcordia/testing/release-evidence-registry.md

      - name: Run focused release evidence tests
        run: >-
          pnpm --filter webapp test --run
          test/flowcordia/productionAcceptanceContract.test.ts
          test/flowcordia/releaseEvidenceManifest.test.ts

      - name: Commit permanent implementation
        shell: bash
        run: |
          set -euo pipefail
          diagnostic="$RUNNER_TEMP/flowcordia-pr104-commit.log"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          set +e
          (
            set -euo pipefail
            git rm -f --ignore-unmatch .github/flowcordia-pr104-diagnostic.txt
            git rm \
              .github/scripts/flowcordia-pr104-correct-finalizer.py \
              .github/scripts/flowcordia-pr104-finalize.py \
              .github/workflows/flowcordia-pr104-builder.yml \
              .github/workflows/flowcordia-pr104-wrapper.yml
            git add -A
            git diff --cached --check
            git commit -m "feat: bind production closure acceptance evidence"
            git push origin HEAD:agent/flowcordia-pr104-production-closure-acceptance
          ) >"$diagnostic" 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            git reset --hard HEAD
            git clean -fd
            tail -n 60 "$diagnostic" > .github/flowcordia-pr104-diagnostic.txt
            git add .github/flowcordia-pr104-diagnostic.txt
            git commit -m "chore: record PR 104 cleanup diagnostic"
            git push origin HEAD:agent/flowcordia-pr104-production-closure-acceptance
            exit "$status"
          fi
