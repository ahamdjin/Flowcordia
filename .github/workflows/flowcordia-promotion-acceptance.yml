name: "Flowcordia governed promotion acceptance"

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: "Type PROMOTE_FLOWCORDIA_REFERENCE_PROPOSAL"
        required: true
        type: string
      studio_path:
        description: "Relative workflow Studio path"
        required: true
        type: string
      proposal_path:
        description: "Relative proposal workspace path"
        required: true
        type: string
      workflow_id:
        description: "Exact public workflow ID"
        required: true
        type: string
      proposal_id:
        description: "Exact public proposal ID"
        required: true
        type: string
      expected_head_sha:
        description: "Exact 40-character proposal head"
        required: true
        type: string
      repository_owner:
        description: "Dedicated reference repository owner"
        required: true
        type: string
      repository_name:
        description: "Dedicated reference repository name"
        required: true
        type: string
      repository_branch:
        description: "Expected production branch"
        required: true
        type: string
      merge_method:
        description: "Governed GitHub merge method"
        required: true
        type: choice
        options:
          - squash
          - merge
          - rebase

permissions:
  contents: read

concurrency:
  group: flowcordia-promotion-acceptance-${{ inputs.proposal_id }}
  cancel-in-progress: false

jobs:
  promote:
    name: "Promote exact governed proposal"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: flowcordia-promotion-acceptance
    env:
      FLOWCORDIA_PROMOTION_CONFIRMATION: ${{ inputs.confirmation }}
      FLOWCORDIA_PROMOTION_BASE_URL: ${{ secrets.FLOWCORDIA_ACCEPTANCE_BASE_URL }}
      FLOWCORDIA_PROMOTION_STUDIO_PATH: ${{ inputs.studio_path }}
      FLOWCORDIA_PROMOTION_PROPOSAL_PATH: ${{ inputs.proposal_path }}
      FLOWCORDIA_PROMOTION_WORKFLOW_ID: ${{ inputs.workflow_id }}
      FLOWCORDIA_PROMOTION_PROPOSAL_ID: ${{ inputs.proposal_id }}
      FLOWCORDIA_PROMOTION_EXPECTED_HEAD_SHA: ${{ inputs.expected_head_sha }}
      FLOWCORDIA_PROMOTION_REPOSITORY_OWNER: ${{ inputs.repository_owner }}
      FLOWCORDIA_PROMOTION_REPOSITORY_NAME: ${{ inputs.repository_name }}
      FLOWCORDIA_PROMOTION_REPOSITORY_BRANCH: ${{ inputs.repository_branch }}
      FLOWCORDIA_PROMOTION_MERGE_METHOD: ${{ inputs.merge_method }}
      FLOWCORDIA_PROMOTION_STORAGE_STATE_B64: ${{ secrets.FLOWCORDIA_ACCEPTANCE_STORAGE_STATE_B64 }}

    steps:
      - name: Checkout exact harness revision
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
          cache: "pnpm"

      - name: Prepare private promotion files
        shell: bash
        run: |
          set -euo pipefail
          private_dir="$(mktemp -d "$RUNNER_TEMP/flowcordia-promotion.XXXXXX")"
          chmod 700 "$private_dir"
          storage_path="$private_dir/storage-state.json"
          evidence_path="$private_dir/evidence.json"
          output_path="$private_dir/playwright-output"
          {
            echo "FLOWCORDIA_PROMOTION_PRIVATE_DIR=$private_dir"
            echo "FLOWCORDIA_PROMOTION_STORAGE_STATE_PATH=$storage_path"
            echo "FLOWCORDIA_PROMOTION_EVIDENCE_PATH=$evidence_path"
            echo "FLOWCORDIA_PROMOTION_OUTPUT_DIR=$output_path"
          } >> "$GITHUB_ENV"
          EVIDENCE_PATH="$evidence_path" node -e '
            const fs = require("node:fs");
            const publicId = /^[A-Za-z0-9_-]{1,255}$/;
            const workflowId = publicId.test(process.env.FLOWCORDIA_PROMOTION_WORKFLOW_ID || "")
              ? process.env.FLOWCORDIA_PROMOTION_WORKFLOW_ID
              : "invalid_workflow";
            const proposalId = publicId.test(process.env.FLOWCORDIA_PROMOTION_PROPOSAL_ID || "")
              ? process.env.FLOWCORDIA_PROMOTION_PROPOSAL_ID
              : "invalid_proposal";
            const now = new Date().toISOString();
            fs.writeFileSync(process.env.EVIDENCE_PATH, JSON.stringify({
              schemaVersion: "0.1",
              mode: "promotion",
              result: "FAILED",
              stage: "configuration",
              workflowId,
              proposalId,
              startedAt: now,
              completedAt: now,
              failure: {
                code: "INVALID_CONFIGURATION",
                message: "Promotion acceptance configuration is invalid."
              }
            }, null, 2) + "\n", { mode: 0o600 });
          '
          if [ -z "$FLOWCORDIA_PROMOTION_BASE_URL" ]; then
            echo "The protected environment is missing the connected base URL." >&2
            exit 1
          fi
          if [ -z "$FLOWCORDIA_PROMOTION_STORAGE_STATE_B64" ]; then
            echo "The protected environment is missing browser storage state." >&2
            exit 1
          fi
          printf '%s' "$FLOWCORDIA_PROMOTION_STORAGE_STATE_B64" | base64 --decode > "$storage_path"
          chmod 600 "$storage_path"
          node -e 'const fs=require("node:fs"); const value=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); if (!value || typeof value!=="object" || !Array.isArray(value.cookies) || !Array.isArray(value.origins)) process.exit(1);' "$storage_path"

      - name: Install repository dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Install isolated Chromium runtime
        run: pnpm exec playwright install --with-deps chromium

      - name: Run governed promotion acceptance
        run: pnpm exec playwright test --config=playwright.flowcordia-promotion.config.ts

      - name: Upload sanitized promotion evidence only
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flowcordia-promotion-${{ inputs.proposal_id }}-${{ github.run_id }}
          path: ${{ env.FLOWCORDIA_PROMOTION_EVIDENCE_PATH }}
          if-no-files-found: error
          retention-days: 14
          include-hidden-files: false

      - name: Remove private browser state and transient output
        if: always()
        shell: bash
        run: |
          if [ -n "${FLOWCORDIA_PROMOTION_PRIVATE_DIR:-}" ]; then
            rm -rf "$FLOWCORDIA_PROMOTION_PRIVATE_DIR"
          fi
