name: "Flowcordia PR55 live dependency preflight"

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/flowcordia-pr55-live-dependency-preflight.yml"
      - "scripts/flowcordia-pr55-finalize.py"
      - "scripts/flowcordia-live-preflight.ts"
      - "apps/webapp/app/features/flowcordia/operations/dependency-preflight.ts"
      - "apps/webapp/app/features/flowcordia/operations/dependency-preflight.server.ts"
      - "apps/webapp/app/features/flowcordia/operations/installation-preflight.ts"
      - "apps/webapp/test/flowcordia/dependencyPreflight.test.ts"
      - "flowcordia/README.md"
      - "flowcordia/connections/README.md"
      - "flowcordia/product/capability-matrix.md"
      - "flowcordia/product/release-readiness.md"
      - "flowcordia/product/roadmap.md"
      - "flowcordia/runbooks/installation-preflight.md"
      - "flowcordia/runbooks/live-dependency-preflight.md"

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'agent/flowcordia-pr55-live-dependency-preflight'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate and finalize live dependency preflight
        shell: bash
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          set +e
          {
            python scripts/flowcordia-pr55-finalize.py &&
            pnpm exec oxfmt \
              apps/webapp/app/features/flowcordia/operations/dependency-preflight.ts \
              apps/webapp/app/features/flowcordia/operations/dependency-preflight.server.ts \
              apps/webapp/app/features/flowcordia/operations/installation-preflight.ts \
              apps/webapp/test/flowcordia/dependencyPreflight.test.ts \
              scripts/flowcordia-live-preflight.ts \
              flowcordia/README.md \
              flowcordia/connections/README.md \
              flowcordia/product/capability-matrix.md \
              flowcordia/product/release-readiness.md \
              flowcordia/product/roadmap.md \
              flowcordia/runbooks/installation-preflight.md \
              flowcordia/runbooks/live-dependency-preflight.md &&
            git diff --check &&
            pnpm --filter @trigger.dev/database generate &&
            pnpm --filter webapp exec vitest run \
              test/flowcordia/dependencyPreflight.test.ts \
              test/flowcordia/installationPreflight.test.ts \
              --no-file-parallelism &&
            set +e
            SESSION_SECRET=abcdef1234 \
              MAGIC_LINK_SECRET=abcdef1234 \
              ENCRYPTION_KEY=00000000000000000000000000000000 \
              DATABASE_URL=invalid \
              DIRECT_URL=invalid \
              APP_ORIGIN=http://unsafe.example.com \
              LOGIN_ORIGIN=http://unsafe.example.com \
              APP_ENV=production \
              NODE_ENV=production \
              GITHUB_APP_ENABLED=0 \
              FLOWCORDIA_APPLICATION_COMMIT_SHA=aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa \
              pnpm exec tsx scripts/flowcordia-live-preflight.ts \
                --profile release \
                --json > /tmp/flowcordia-live-preflight.json
            cli_status=$?
            set -e
            test "$cli_status" -eq 1 &&
            node -e 'const fs=require("node:fs"); const value=JSON.parse(fs.readFileSync("/tmp/flowcordia-live-preflight.json","utf8")); if(value.state!=="BLOCKED"||value.phase!=="configuration"||value.schemaVersion!=="0.1"||value.dependencies!==undefined) process.exit(1); const raw=JSON.stringify(value); if(/abcdef1234|postgresql:|unsafe\.example|PRIVATE KEY|Bearer/.test(raw)) process.exit(1);' &&
            pnpm run typecheck
          } 2>&1 | tee pr55-validation.log
          status=${PIPESTATUS[0]}
          set -e

          if [ "$status" -ne 0 ]; then
            mkdir -p flowcordia/testing
            cp pr55-validation.log flowcordia/testing/pr55-live-dependency-preflight-diagnostic.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add flowcordia/testing/pr55-live-dependency-preflight-diagnostic.txt
            git commit -m "Capture PR55 live dependency diagnostic"
            git push origin HEAD:${{ github.head_ref }}
            exit "$status"
          fi

          rm .github/workflows/flowcordia-pr55-live-dependency-preflight.yml
          rm scripts/flowcordia-pr55-finalize.py
          rm -f flowcordia/testing/pr55-live-dependency-preflight-diagnostic.txt
          rm pr55-validation.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add live dependency preflight"
          git push origin HEAD:${{ github.head_ref }}
