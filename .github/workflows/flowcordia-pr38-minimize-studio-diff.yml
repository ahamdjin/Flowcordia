name: "Flowcordia PR38 Studio diff minimizer"

# Temporary one-shot cleanup. Removed before review.
on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/flowcordia-pr38-minimize-studio-diff.yml"
      - "scripts/flowcordia-pr38-minimize-studio-diff.py"

permissions:
  contents: write

jobs:
  minimize:
    if: github.head_ref == 'agent/flowcordia-pr38-connected-acceptance-harness'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Restore main Studio and apply minimal acceptance contract
        run: python scripts/flowcordia-pr38-minimize-studio-diff.py

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Format and validate minimized boundary
        run: |
          pnpm exec oxfmt \
            apps/webapp/app/features/flowcordia/workflows/studio/WorkflowStudio.tsx
          pnpm --filter webapp exec vitest run --no-file-parallelism \
            test/flowcordia/connectedAcceptanceContract.test.ts
          test "$(grep -c 'data-testid="flowcordia-workflow-studio"' apps/webapp/app/features/flowcordia/workflows/studio/WorkflowStudio.tsx)" -eq 1
          test "$(grep -c 'data-testid="flowcordia-preview-status"' apps/webapp/app/features/flowcordia/workflows/studio/WorkflowStudio.tsx)" -eq 1
          ! grep -q '<div[[:space:]]*$' apps/webapp/app/features/flowcordia/workflows/studio/WorkflowStudio.tsx || true
          git diff --check

      - name: Remove temporary cleanup
        run: |
          rm .github/workflows/flowcordia-pr38-minimize-studio-diff.yml
          rm scripts/flowcordia-pr38-minimize-studio-diff.py

      - name: Commit minimized review diff
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Minimize connected acceptance Studio diff"
          git push origin HEAD:${{ github.head_ref }}
