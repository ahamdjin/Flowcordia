name: "Flowcordia PR40 authority formatter"

# Temporary one-shot formatter. Removed before review.
on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/flowcordia-pr40-authority-formatter.yml"

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'agent/flowcordia-pr40-production-execution-proof'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Apply repository formatter
        run: |
          pnpm exec oxfmt \
            apps/webapp/app/features/flowcordia/workflows/production \
            apps/webapp/test/flowcordia/workflowProductionProof.test.ts \
            flowcordia/testing/production-execution-proof.md
          git diff --check

      - name: Remove temporary formatter
        run: rm .github/workflows/flowcordia-pr40-authority-formatter.yml

      - name: Commit exact formatter result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Apply exact PR40 production formatting"
          git push origin HEAD:${{ github.head_ref }}
