name: "Flowcordia PR61 starter templates finalizer"

on:
  pull_request:
    branches: [agent/flowcordia-pr60-guided-onboarding]
    paths:
      - ".github/workflows/flowcordia-pr61-templates-finalizer.yml"
      - "apps/webapp/app/features/flowcordia/workflows/bootstrap/**"
      - "apps/webapp/test/flowcordia/repositoryBootstrap.test.ts"
      - "flowcordia/product/roadmap.md"
      - "flowcordia/product/starter-templates.md"

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'agent/flowcordia-pr61-starter-templates'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
          cache: pnpm

      - name: Format and finalize starter templates
        shell: bash
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          pnpm exec oxfmt \
            apps/webapp/app/features/flowcordia/workflows/bootstrap/WorkflowRepositoryBootstrapPanel.tsx \
            apps/webapp/app/features/flowcordia/workflows/bootstrap/command-contract.ts \
            apps/webapp/app/features/flowcordia/workflows/bootstrap/commands.server.ts \
            apps/webapp/app/features/flowcordia/workflows/bootstrap/contract.ts \
            apps/webapp/app/features/flowcordia/workflows/bootstrap/service.server.ts \
            apps/webapp/test/flowcordia/repositoryBootstrap.test.ts \
            flowcordia/product/roadmap.md \
            flowcordia/product/starter-templates.md
          git diff --check
          rm .github/workflows/flowcordia-pr61-templates-finalizer.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize governed starter templates"
          git push origin "HEAD:$GITHUB_HEAD_REF"
