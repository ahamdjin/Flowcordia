name: Inspect PR 106 approval integration points

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  inspect:
    if: ${{ github.head_ref == 'agent/flowcordia-pr105-human-approval' && github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout proposal branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: agent/flowcordia-pr105-human-approval

      - name: Inspect integration points
        shell: bash
        run: |
          set -euo pipefail
          output="$RUNNER_TEMP/flowcordia-pr106-inspect.txt"
          {
            echo '=== STUDIO ROUTES ==='
            find apps/webapp/app/routes -type f | grep -E 'flowcordia\.workflows|workflow-credentials|workflow-production' | sort || true
            echo '=== FLOWCORDIA FEATURE FILES ==='
            find apps/webapp/app/features/flowcordia/workflows -maxdepth 3 -type f | sort | sed -n '1,260p'
            echo '=== SCHEMA MODEL ANCHORS ==='
            grep -n -E '^model (Organization|Project|RuntimeEnvironment|User|Waitpoint|TaskRun)|^enum Flowcordia' internal-packages/database/prisma/schema.prisma || true
            echo '=== FLOWCORDIA SCHEMA ANCHORS ==='
            grep -n -E 'flowcordia[A-Z]|Flowcordia[A-Z]' internal-packages/database/prisma/schema.prisma | head -n 260 || true
            echo '=== STUDIO LOADER QUERY IMPORTS ==='
            studio_route=$(find apps/webapp/app/routes -type f | grep 'flowcordia\.workflows' | head -n 1 || true)
            echo "STUDIO_ROUTE=$studio_route"
            if [ -n "$studio_route" ]; then sed -n '1,260p' "$studio_route"; fi
            echo '=== DATABASE MIGRATION TAIL ==='
            find internal-packages/database/prisma/migrations -mindepth 1 -maxdepth 1 -type d | sort | tail -n 15
          } > "$output"
          cp "$output" flowcordia-pr106-inspect.txt

      - name: Upload inspection
        uses: actions/upload-artifact@v4
        with:
          name: flowcordia-pr106-inspect
          path: flowcordia-pr106-inspect.txt
          if-no-files-found: error
          retention-days: 1
