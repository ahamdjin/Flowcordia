name: "Flowcordia PR48 HTTP hardening"

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/flowcordia-pr48-http-hardening.yml"
      - "scripts/flowcordia-pr48-http-hardening.py"
      - "packages/flowcordia-runtime/**"
      - "packages/flowcordia-workflow/**"
      - "apps/webapp/app/features/flowcordia/workflows/studio/**"
      - "apps/webapp/test/flowcordia/workflowStudioNodeConfiguration.test.ts"
      - "flowcordia/architecture/approved-node-catalog.md"
      - "flowcordia/testing/http-api-node-test-matrix.md"

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'agent/flowcordia-pr48-http-api-node'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
          cache: pnpm

      - name: Apply HTTP compatibility and connection-safety fixes
        run: python scripts/flowcordia-pr48-http-hardening.py

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format changed boundary
        run: |
          pnpm exec oxfmt \
            packages/flowcordia-runtime/src/runtime.ts \
            packages/flowcordia-runtime/src/compiler.ts \
            packages/flowcordia-runtime/test/http-runtime.test.ts \
            packages/flowcordia-runtime/README.md \
            flowcordia/architecture/approved-node-catalog.md \
            flowcordia/testing/http-api-node-test-matrix.md
          git diff --check

      - name: Run workflow package tests
        run: pnpm --filter @flowcordia/workflow exec vitest run

      - name: Build workflow dependency
        run: pnpm --filter @flowcordia/workflow build

      - name: Run HTTP runtime tests
        run: pnpm --filter @flowcordia/runtime exec vitest run test/http-runtime.test.ts

      - name: Typecheck workflow package
        run: pnpm --filter @flowcordia/workflow typecheck

      - name: Typecheck runtime package
        run: pnpm --filter @flowcordia/runtime typecheck

      - name: Run focused Studio contract
        run: pnpm --filter webapp exec vitest run test/flowcordia/workflowStudioNodeConfiguration.test.ts --no-file-parallelism

      - name: Remove temporary hardening tooling
        run: |
          rm scripts/flowcordia-pr48-http-hardening.py
          rm .github/workflows/flowcordia-pr48-http-hardening.yml
          rm -f flowcordia/testing/pr48-http-runtime-diagnostic.txt

      - name: Commit validated HTTP hardening
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Harden approved HTTP runtime compatibility"
          git push origin HEAD:${{ github.head_ref }}
