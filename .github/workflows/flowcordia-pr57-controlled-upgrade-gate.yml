name: "Flowcordia PR57 controlled upgrade gate"

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/flowcordia-pr57-controlled-upgrade-gate.yml"
      - "scripts/flowcordia-pr57-docs.py"
      - "scripts/flowcordia-upgrade-preflight.ts"
      - "apps/webapp/app/features/flowcordia/operations/upgrade-preflight.ts"
      - "apps/webapp/app/features/flowcordia/operations/upgrade-preflight.server.ts"
      - "apps/webapp/test/flowcordia/upgradePreflight.test.ts"
      - "package.json"
      - "flowcordia/README.md"
      - "flowcordia/connections/README.md"
      - "flowcordia/product/capability-matrix.md"
      - "flowcordia/product/release-readiness.md"
      - "flowcordia/product/roadmap.md"
      - "flowcordia/runbooks/controlled-upgrades.md"
      - "flowcordia/runbooks/installation-preflight.md"

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'agent/flowcordia-pr57-controlled-upgrade-gate'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate and finalize controlled upgrade gate
        shell: bash
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          set -uo pipefail

          validate() {
            echo "[phase] align product documentation"
            python scripts/flowcordia-pr57-docs.py || return $?

            echo "[phase] format product files"
            pnpm exec oxfmt \
              apps/webapp/app/features/flowcordia/operations/upgrade-preflight.ts \
              apps/webapp/app/features/flowcordia/operations/upgrade-preflight.server.ts \
              apps/webapp/test/flowcordia/upgradePreflight.test.ts \
              scripts/flowcordia-upgrade-preflight.ts \
              package.json \
              flowcordia/README.md \
              flowcordia/connections/README.md \
              flowcordia/product/capability-matrix.md \
              flowcordia/product/release-readiness.md \
              flowcordia/product/roadmap.md \
              flowcordia/runbooks/controlled-upgrades.md \
              flowcordia/runbooks/installation-preflight.md || return $?

            echo "[phase] check patch integrity"
            git diff --check || return $?

            echo "[phase] generate Prisma client"
            pnpm --filter @trigger.dev/database generate || return $?

            echo "[phase] run upgrade and inherited operational tests"
            pnpm --filter webapp exec vitest run \
              test/flowcordia/upgradePreflight.test.ts \
              test/flowcordia/databaseRecovery.test.ts \
              test/flowcordia/dependencyPreflight.test.ts \
              test/flowcordia/installationPreflight.test.ts \
              --no-file-parallelism || return $?

            echo "[phase] prove repository-local recovery evidence is rejected before configuration"
            pnpm exec tsx scripts/flowcordia-upgrade-preflight.ts \
              --current-application-sha 0123456789abcdef0123456789abcdef01234567 \
              --backup-manifest ./flowcordia/testing/unsafe-backup.json \
              --restore-evidence ./flowcordia/testing/unsafe-restore.json \
              --json > /tmp/flowcordia-upgrade-path.out 2>&1
            path_status=$?
            if [ "$path_status" -ne 2 ]; then
              echo "upgrade CLI returned $path_status; expected repository-path rejection status 2"
              cat /tmp/flowcordia-upgrade-path.out
              return 1
            fi
            if ! grep -q "must be stored outside the repository" /tmp/flowcordia-upgrade-path.out; then
              echo "upgrade CLI did not emit the bounded repository-path rejection"
              cat /tmp/flowcordia-upgrade-path.out
              return 1
            fi

            echo "[phase] prove blocked configuration performs no database observation"
            pnpm exec tsx scripts/flowcordia-upgrade-preflight.ts \
              --current-application-sha 0123456789abcdef0123456789abcdef01234567 \
              --json > /tmp/flowcordia-upgrade-config.out 2>&1
            config_status=$?
            if [ "$config_status" -ne 1 ]; then
              echo "upgrade CLI returned $config_status; expected blocked configuration status 1"
              cat /tmp/flowcordia-upgrade-config.out
              return 1
            fi
            if ! grep -q '"phase": "configuration"' /tmp/flowcordia-upgrade-config.out || \
               ! grep -q '"state": "BLOCKED"' /tmp/flowcordia-upgrade-config.out; then
              echo "upgrade CLI did not emit the bounded configuration result"
              cat /tmp/flowcordia-upgrade-config.out
              return 1
            fi

            echo "[phase] run full monorepo typecheck"
            pnpm run typecheck || return $?
          }

          set +e
          validate 2>&1 | tee pr57-validation.log
          status=${PIPESTATUS[0]}
          set -e

          if [ "$status" -ne 0 ]; then
            mkdir -p flowcordia/testing
            cp pr57-validation.log flowcordia/testing/pr57-controlled-upgrade-diagnostic.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add flowcordia/testing/pr57-controlled-upgrade-diagnostic.txt
            git commit -m "Capture PR57 controlled upgrade diagnostic"
            git push origin HEAD:${{ github.head_ref }}
            exit "$status"
          fi

          rm .github/workflows/flowcordia-pr57-controlled-upgrade-gate.yml
          rm scripts/flowcordia-pr57-docs.py
          rm -f flowcordia/testing/pr57-controlled-upgrade-diagnostic.txt
          rm pr57-validation.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add controlled upgrade preflight"
          git push origin HEAD:${{ github.head_ref }}
