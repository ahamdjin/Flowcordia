name: Build PR 106 approval inbox

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  build:
    if: ${{ github.head_ref == 'agent/flowcordia-pr105-human-approval' && github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout proposal branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: agent/flowcordia-pr105-human-approval
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
          cache: pnpm

      - name: Apply approval inbox changes
        shell: bash
        run: |
          set -euo pipefail
          diagnostic="$RUNNER_TEMP/flowcordia-pr106-inbox-apply.log"
          if ! python3 .github/scripts/flowcordia-pr106-inbox.py >"$diagnostic" 2>&1; then
            tail -n 100 "$diagnostic" > .github/flowcordia-pr106-inbox-diagnostic.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/flowcordia-pr106-inbox-diagnostic.txt
            git commit -m "chore: record PR 106 inbox apply diagnostic"
            git push origin HEAD:agent/flowcordia-pr105-human-approval
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Generate Prisma client
        run: pnpm --filter @trigger.dev/database generate

      - name: Format permanent files
        run: >-
          pnpm exec oxfmt --write
          apps/webapp/app/features/flowcordia/workflows/approval/contract.ts
          apps/webapp/app/features/flowcordia/workflows/approval/decision.ts
          apps/webapp/app/features/flowcordia/workflows/approval/repository.server.ts
          apps/webapp/app/features/flowcordia/workflows/approval/commands.server.ts
          apps/webapp/app/features/flowcordia/workflows/approval/WorkflowApprovalInboxPanel.tsx
          apps/webapp/app/routes/resources.orgs.$organizationSlug.projects.$projectParam.env.$envParam.flowcordia.workflow-approvals/route.ts
          apps/webapp/app/routes/_app.orgs.$organizationSlug.projects.$projectParam.env.$envParam.flowcordia.workflows/route.tsx
          apps/webapp/test/flowcordia/approvalDecision.test.ts
          apps/webapp/test/flowcordia/approvalInboxPresentation.test.ts
          internal-packages/database/prisma/schema.prisma
          flowcordia/architecture/durable-human-approvals.md
          flowcordia/product/capability-matrix.md
          flowcordia/product/roadmap.md

      - name: Validate approval inbox
        shell: bash
        run: |
          set -euo pipefail
          diagnostic="$RUNNER_TEMP/flowcordia-pr106-inbox-validation.log"
          if ! {
            pnpm --filter webapp test --run \
              test/flowcordia/approvalDecision.test.ts \
              test/flowcordia/approvalInboxPresentation.test.ts \
              test/flowcordia/workflowStudioApprovalConfiguration.test.ts
            pnpm --filter @flowcordia/workflow test --run test/approval.test.ts
            pnpm --filter @flowcordia/runtime test --run test/approval-runtime.test.ts
            pnpm --filter @trigger.dev/database typecheck
            pnpm --filter webapp typecheck
          } >"$diagnostic" 2>&1; then
            git reset --hard HEAD
            git clean -fd
            tail -n 160 "$diagnostic" > .github/flowcordia-pr106-inbox-diagnostic.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/flowcordia-pr106-inbox-diagnostic.txt
            git commit -m "chore: record PR 106 inbox validation diagnostic"
            git push origin HEAD:agent/flowcordia-pr105-human-approval
            exit 1
          fi

      - name: Commit permanent approval inbox
        shell: bash
        run: |
          set -euo pipefail
          diagnostic="$RUNNER_TEMP/flowcordia-pr106-inbox-commit.log"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          set +e
          (
            set -euo pipefail
            git rm -f --ignore-unmatch \
              .github/flowcordia-pr106-inbox-diagnostic.txt \
              .github/scripts/flowcordia-pr106-inbox.py \
              .github/workflows/flowcordia-pr106-inbox.yml \
              .github/workflows/flowcordia-pr106-inspect.yml
            git add -A
            git diff --cached --check
            git commit -m "feat: add approval inbox and audited decisions"
            git push origin HEAD:agent/flowcordia-pr105-human-approval
          ) >"$diagnostic" 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            git reset --hard HEAD
            git clean -fd
            tail -n 100 "$diagnostic" > .github/flowcordia-pr106-inbox-diagnostic.txt
            git add .github/flowcordia-pr106-inbox-diagnostic.txt
            git commit -m "chore: record PR 106 inbox cleanup diagnostic"
            git push origin HEAD:agent/flowcordia-pr105-human-approval
            exit "$status"
          fi
