name: Flowcordia self-host topology

on:
  pull_request:
    paths:
      - ".github/workflows/flowcordia-self-host-topology.yml"
      - "apps/webapp/app/features/flowcordia/operations/self-host-topology.ts"
      - "apps/webapp/app/features/flowcordia/proposals/worker/lifecycle.server.ts"
      - "apps/webapp/app/features/flowcordia/proposals/worker/local-health.server.ts"
      - "apps/webapp/test/flowcordia/operationsLocalHealth.test.ts"
      - "apps/webapp/test/flowcordia/selfHostReleaseScripts.test.ts"
      - "apps/webapp/test/flowcordia/selfHostTopology.test.ts"
      - "apps/webapp/test/flowcordia/selfHostTopologySource.test.ts"
      - "docker/Dockerfile"
      - "docker/flowcordia-self-host.env.example"
      - "docker/flowcordia-self-host.secrets.example"
      - "docker/flowcordia-self-host.yml"
      - "docker/scripts/entrypoint.sh"
      - "docker/scripts/flowcordia-operations-health.mjs"
      - "docker/scripts/flowcordia-release-migrate.sh"
      - "docker/scripts/flowcordia-release-verify.mjs"
      - "package.json"
      - "scripts/flowcordia-self-host-validate.ts"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/flowcordia-self-host-topology.yml"
      - "apps/webapp/app/features/flowcordia/operations/self-host-topology.ts"
      - "apps/webapp/app/features/flowcordia/proposals/worker/lifecycle.server.ts"
      - "apps/webapp/app/features/flowcordia/proposals/worker/local-health.server.ts"
      - "apps/webapp/test/flowcordia/operationsLocalHealth.test.ts"
      - "apps/webapp/test/flowcordia/selfHostReleaseScripts.test.ts"
      - "apps/webapp/test/flowcordia/selfHostTopology.test.ts"
      - "apps/webapp/test/flowcordia/selfHostTopologySource.test.ts"
      - "docker/**"
      - "package.json"
      - "scripts/flowcordia-self-host-validate.ts"
  workflow_dispatch:

permissions: {}

concurrency:
  group: flowcordia-self-host-topology-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout exact revision
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20.20.2
          cache: pnpm

      - name: Install and generate
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @trigger.dev/database generate

      - name: Create bounded release and deployment fixtures
        shell: bash
        run: |
          set -euo pipefail
          image_digest="$(printf 'a%.0s' {1..64})"
          upstream_sha="89abcdef0123456789abcdef0123456789abcdef"
          image_reference="ghcr.io/ahamdjin/flowcordia@sha256:$image_digest"
          pnpm flowcordia:release:manifest \
            --release-id flowcordia-0.1.0-rc.1 \
            --version 0.1.0-rc.1 \
            --application-sha "$GITHUB_SHA" \
            --upstream-sha "$upstream_sha" \
            --image "$image_reference" \
            --created-at 2026-07-23T00:00:00.000Z \
            --output /tmp/flowcordia-release-manifest.json
          mkdir -p /tmp/flowcordia-migrations
          node <<'NODE'
          const fs = require("node:fs");
          const manifest = JSON.parse(fs.readFileSync("/tmp/flowcordia-release-manifest.json", "utf8"));
          const config = `FLOWCORDIA_CONFIG_FILE=/tmp/flowcordia-deployment.env
          FLOWCORDIA_SECRETS_FILE=/tmp/flowcordia-deployment.secrets
          FLOWCORDIA_RELEASE_MANIFEST_FILE=/tmp/flowcordia-release-manifest.json
          FLOWCORDIA_MIGRATION_STATE_DIR=/tmp/flowcordia-migrations
          FLOWCORDIA_IMAGE_REFERENCE=${manifest.image.reference}
          FLOWCORDIA_IMAGE_DIGEST=${manifest.image.digest}
          FLOWCORDIA_APPLICATION_COMMIT_SHA=${process.env.GITHUB_SHA}
          FLOWCORDIA_RELEASE_MANIFEST_SHA256=${manifest.manifestSha256}
          FLOWCORDIA_RELEASE_RUNTIME_REQUIRED=1
          FLOWCORDIA_MIGRATION_CONFIRM=${manifest.releaseId}
          FLOWCORDIA_WEB_REPLICAS=1
          FLOWCORDIA_OPERATIONS_REPLICAS=1
          FLOWCORDIA_HTTP_BIND=127.0.0.1
          FLOWCORDIA_HTTP_PORT=3030
          APP_ENV=production
          NODE_ENV=production
          APP_ORIGIN=https://flowcordia.example.com
          LOGIN_ORIGIN=https://flowcordia.example.com
          FLOWCORDIA_STUDIO_ENABLED=0
          SKIP_POSTGRES_MIGRATIONS=1
          SKIP_DASHBOARD_AGENT_MIGRATIONS=1
          SKIP_CLICKHOUSE_MIGRATIONS=1
          DATABASE_HOST=postgres.internal:5432
          REDIS_HOST=redis.internal
          REDIS_PORT=6379
          REDIS_TLS_DISABLED=false
          ELECTRIC_ORIGIN=https://electric.internal
          RUN_REPLICATION_ENABLED=1
          EVENT_REPOSITORY_DEFAULT_STORE=clickhouse_v2
          OBJECT_STORE_BASE_URL=https://s3.example.net
          OBJECT_STORE_BUCKET=flowcordia-packets
          OBJECT_STORE_REGION=us-east-1
          OBJECT_STORE_SERVICE=s3
          EMAIL_TRANSPORT=resend
          FROM_EMAIL=no-reply@flowcordia.example
          REPLY_TO_EMAIL=support@flowcordia.example
          GITHUB_APP_ENABLED=1
          GITHUB_APP_ID=123456
          GITHUB_APP_SLUG=flowcordia-example
          FLOWCORDIA_PROPOSAL_EVENT_URL=https://flowcordia.example.com/api/flowcordia/proposal-events
          `;
          const secrets = `SESSION_SECRET=S2F3qW4eR5tY6uI7oP8aS9dF0gH1jK2l
          MAGIC_LINK_SECRET=M3nB4vC5xZ6aS7dF8gH9jK0lQ1wE2rT3
          ENCRYPTION_KEY=0123456789abcdef0123456789abcdef
          DATABASE_URL=postgresql://flowcordia:strong@postgres.internal:5432/flowcordia
          DIRECT_URL=postgresql://migrator:strong@postgres.internal:5432/flowcordia
          CLICKHOUSE_URL=https://default:strong@clickhouse.internal:8443/default
          RUN_REPLICATION_CLICKHOUSE_URL=https://default:strong@clickhouse.internal:8443/default
          OBJECT_STORE_ACCESS_KEY_ID=AKIAFLOWCORDIA123456
          OBJECT_STORE_SECRET_ACCESS_KEY=vR8mQ2pL6sT0yW4cF9hJ3kN7dB1xZ5aE
          GITHUB_APP_PRIVATE_KEY=-----BEGIN PRIVATE KEY-----\\n${"a".repeat(160)}\\n-----END PRIVATE KEY-----
          GITHUB_APP_WEBHOOK_SECRET=W8xY7zA6bC5dE4fG3hI2jK1lM0nP9qR8
          FLOWCORDIA_PROPOSAL_EVENT_SECRET=P9oI8uY7tR6eW5qA4sD3fG2hJ1kL0mN9
          RESEND_API_KEY=re_8Jk2Lm6Np0Qr4St8Uv1Wx5Yz
          `;
          fs.writeFileSync("/tmp/flowcordia-deployment.env", config.replace(/^\s+/gm, ""), { mode: 0o640 });
          fs.writeFileSync("/tmp/flowcordia-deployment.secrets", secrets.replace(/^\s+/gm, ""), { mode: 0o600 });
          NODE

      - name: Validate topology and Compose model
        run: |
          pnpm flowcordia:self-host:validate \
            --config /tmp/flowcordia-deployment.env \
            --secrets /tmp/flowcordia-deployment.secrets \
            --manifest /tmp/flowcordia-release-manifest.json
          docker compose \
            --env-file /tmp/flowcordia-deployment.env \
            -f docker/flowcordia-self-host.yml \
            config --quiet

      - name: Validate release scripts
        run: |
          sh -n docker/scripts/entrypoint.sh
          sh -n docker/scripts/flowcordia-release-migrate.sh
          node --check docker/scripts/flowcordia-release-verify.mjs
          node --check docker/scripts/flowcordia-operations-health.mjs

      - name: Test production topology contracts
        run: |
          pnpm --filter webapp exec vitest run \
            test/flowcordia/operationsLocalHealth.test.ts \
            test/flowcordia/selfHostReleaseScripts.test.ts \
            test/flowcordia/selfHostTopology.test.ts \
            test/flowcordia/selfHostTopologySource.test.ts

      - name: Remove temporary deployment fixtures
        if: always()
        run: |
          rm -f \
            /tmp/flowcordia-deployment.env \
            /tmp/flowcordia-deployment.secrets \
            /tmp/flowcordia-release-manifest.json
          rm -rf /tmp/flowcordia-migrations

  build-image:
    needs: validate
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout exact revision
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
          fetch-depth: 1

      - name: Prepare isolated Buildx builder
        run: |
          docker buildx create \
            --name flowcordia-self-host-ci \
            --driver docker-container \
            --use
          docker buildx inspect --bootstrap
          : > /tmp/flowcordia-empty-sentry-token

      - name: Build the immutable application image
        env:
          IMAGE: flowcordia-self-host-ci:${{ github.sha }}
        run: |
          created_at="$(date -u +'%Y-%m-%dT%H:%M:%S.000Z')"
          created_seconds="$(date -u +'%s')"
          docker buildx build \
            --builder flowcordia-self-host-ci \
            --file docker/Dockerfile \
            --platform linux/amd64 \
            --provenance=false \
            --sbom=false \
            --secret id=sentry_auth_token,src=/tmp/flowcordia-empty-sentry-token \
            --build-arg BUILD_APP_VERSION=0.0.0-ci \
            --build-arg BUILD_GIT_SHA="$GITHUB_SHA" \
            --build-arg BUILD_GIT_REF_NAME=ci \
            --build-arg BUILD_TIMESTAMP_SECONDS="$created_seconds" \
            --build-arg BUILD_TIMESTAMP_RFC3339="$created_at" \
            --build-arg BUILD_UPSTREAM_GIT_SHA=89abcdef0123456789abcdef0123456789abcdef \
            --build-arg BUILD_SOURCE_REPOSITORY_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY" \
            --tag "$IMAGE" \
            --load \
            .

      - name: Inspect image identity and packaged runtime artifacts
        env:
          IMAGE: flowcordia-self-host-ci:${{ github.sha }}
        run: |
          docker image inspect "$IMAGE" > /tmp/flowcordia-image-inspect.json
          jq -e --arg sha "$GITHUB_SHA" '
            .[0].Config.User == "node" and
            .[0].Config.Labels["org.opencontainers.image.title"] == "Flowcordia" and
            .[0].Config.Labels["org.opencontainers.image.revision"] == $sha and
            .[0].Config.Labels["dev.flowcordia.release.schema"] == "0.1" and
            .[0].Config.Labels["dev.flowcordia.upstream.revision"] == "89abcdef0123456789abcdef0123456789abcdef"
          ' /tmp/flowcordia-image-inspect.json >/dev/null
          docker run --rm --entrypoint sh "$IMAGE" -c '
            set -eu
            test -x ./scripts/entrypoint.sh
            test -x ./scripts/flowcordia-release-migrate.sh
            test -x ./scripts/flowcordia-release-verify.mjs
            test -x ./scripts/flowcordia-operations-health.mjs
            test -f ./apps/webapp/prisma/schema.prisma
            find ./apps/webapp/prisma -maxdepth 1 -name "*.node" -print -quit | grep -q .
          '

      - name: Remove CI image and builder
        if: always()
        env:
          IMAGE: flowcordia-self-host-ci:${{ github.sha }}
        run: |
          docker image rm "$IMAGE" >/dev/null 2>&1 || true
          docker buildx rm flowcordia-self-host-ci >/dev/null 2>&1 || true
          rm -f /tmp/flowcordia-empty-sentry-token /tmp/flowcordia-image-inspect.json
