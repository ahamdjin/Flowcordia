name: "Flowcordia PR60 operational release evidence"

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/flowcordia-pr60-operational-release-evidence-finalizer.yml"
      - ".github/workflows/flowcordia-provider-readiness.yml"
      - ".github/workflows/flowcordia-assemble-release-evidence.yml"
      - "scripts/flowcordia-pr60-release-manifest.py"
      - "scripts/flowcordia-pr60-release-tests.py"
      - "scripts/flowcordia-pr60-assembly-test.py"
      - "scripts/flowcordia-pr60-docs.py"
      - "apps/webapp/app/features/flowcordia/acceptance/release-manifest.server.ts"
      - "apps/webapp/app/features/flowcordia/acceptance/release-operational-evidence.server.ts"
      - "apps/webapp/test/flowcordia/releaseEvidenceFixture.ts"
      - "apps/webapp/test/flowcordia/releaseEvidenceManifest.test.ts"
      - "apps/webapp/test/flowcordia/releaseEvidenceAssembly.test.ts"
      - "apps/webapp/test/flowcordia/operationalReleaseEvidenceWorkflow.test.ts"
      - "scripts/flowcordia-assemble-release-evidence.ts"
      - "flowcordia/runbooks/release-acceptance.md"
      - "flowcordia/testing/release-evidence-registry.md"
      - "flowcordia/product/release-readiness.md"
      - "flowcordia/product/capability-matrix.md"
      - "flowcordia/connections/README.md"

permissions:
  contents: write

concurrency:
  group: flowcordia-pr60-operational-release-evidence-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  finalize:
    if: github.head_ref == 'agent/flowcordia-pr60-operational-release-evidence'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate and finalize operational release evidence
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          set -uo pipefail

          validate() {
            echo "[phase] validate workflow syntax"
            docker run --rm \
              -v "$PWD:/repo" \
              -w /repo \
              rhysd/actionlint:1.7.12@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667 \
              -color \
              .github/workflows/flowcordia-provider-readiness.yml \
              .github/workflows/flowcordia-assemble-release-evidence.yml \
              .github/workflows/flowcordia-pr60-operational-release-evidence-finalizer.yml || return $?

            echo "[phase] apply release manifest transform"
            python scripts/flowcordia-pr60-release-manifest.py || return $?

            echo "[phase] update release evidence fixtures and tests"
            python scripts/flowcordia-pr60-release-tests.py || return $?
            python scripts/flowcordia-pr60-assembly-test.py || return $?

            echo "[phase] align release documentation"
            python scripts/flowcordia-pr60-docs.py || return $?

            echo "[phase] format product files"
            pnpm exec oxfmt \
              .github/workflows/flowcordia-provider-readiness.yml \
              .github/workflows/flowcordia-assemble-release-evidence.yml \
              apps/webapp/app/features/flowcordia/acceptance/release-manifest.server.ts \
              apps/webapp/app/features/flowcordia/acceptance/release-operational-evidence.server.ts \
              apps/webapp/test/flowcordia/releaseEvidenceFixture.ts \
              apps/webapp/test/flowcordia/releaseEvidenceManifest.test.ts \
              apps/webapp/test/flowcordia/releaseEvidenceAssembly.test.ts \
              apps/webapp/test/flowcordia/operationalReleaseEvidenceWorkflow.test.ts \
              scripts/flowcordia-assemble-release-evidence.ts \
              flowcordia/runbooks/release-acceptance.md \
              flowcordia/testing/release-evidence-registry.md \
              flowcordia/product/release-readiness.md \
              flowcordia/product/capability-matrix.md \
              flowcordia/connections/README.md || return $?

            echo "[phase] check patch integrity"
            git diff --check || return $?

            echo "[phase] verify seven-source release boundary"
            grep -q '"provider"' apps/webapp/app/features/flowcordia/acceptance/release-manifest.server.ts || return 1
            grep -q '"alert"' apps/webapp/app/features/flowcordia/acceptance/release-manifest.server.ts || return 1
            grep -q 'schemaVersion: "0.3"' apps/webapp/app/features/flowcordia/acceptance/release-manifest.server.ts || return 1
            grep -q 'source_runs_json:' .github/workflows/flowcordia-assemble-release-evidence.yml || return 1
            grep -q 'flowcordia-provider-readiness.yml' .github/workflows/flowcordia-assemble-release-evidence.yml || return 1
            grep -q 'flowcordia-alert-readiness.yml' .github/workflows/flowcordia-assemble-release-evidence.yml || return 1
            grep -q 'environment: flowcordia-provider-readiness' .github/workflows/flowcordia-provider-readiness.yml || return 1
            if grep -q 'preview_run_id:' .github/workflows/flowcordia-assemble-release-evidence.yml; then
              echo "Release assembler still exposes legacy individual run inputs"
              return 1
            fi

            echo "[phase] run operational and release evidence tests"
            pnpm --filter webapp exec vitest run \
              test/flowcordia/releaseEvidenceManifest.test.ts \
              test/flowcordia/releaseEvidenceAssembly.test.ts \
              test/flowcordia/operationalReleaseEvidenceWorkflow.test.ts \
              --no-file-parallelism || return $?

            echo "[phase] generate database client"
            pnpm --filter @trigger.dev/database generate || return $?

            echo "[phase] run full monorepo typecheck"
            pnpm run typecheck || return $?
          }

          set +e
          validate 2>&1 | tee pr60-validation.log
          status=${PIPESTATUS[0]}
          set -e

          if [ "$status" -ne 0 ]; then
            mkdir -p flowcordia/testing
            cp pr60-validation.log flowcordia/testing/pr60-operational-release-evidence-diagnostic.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add flowcordia/testing/pr60-operational-release-evidence-diagnostic.txt
            git commit -m "Capture PR60 operational release evidence diagnostic"
            git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:$GITHUB_HEAD_REF"
            exit "$status"
          fi

          rm .github/workflows/flowcordia-pr60-operational-release-evidence-finalizer.yml
          rm scripts/flowcordia-pr60-release-manifest.py
          rm scripts/flowcordia-pr60-release-tests.py
          rm scripts/flowcordia-pr60-assembly-test.py
          rm scripts/flowcordia-pr60-docs.py
          rm -f flowcordia/testing/pr60-operational-release-evidence-diagnostic.txt
          rm pr60-validation.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Require operational canaries in release evidence"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:$GITHUB_HEAD_REF"
