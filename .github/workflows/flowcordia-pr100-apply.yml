name: Flowcordia PR100 product builder

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/pr100-apply.py
      - .github/workflows/flowcordia-pr100-apply.yml

permissions: {}

jobs:
  apply:
    if: >-
      github.repository == 'ahamdjin/Flowcordia' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - name: Checkout exact pull-request branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 # zizmor: ignore[artipacked] temporary same-repository product builder; no untrusted execution
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1

      - name: Verify exact starting revision
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          [[ "$(git rev-parse HEAD)" == "$EXPECTED_HEAD" ]]

      - name: Apply guarded product transformation
        id: apply
        continue-on-error: true
        run: python .github/pr100-apply.py > pr100-apply.log 2>&1

      - name: Setup pnpm
        if: steps.apply.outcome == 'success'
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.2

      - name: Setup node
        if: steps.apply.outcome == 'success'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
          cache: pnpm

      - name: Install frozen dependencies
        if: steps.apply.outcome == 'success'
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        if: steps.apply.outcome == 'success'
        run: pnpm --filter @trigger.dev/database generate

      - name: Format permanent product files
        if: steps.apply.outcome == 'success'
        run: |
          set -euo pipefail
          pnpm exec oxfmt --write \
            packages/flowcordia-workflow/src/contract.ts \
            packages/flowcordia-workflow/src/index.ts \
            packages/flowcordia-workflow/src/catalog.ts \
            packages/flowcordia-workflow/test/contract.test.ts \
            packages/flowcordia-runtime/src/runtime.ts \
            packages/flowcordia-runtime/test/callable-contract-runtime.test.ts \
            internal-packages/database/prisma/migrations/20260724150000_flowcordia_callable_contracts/migration.sql \
            apps/webapp/app/features/flowcordia/workflows/index/types.ts \
            apps/webapp/app/features/flowcordia/workflows/index/repository.server.ts \
            apps/webapp/app/features/flowcordia/workflows/index/service.server.ts \
            apps/webapp/app/features/flowcordia/workflows/subflows/presentation.ts \
            apps/webapp/app/features/flowcordia/workflows/drafts/service.server.ts \
            apps/webapp/test/flowcordia/workflowSubflowDependencyPresentation.test.ts \
            flowcordia/architecture/callable-subflow-contracts.md \
            flowcordia/product/capability-matrix.md \
            flowcordia/product/roadmap.md
          git diff --check

      - name: Validate callable contract boundary
        id: validate
        if: steps.apply.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          {
            pnpm --filter @flowcordia/workflow typecheck
            pnpm --filter @flowcordia/workflow test -- --run test/contract.test.ts test/editor.test.ts
            pnpm --filter @flowcordia/workflow build
            pnpm --filter @flowcordia/runtime typecheck
            pnpm --filter @flowcordia/runtime test -- --run test/callable-contract-runtime.test.ts test/subflow-runtime.test.ts
            pnpm --filter @flowcordia/runtime build
            pnpm typecheck --filter webapp
            pnpm --filter webapp exec vitest run \
              test/flowcordia/workflowSubflowDependencyPresentation.test.ts \
              test/flowcordia/workflowStudioSubflowConfiguration.test.ts \
              --no-file-parallelism
          } 2>&1 | tee pr100-validation.log

      - name: Preserve bounded diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flowcordia-pr100-builder-${{ github.run_id }}
          path: |
            pr100-apply.log
            pr100-validation.log
          if-no-files-found: warn
          retention-days: 1

      - name: Commit permanent product files
        if: steps.apply.outcome == 'success' && steps.validate.outcome == 'success'
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            packages/flowcordia-workflow/src/contract.ts \
            packages/flowcordia-workflow/src/index.ts \
            packages/flowcordia-workflow/src/catalog.ts \
            packages/flowcordia-workflow/test/contract.test.ts \
            packages/flowcordia-runtime/src/runtime.ts \
            packages/flowcordia-runtime/test/callable-contract-runtime.test.ts \
            internal-packages/database/prisma/migrations/20260724150000_flowcordia_callable_contracts/migration.sql \
            apps/webapp/app/features/flowcordia/workflows/index/types.ts \
            apps/webapp/app/features/flowcordia/workflows/index/repository.server.ts \
            apps/webapp/app/features/flowcordia/workflows/index/service.server.ts \
            apps/webapp/app/features/flowcordia/workflows/subflows/presentation.ts \
            apps/webapp/app/features/flowcordia/workflows/drafts/service.server.ts \
            apps/webapp/test/flowcordia/workflowSubflowDependencyPresentation.test.ts \
            flowcordia/architecture/callable-subflow-contracts.md \
            flowcordia/product/capability-matrix.md \
            flowcordia/product/roadmap.md
          git commit -m "feat: bind exact-revision callable subflow contracts"
          git push origin "HEAD:${HEAD_REF}"

      - name: Enforce builder result
        if: steps.apply.outcome == 'failure' || steps.validate.outcome == 'failure'
        run: exit 1
