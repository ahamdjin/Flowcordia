name: Temporary Flowcordia PR 15 format diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Print exact formatter diagnostics
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api /repos/${GITHUB_REPOSITORY}/actions/jobs/87737396021/logs > /tmp/format.log
          grep -E "would be reformatted|Failed to format|Formatting issues" /tmp/format.log || true
