name: Temporary Flowcordia PR 15 fixture diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Print exact validation failure
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api /repos/${GITHUB_REPOSITORY}/actions/jobs/87739290266/logs > /tmp/fixture.log
          python - <<'PY'
          import re
          from pathlib import Path
          text = Path('/tmp/fixture.log').read_text(errors='replace')
          text = re.sub(r'\x1b\[[0-9;]*[A-Za-z]', '', text)
          marker = 'Validate repository formatting and contracts'
          start = text.find(marker)
          print(text[start:start + 16000] if start >= 0 else text[-16000:])
          PY
