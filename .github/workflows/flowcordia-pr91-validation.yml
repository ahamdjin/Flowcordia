name: Flowcordia PR91 apply canonical formatting

on:
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: flowcordia-pr91-format-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  format:
    if: github.head_ref == 'agent/flowcordia-pr91-self-host-launch-dossier'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: true
          fetch-depth: 1
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 10.33.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20.20.2
          cache: pnpm
      - name: Install exact dependencies
        run: pnpm install --frozen-lockfile
      - name: Apply exact formatter output
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/expected-files <<'FILES'
          apps/webapp/app/features/flowcordia/acceptance/release-self-host-launch-manifest.server.ts
          apps/webapp/test/flowcordia/releaseSelfHostLaunchEvidenceFixture.ts
          FILES
          sed -i 's/^          //' /tmp/expected-files
          pnpm exec oxfmt --write \
            apps/webapp/app/features/flowcordia/acceptance/release-self-host-launch-manifest.server.ts \
            apps/webapp/test/flowcordia/releaseSelfHostLaunchEvidenceFixture.ts
          git diff --name-only --diff-filter=ACM | sort > /tmp/actual-files
          diff -u /tmp/expected-files /tmp/actual-files
          git diff --check
          git add --pathspec-from-file=/tmp/expected-files
          git config user.name flowcordia-formatter
          git config user.email flowcordia-formatter@users.noreply.github.com
          git commit -m "Format lifecycle-bound launch dossier"
          git push origin "HEAD:refs/heads/${GITHUB_HEAD_REF}"
