name: "Flowcordia connected acceptance harness finalizer"

# Temporary one-shot finalizer. This workflow and its transform script are removed before review.
on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/flowcordia-pr38-connected-acceptance-finalizer.yml"
      - "scripts/flowcordia-pr38-connected-acceptance-harness.py"
      - ".github/workflows/flowcordia-connected-acceptance.yml"
      - "playwright.flowcordia-connected.config.ts"
      - "tests/flowcordia-connected/**"
      - "apps/webapp/app/features/flowcordia/acceptance/**"
      - "apps/webapp/app/features/flowcordia/workflows/readiness/RepositoryReadinessPanel.tsx"
      - "apps/webapp/app/features/flowcordia/workflows/studio/**"
      - "apps/webapp/app/routes/**flowcordia.workflows/route.tsx"
      - "apps/webapp/test/flowcordia/connectedAcceptanceContract.test.ts"
      - "flowcordia/connections/README.md"
      - "flowcordia/product/roadmap.md"
      - "flowcordia/runbooks/preview-deployment-rollout.md"
      - "flowcordia/testing/connected-acceptance-harness.md"

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'agent/flowcordia-pr38-connected-acceptance-harness'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply asserted browser-contract transform
        run: python scripts/flowcordia-pr38-connected-acceptance-harness.py

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Format and validate focused harness boundary
        run: |
          pnpm exec oxfmt \
            .github/workflows/flowcordia-connected-acceptance.yml \
            playwright.flowcordia-connected.config.ts \
            tests/flowcordia-connected/evidence.ts \
            tests/flowcordia-connected/flowcordia.connected.spec.ts \
            apps/webapp/app/features/flowcordia/acceptance/contract.ts \
            apps/webapp/app/features/flowcordia/workflows/readiness/RepositoryReadinessPanel.tsx \
            apps/webapp/app/features/flowcordia/workflows/studio/WorkflowFunctionTestPanel.tsx \
            apps/webapp/app/features/flowcordia/workflows/studio/WorkflowStudio.tsx \
            apps/webapp/app/features/flowcordia/workflows/studio/WorkflowStudioTestingPanel.tsx \
            'apps/webapp/app/routes/_app.orgs.$organizationSlug.projects.$projectParam.env.$envParam.flowcordia.workflows/route.tsx' \
            apps/webapp/test/flowcordia/connectedAcceptanceContract.test.ts \
            flowcordia/testing/connected-acceptance-harness.md
          pnpm --filter webapp exec vitest run --no-file-parallelism \
            test/flowcordia/connectedAcceptanceContract.test.ts
          storage_state="$RUNNER_TEMP/flowcordia-connected-list-storage.json"
          printf '%s' '{"cookies":[],"origins":[]}' > "$storage_state"
          FLOWCORDIA_ACCEPTANCE_MODE=readiness \
          FLOWCORDIA_ACCEPTANCE_BASE_URL=https://flowcordia.example.com \
          FLOWCORDIA_ACCEPTANCE_STUDIO_PATH=/orgs/acme/projects/reference/env/prod/flowcordia/workflows \
          FLOWCORDIA_ACCEPTANCE_WORKFLOW_ID=reference_workflow \
          FLOWCORDIA_ACCEPTANCE_STORAGE_STATE_PATH="$storage_state" \
          FLOWCORDIA_ACCEPTANCE_EVIDENCE_PATH="$RUNNER_TEMP/flowcordia-connected-list-evidence.json" \
            pnpm exec playwright test --config=playwright.flowcordia-connected.config.ts --list
          ! grep -R -E 'secretValue|storageState.*artifact|trace: "on"|screenshot: "on"|video: "on"' \
            tests/flowcordia-connected \
            playwright.flowcordia-connected.config.ts \
            .github/workflows/flowcordia-connected-acceptance.yml
          grep -q 'workflow_dispatch:' .github/workflows/flowcordia-connected-acceptance.yml
          ! grep -q 'pull_request:' .github/workflows/flowcordia-connected-acceptance.yml
          grep -q 'data-testid="flowcordia-workflow-studio"' \
            apps/webapp/app/features/flowcordia/workflows/studio/WorkflowStudio.tsx
          git diff --check

      - name: Remove temporary files
        run: |
          rm .github/workflows/flowcordia-pr38-connected-acceptance-finalizer.yml
          rm scripts/flowcordia-pr38-connected-acceptance-harness.py

      - name: Commit final product boundary
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize connected acceptance harness"
          git push origin HEAD:${{ github.head_ref }}
