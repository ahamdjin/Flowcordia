name: Harden PR 102 reconciliation recovery

on:
  push:
    branches:
      - agent/flowcordia-pr102-closure-deployment-proof

permissions:
  contents: write

concurrency:
  group: flowcordia-pr102-recovery-fix
  cancel-in-progress: false

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: agent/flowcordia-pr102-closure-deployment-proof
          fetch-depth: 0
          persist-credentials: true

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.20.2
          cache: pnpm

      - name: Apply and verify recovery guard
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          from pathlib import Path

          service_path = Path('packages/flowcordia-control-plane/src/reconciliation/service.ts')
          service = service_path.read_text()
          import_marker = '} from "../types.js";\n\nconst ACTOR_ID'
          import_replacement = '} from "../types.js";\nimport { proposalClosureIdentityState } from "../proposal/closure.js";\n\nconst ACTOR_ID'
          if service.count(import_marker) != 1:
              raise SystemExit('Reconciliation import marker changed.')
          service = service.replace(import_marker, import_replacement)
          target_marker = '''    const state = targetState(observation);
            const pullRequest = observation.pullRequest;
          '''
          target_replacement = '''    const closure = proposalClosureIdentityState(item.proposal);
            if (item.proposal.state === "CREATING" && closure.state !== "RECORDED") {
              if (closure.state === "INVALID") {
                await this.#fail(
                  item,
                  observation,
                  "invalid_remote_response",
                  "The durable proposal closure identity is invalid.",
                  report
                );
              } else {
                await this.#defer(
                  item,
                  "invalid_remote_response",
                  "GitHub created the proposal, but its immutable closure identity is not durable yet. Retry proposal creation.",
                  report
                );
              }
              return;
            }
            const state = targetState(observation);
            const pullRequest = observation.pullRequest;
          '''
          if service.count(target_marker) != 1:
              raise SystemExit('Reconciliation target-state marker changed.')
          service_path.write_text(service.replace(target_marker, target_replacement))

          test_path = Path('packages/flowcordia-control-plane/test/reconciliation.test.ts')
          test = test_path.read_text()
          test_marker = '''  it("settles a merged proposal and stops periodic reconciliation", async () => {
          '''
          addition = '''  it("keeps a recovered create retryable until closure identity is durable", async () => {
            const store = new InMemoryProposalStore();
            const proposal = await seed(store);
            store.proposals.set(proposal.storageId, {
              ...proposal,
              state: "CREATING",
              closureSchemaVersion: null,
              closureDigest: null,
              closureWorkflowIds: [],
            });

            const report = await service(store, {
              observe: async () => observation(proposal),
            }).reconcileOnce();

            expect(report).toEqual({
              claimed: 1,
              completed: 0,
              failed: 0,
              deferred: 1,
              leaseLost: 0,
            });
            expect(store.proposals.get(proposal.storageId)).toMatchObject({
              state: "CREATING",
              closureSchemaVersion: null,
              closureDigest: null,
              closureWorkflowIds: [],
            });
          });

          '''
          if test.count(test_marker) != 1:
              raise SystemExit('Reconciliation test marker changed.')
          test_path.write_text(test.replace(test_marker, addition + test_marker))

          Path('.github/workflows/pr102-recovery-fix.yml').unlink()
          PY
          pnpm install --frozen-lockfile
          pnpm exec oxfmt packages/flowcordia-control-plane/src/reconciliation/service.ts packages/flowcordia-control-plane/test/reconciliation.test.ts
          pnpm --filter @flowcordia/github-proposals... build
          pnpm --filter @flowcordia/control-plane typecheck
          pnpm --filter @flowcordia/control-plane test --run
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git diff --cached --quiet && { echo "No recovery changes to commit"; exit 1; }
          git commit -m "fix: preserve closure recovery boundary"
          git push origin HEAD:agent/flowcordia-pr102-closure-deployment-proof
