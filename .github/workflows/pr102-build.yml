          replace(
              "internal-packages/database/prisma/schema.prisma",
              '''  desiredWorkflowSha256 String

            organization''',
              '''  desiredWorkflowSha256 String
            closureSchemaVersion  String?
            closureDigest         String?
            closureWorkflowIds    String[] @default([])

            organization''',
          )
          write(
              "internal-packages/database/prisma/migrations/20260724181000_flowcordia_proposal_closure_identity/migration.sql",
              '''ALTER TABLE "FlowcordiaWorkflowProposal"
          ADD COLUMN "closureSchemaVersion" TEXT,
          ADD COLUMN "closureDigest" TEXT,
          ADD COLUMN "closureWorkflowIds" TEXT[] NOT NULL DEFAULT ARRAY[]::TEXT[];
          ''',
          )

          replace(
              "apps/webapp/app/features/flowcordia/proposals/prisma.server.ts",
              '  ProposalPersistenceError,\n',
              '  ProposalPersistenceError,\n  proposalClosureIdentityState,\n',
          )
          replace(
              "apps/webapp/app/features/flowcordia/proposals/prisma.server.ts",
              '  desiredWorkflowSha256: string;\n',
              '''  desiredWorkflowSha256: string;
            closureSchemaVersion: string | null;
            closureDigest: string | null;
            closureWorkflowIds: string[];
          ''',
          )
          replace(
              "apps/webapp/app/features/flowcordia/proposals/prisma.server.ts",
              '''  if (!/^[0-9a-f]{64}$/.test(row.desiredWorkflowSha256)) {
              throw new ProposalPersistenceError("Stored desired workflow digest is invalid.");
            }
          ''',
              '''  if (!/^[0-9a-f]{64}$/.test(row.desiredWorkflowSha256)) {
              throw new ProposalPersistenceError("Stored desired workflow digest is invalid.");
            }
            const closure = proposalClosureIdentityState({
              workflowId: row.workflowId,
              closureSchemaVersion: row.closureSchemaVersion,
              closureDigest: row.closureDigest,
              closureWorkflowIds: row.closureWorkflowIds,
            });
            if (closure.state === "INVALID") {
              throw new ProposalPersistenceError("Stored proposal closure identity is invalid.");
            }
          ''',
          )
          replace(
              "apps/webapp/app/features/flowcordia/proposals/prisma.server.ts",
              '    desiredWorkflowSha256: row.desiredWorkflowSha256,\n',
              '''    desiredWorkflowSha256: row.desiredWorkflowSha256,
              closureSchemaVersion: row.closureSchemaVersion,
              closureDigest: row.closureDigest,
              closureWorkflowIds: [...row.closureWorkflowIds],
          ''',
          )
          replace(
              "apps/webapp/app/features/flowcordia/proposals/prisma.server.ts",
              '''    ...(patch.state !== undefined ? { state: patch.state } : {}),
          ''',
              '''    ...(patch.state !== undefined ? { state: patch.state } : {}),
              ...(patch.closureSchemaVersion !== undefined
                ? { closureSchemaVersion: patch.closureSchemaVersion }
                : {}),
              ...(patch.closureDigest !== undefined ? { closureDigest: patch.closureDigest } : {}),
              ...(patch.closureWorkflowIds !== undefined
                ? { closureWorkflowIds: [...patch.closureWorkflowIds] }
                : {}),
          ''',
          )
          replace(
              "apps/webapp/app/features/flowcordia/proposals/prisma.server.ts",
              '          desiredWorkflowSha256: input.desiredWorkflowSha256,\n',
              '''          desiredWorkflowSha256: input.desiredWorkflowSha256,
                    closureSchemaVersion: input.closureSchemaVersion,
                    closureDigest: input.closureDigest,
                    closureWorkflowIds: [...input.closureWorkflowIds],
          ''',
          )

          replace(
              "apps/webapp/app/features/flowcordia/proposals/github.server.ts",
              'import { ProposalPersistenceError, type ControlPlaneScope } from "@flowcordia/control-plane";\n',
              '''import {
            ProposalPersistenceError,
            type ControlPlaneScope,
            type GitHubProposalGateway,
          } from "@flowcordia/control-plane";
          ''',
          )
          replace(
              "apps/webapp/app/features/flowcordia/proposals/github.server.ts",
              '  type FlowcordiaProposalOctokitLike,\n',
              '  type FlowcordiaProposalOctokitLike,\n  type GitHubProposalResult,\n',
          )
          replace(
              "apps/webapp/app/features/flowcordia/proposals/github.server.ts",
              '''  return {
              create: governedSourcePatches.create.bind(governedSourcePatches),
              submit: proposals.submit.bind(proposals),
              promote: proposals.promote.bind(proposals),
            };
          ''',
              '''  const create: GitHubProposalGateway["create"] = async (input) => {
              const created = await governedSourcePatches.create(input);
              if (!created.success) return created;
              const manifest = await closureStore.read({
                scope: {
                  ...input.scope,
                  repository: { ...input.scope.repository, branch: created.value.proposal.branch },
                },
                proposalId: input.proposalId,
                revision: created.value.proposal.headSha,
              });
              if (!manifest.success) {
                const code =
                  manifest.error.code === "access_denied"
                    ? "access_denied"
                    : manifest.error.code === "rate_limited"
                      ? "rate_limited"
                      : manifest.error.code === "conflict"
                        ? "conflict"
                        : "unavailable";
                return {
                  success: false,
                  error: {
                    code,
                    operation: "create",
                    phase: "workflow",
                    message: "Exact proposal closure identity could not be recovered from the final head.",
                    retryable: manifest.error.retryable,
                    repository: input.scope.repository,
                    proposalId: input.proposalId,
                    proposalBranch: created.value.proposal.branch,
                    pullRequestNumber: created.value.proposal.pullRequestNumber,
                    requestId: manifest.error.requestId,
                    retryAfterMs: manifest.error.retryAfterMs,
                  },
                } satisfies GitHubProposalResult<never>;
              }
              if (
                manifest.value.manifest.proposalId !== input.proposalId ||
                manifest.value.manifest.rootWorkflowId !== input.workflow.id ||
                manifest.value.manifest.baseCommitSha !== input.expectedBaseCommitSha
              ) {
                return {
                  success: false,
                  error: {
                    code: "proposal_collision",
                    operation: "create",
                    phase: "workflow",
                    message: "Final proposal closure identity does not match the requested proposal.",
                    retryable: false,
                    repository: input.scope.repository,
                    proposalId: input.proposalId,
                    proposalBranch: created.value.proposal.branch,
                    pullRequestNumber: created.value.proposal.pullRequestNumber,
                  },
                };
              }
              return {
                success: true,
                value: {
                  ...created.value,
                  closure: {
                    schemaVersion: manifest.value.manifest.schemaVersion,
                    digest: manifest.value.manifest.closureDigest,
                    workflowIds: manifest.value.manifest.entries.map((entry) => entry.workflowId),
                  },
                },
              };
            };
            return {
              create,
              submit: proposals.submit.bind(proposals),
              promote: proposals.promote.bind(proposals),
            };
          ''',
          )

          write("apps/webapp/app/features/flowcordia/workflows/preview/closure-installation.ts", '''import {
            proposalClosureIdentityState,
            type ProposalClosureIdentity,
            type WorkflowProposalAggregate,
          } from "@flowcordia/control-plane";

          export interface FlowcordiaPreviewClosureProof {
            state: "NOT_RECORDED" | "INVALID" | "WAITING" | "READY";
            schemaVersion: string | null;
            digest: string | null;
            expectedCount: number;
            installedCount: number;
            missingWorkflowIds: string[];
          }

          export function flowcordiaClosureTaskIdentifier(workflowId: string): string {
            return `flowcordia-${workflowId}`;
          }

          export function resolveFlowcordiaPreviewClosureExpectation(
            proposal: Pick<
              WorkflowProposalAggregate,
              | "workflowId"
              | "closureSchemaVersion"
              | "closureDigest"
              | "closureWorkflowIds"
            >
          ):
            | { success: true; identity: ProposalClosureIdentity; taskIdentifiers: string[] }
            | { success: false; proof: FlowcordiaPreviewClosureProof } {
            const closure = proposalClosureIdentityState(proposal);
            if (closure.state !== "RECORDED") {
              return {
                success: false,
                proof: {
                  state: closure.state,
                  schemaVersion: proposal.closureSchemaVersion,
                  digest: proposal.closureDigest,
                  expectedCount: proposal.closureWorkflowIds.length,
                  installedCount: 0,
                  missingWorkflowIds: [],
                },
              };
            }
            return {
              success: true,
              identity: closure.identity,
              taskIdentifiers: closure.identity.workflowIds.map(flowcordiaClosureTaskIdentifier),
            };
          }

          export function evaluateFlowcordiaPreviewClosureInstallation(input: {
            proposal: Pick<
              WorkflowProposalAggregate,
              | "workflowId"
              | "closureSchemaVersion"
              | "closureDigest"
              | "closureWorkflowIds"
            >;
            installedTaskIdentifiers: readonly string[];
          }): FlowcordiaPreviewClosureProof {
            const expected = resolveFlowcordiaPreviewClosureExpectation(input.proposal);
            if (!expected.success) return expected.proof;
            const counts = new Map<string, number>();
            for (const identifier of input.installedTaskIdentifiers) {
              if (!expected.taskIdentifiers.includes(identifier)) continue;
              counts.set(identifier, (counts.get(identifier) ?? 0) + 1);
            }
            if ([...counts.values()].some((count) => count > 1)) {
              return {
                state: "INVALID",
                schemaVersion: expected.identity.schemaVersion,
                digest: expected.identity.digest,
                expectedCount: expected.identity.workflowIds.length,
                installedCount: [...counts.values()].filter((count) => count === 1).length,
                missingWorkflowIds: [],
              };
            }
            const missingWorkflowIds = expected.identity.workflowIds.filter(
              (workflowId) => counts.get(flowcordiaClosureTaskIdentifier(workflowId)) !== 1
            );
            return {
              state: missingWorkflowIds.length === 0 ? "READY" : "WAITING",
              schemaVersion: expected.identity.schemaVersion,
              digest: expected.identity.digest,
              expectedCount: expected.identity.workflowIds.length,
              installedCount: expected.identity.workflowIds.length - missingWorkflowIds.length,
              missingWorkflowIds,
            };
          }
          ''')

          write("apps/webapp/app/features/flowcordia/workflows/preview/query.server.ts", '''import type { WorkflowIndexScope } from "../index/types";
          import { prisma } from "~/db.server";
          import { flowcordiaProposalStore } from "../../proposals/prisma.server";
          import {
            evaluateFlowcordiaPreviewClosureInstallation,
            resolveFlowcordiaPreviewClosureExpectation,
          } from "./closure-installation";
          import { flowcordiaPreviewRunIdempotencyPrefix, selectFlowcordiaPreviewRun } from "./identity";
          import { presentFlowcordiaPreview } from "./presentation";

          export async function queryFlowcordiaPreview(input: {
            scope: WorkflowIndexScope;
            workflowId: string;
          }) {
            const [proposals, connection] = await Promise.all([
              flowcordiaProposalStore.listProposals({
                tenantId: input.scope.tenantId,
                projectId: input.scope.projectId,
                repositoryId: input.scope.repositoryId,
                limit: 100,
              }),
              prisma.connectedGithubRepository.findFirst({
                where: {
                  projectId: input.scope.projectId,
                  repositoryId: input.scope.repositoryId,
                  project: { organizationId: input.scope.tenantId, deletedAt: null },
                },
                select: { previewDeploymentsEnabled: true },
              }),
            ]);
            const workflowProposals = proposals.filter(
              (candidate) => candidate.workflowId === input.workflowId
            );
            const proposal =
              workflowProposals.find((candidate) => !["MERGED", "CLOSED"].includes(candidate.state)) ??
              workflowProposals[0] ??
              null;
            const environment = proposal
              ? await prisma.runtimeEnvironment.findFirst({
                  where: {
                    organizationId: input.scope.tenantId,
                    projectId: input.scope.projectId,
                    type: "PREVIEW",
                    parentEnvironmentId: { not: null },
                    branchName: proposal.proposalBranch,
                    archivedAt: null,
                  },
                  select: { id: true, branchName: true },
                })
              : null;
            const deployment =
              environment && proposal?.headSha
                ? await prisma.workerDeployment.findFirst({
                    where: {
                      projectId: input.scope.projectId,
                      environmentId: environment.id,
                      commitSHA: proposal.headSha,
                    },
                    orderBy: { createdAt: "desc" },
                    select: {
                      shortCode: true,
                      version: true,
                      status: true,
                      commitSHA: true,
                      createdAt: true,
                      deployedAt: true,
                      workerId: true,
                    },
                  })
                : null;
            const closureExpectation = proposal
              ? resolveFlowcordiaPreviewClosureExpectation(proposal)
              : null;
            const installedTasks =
              environment && deployment?.workerId && closureExpectation?.success
                ? await prisma.backgroundWorkerTask.findMany({
                    where: {
                      projectId: input.scope.projectId,
                      runtimeEnvironmentId: environment.id,
                      workerId: deployment.workerId,
                      slug: { in: closureExpectation.taskIdentifiers },
                    },
                    select: { slug: true },
                  })
                : [];
            const closure = proposal
              ? evaluateFlowcordiaPreviewClosureInstallation({
                  proposal,
                  installedTaskIdentifiers: installedTasks.map((task) => task.slug),
                })
              : null;
            const expectedRunIdentity =
              proposal?.headSha && deployment?.workerId && closure?.state === "READY"
                ? {
                    workflowId: input.workflowId,
                    proposalId: proposal.proposalId,
                    headSha: proposal.headSha,
                  }
                : null;
            const runs =
              environment && deployment?.workerId && expectedRunIdentity
                ? await prisma.taskRun.findMany({
                    where: {
                      projectId: input.scope.projectId,
                      runtimeEnvironmentId: environment.id,
                      taskIdentifier: `flowcordia-${input.workflowId}`,
                      lockedToVersionId: deployment.workerId,
                      idempotencyKey: {
                        startsWith: flowcordiaPreviewRunIdempotencyPrefix(expectedRunIdentity),
                      },
                    },
                    orderBy: { createdAt: "desc" },
                    take: 20,
                    select: {
                      friendlyId: true,
                      status: true,
                      metadata: true,
                      createdAt: true,
                      startedAt: true,
                      completedAt: true,
                      lockedToVersionId: true,
                    },
                  })
                : [];
            const run = expectedRunIdentity ? selectFlowcordiaPreviewRun(runs, expectedRunIdentity) : null;

            return presentFlowcordiaPreview({
              workflowId: input.workflowId,
              previewDeploymentsEnabled: connection?.previewDeploymentsEnabled ?? false,
              proposal,
              environment,
              deployment,
              closure,
              run,
            });
          }
          ''')

          write("apps/webapp/app/features/flowcordia/workflows/preview/trigger.server.ts", '''import type { ControlPlaneScope } from "@flowcordia/control-plane";
          import type { JsonValue } from "@flowcordia/workflow";
          import { prisma } from "~/db.server";
          import { authIncludeBase, toAuthenticated } from "~/models/runtimeEnvironment.server";
          import { TriggerTaskService } from "~/v3/services/triggerTask.server";
          import { flowcordiaProposalStore } from "../../proposals/prisma.server";
          import {
            evaluateFlowcordiaPreviewClosureInstallation,
            resolveFlowcordiaPreviewClosureExpectation,
          } from "./closure-installation";
          import { flowcordiaPreviewRunIdempotencyKey, flowcordiaPreviewRunSeedMetadata } from "./identity";

          export type FlowcordiaPreviewRunErrorCode =
            | "preview_not_ready"
            | "proposal_conflict"
            | "closure_not_deployed"
            | "task_not_deployed"
            | "trigger_failed";

          export class FlowcordiaPreviewRunError extends Error {
            constructor(
              readonly code: FlowcordiaPreviewRunErrorCode,
              message: string,
              readonly status: number,
              readonly retryable: boolean
            ) {
              super(message);
              this.name = "FlowcordiaPreviewRunError";
            }
          }

          export async function triggerFlowcordiaPreviewRun(input: {
            scope: ControlPlaneScope;
            workflowId: string;
            expectedHeadSha: string;
            requestId: string;
            payload: JsonValue;
          }) {
            const proposals = await flowcordiaProposalStore.listProposals({
              tenantId: input.scope.tenantId,
              projectId: input.scope.projectId,
              repositoryId: input.scope.repositoryId,
              limit: 100,
            });
            const proposal = proposals.find(
              (candidate) =>
                candidate.workflowId === input.workflowId &&
                candidate.headSha === input.expectedHeadSha &&
                !["MERGED", "CLOSED", "FAILED"].includes(candidate.state)
            );
            if (!proposal) {
              throw new FlowcordiaPreviewRunError(
                "proposal_conflict",
                "The proposal head changed. Refresh Studio before starting a live preview run.",
                409,
                false
              );
            }

            const closureExpectation = resolveFlowcordiaPreviewClosureExpectation(proposal);
            if (!closureExpectation.success) {
              throw new FlowcordiaPreviewRunError(
                "closure_not_deployed",
                closureExpectation.proof.state === "NOT_RECORDED"
                  ? "Republish this proposal to record its immutable workflow closure."
                  : "The stored proposal closure identity is invalid.",
                409,
                false
              );
            }

            const environment = await prisma.runtimeEnvironment.findFirst({
              where: {
                organizationId: input.scope.tenantId,
                projectId: input.scope.projectId,
                type: "PREVIEW",
                parentEnvironmentId: { not: null },
                branchName: proposal.proposalBranch,
                archivedAt: null,
              },
              include: authIncludeBase,
            });
            if (!environment) {
              throw new FlowcordiaPreviewRunError(
                "preview_not_ready",
                "The proposal preview environment is not ready yet.",
                409,
                true
              );
            }

            const deployment = await prisma.workerDeployment.findFirst({
              where: {
                projectId: input.scope.projectId,
                environmentId: environment.id,
                commitSHA: input.expectedHeadSha,
                status: "DEPLOYED",
                workerId: { not: null },
              },
              orderBy: { createdAt: "desc" },
              select: { version: true, workerId: true },
            });
            if (!deployment?.workerId) {
              throw new FlowcordiaPreviewRunError(
                "preview_not_ready",
                "The exact proposal head has not finished deploying.",
                409,
                true
              );
            }

            const installedTasks = await prisma.backgroundWorkerTask.findMany({
              where: {
                projectId: input.scope.projectId,
                runtimeEnvironmentId: environment.id,
                workerId: deployment.workerId,
                slug: { in: closureExpectation.taskIdentifiers },
              },
              select: { slug: true },
            });
            const closure = evaluateFlowcordiaPreviewClosureInstallation({
              proposal,
              installedTaskIdentifiers: installedTasks.map((task) => task.slug),
            });
            if (closure.state !== "READY") {
              throw new FlowcordiaPreviewRunError(
                "closure_not_deployed",
                closure.state === "WAITING"
                  ? "The preview worker has not installed every workflow in this proposal closure."
                  : "The preview worker task inventory conflicts with the proposal closure.",
                409,
                closure.state === "WAITING"
              );
            }

            const taskIdentifier = `flowcordia-${input.workflowId}`;
            try {
              const runIdentity = {
                workflowId: input.workflowId,
                proposalId: proposal.proposalId,
                headSha: input.expectedHeadSha,
              };
              const idempotencyKey = flowcordiaPreviewRunIdempotencyKey(runIdentity, input.requestId);
              const result = await new TriggerTaskService().call(
                taskIdentifier,
                toAuthenticated(environment),
                {
                  payload: JSON.stringify(input.payload),
                  options: {
                    payloadType: "application/json",
                    lockToVersion: deployment.version,
                    idempotencyKey,
                    idempotencyKeyTTL: "10m",
                    metadata: {
                      flowcordiaTrigger: flowcordiaPreviewRunSeedMetadata(runIdentity),
                    },
                  },
                },
                {
                  idempotencyKey,
                  idempotencyKeyExpiresAt: new Date(Date.now() + 10 * 60 * 1000),
                  triggerSource: "dashboard",
                  triggerAction: "flowcordia_preview",
                }
              );
              if (!result) {
                throw new FlowcordiaPreviewRunError(
                  "task_not_deployed",
                  "The generated Flowcordia root task is unavailable in this deployment.",
                  409,
                  true
                );
              }
              return { friendlyId: result.run.friendlyId, cached: result.isCached };
            } catch (error) {
              if (error instanceof FlowcordiaPreviewRunError) throw error;
              throw new FlowcordiaPreviewRunError(
                "trigger_failed",
                "The live preview run could not be started.",
                503,
                true
              );
            }
          }
          ''')

          path = "apps/webapp/app/features/flowcordia/workflows/preview/presentation.ts"
