              GitHubProposalResult<CreateGitHubProposalValue & { closure: ProposalClosureIdentity }>
            >;
          ''',
          )

          replace(
              "packages/flowcordia-control-plane/src/aggregate/state.ts",
              '    desiredWorkflowSha256: workflowSha256(input.workflow),\n',
              '''    desiredWorkflowSha256: workflowSha256(input.workflow),
              closureSchemaVersion: null,
              closureDigest: null,
              closureWorkflowIds: [],
          ''',
          )

          replace(
              "packages/flowcordia-control-plane/src/service.ts",
              'import { ProposalConcurrencyError } from "./repository/errors.js";\n',
              'import { normalizeProposalClosureIdentity } from "./proposal/closure.js";\nimport { ProposalConcurrencyError } from "./repository/errors.js";\n',
          )
          replace(
              "packages/flowcordia-control-plane/src/service.ts",
              '  ProposalListQuery,\n',
              '  ProposalClosureIdentity,\n  ProposalListQuery,\n',
          )
          replace(
              "packages/flowcordia-control-plane/src/service.ts",
              '''      command.actorId,
              command.correlationId
            );
            if (!persisted.success) return persisted;
            return {
              success: true,
              value: { proposal: persisted.value, github: result.value.proposal, resumed },
          ''',
              '''      command.actorId,
              command.correlationId,
              result.value.closure
            );
            if (!persisted.success) return persisted;
            return {
              success: true,
              value: { proposal: persisted.value, github: result.value.proposal, resumed },
          ''',
          )
          replace(
              "packages/flowcordia-control-plane/src/service.ts",
              '''    expectedActorId: string,
              expectedCorrelationId: string
            ): Promise<ControlPlaneResult<WorkflowProposalAggregate>> {
          ''',
              '''    expectedActorId: string,
              expectedCorrelationId: string,
              closure?: ProposalClosureIdentity
            ): Promise<ControlPlaneResult<WorkflowProposalAggregate>> {
          ''',
          )
          replace(
              "packages/flowcordia-control-plane/src/service.ts",
              '''        if (
                  !current ||
                  !receiptIdentityMatches(
          ''',
              '''        const normalizedClosure =
                  receipt.operation === "create"
                    ? normalizeProposalClosureIdentity(closure, current?.workflowId ?? proposal.workflowId)
                    : null;
                if (
                  !current ||
                  (receipt.operation === "create" && !normalizedClosure?.success) ||
                  !receiptIdentityMatches(
          ''',
