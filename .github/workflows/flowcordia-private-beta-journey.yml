name: "Flowcordia private beta author journey"

on:
  workflow_dispatch:
    inputs:
      studio_path:
        description: "Relative Flowcordia Studio path without query parameters"
        required: true
        type: string
      workflow_id:
        description: "Exact public workflow ID"
        required: true
        type: string
      replacement_name:
        description: "Bounded workflow name used for the reviewed proposal"
        required: true
        type: string
      application_commit_sha:
        description: "Exact deployed Flowcordia application commit"
        required: true
        type: string
      repository_maintainer_account:
        description: "Whether the acceptance browser account maintains the connected repository"
        required: true
        type: choice
        options:
          - "false"
          - "true"
      assistance_count:
        description: "Maintainer interventions after the run begins; must be 0"
        required: true
        type: string
      confirmation:
        description: "Type STANDARD_NON_MAINTAINER_ZERO_INTERVENTION"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: flowcordia-private-beta-author-${{ inputs.workflow_id }}
  cancel-in-progress: false

jobs:
  author-journey:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: flowcordia-private-beta
    env:
      FLOWCORDIA_PRIVATE_BETA_CONFIRMATION: ${{ inputs.confirmation }}
      FLOWCORDIA_PRIVATE_BETA_REPOSITORY_MAINTAINER: ${{ inputs.repository_maintainer_account }}
      FLOWCORDIA_PRIVATE_BETA_ASSISTANCE_COUNT: ${{ inputs.assistance_count }}
      FLOWCORDIA_PRIVATE_BETA_BASE_URL: ${{ secrets.FLOWCORDIA_PRIVATE_BETA_BASE_URL }}
      FLOWCORDIA_PRIVATE_BETA_STUDIO_PATH: ${{ inputs.studio_path }}
      FLOWCORDIA_PRIVATE_BETA_WORKFLOW_ID: ${{ inputs.workflow_id }}
      FLOWCORDIA_PRIVATE_BETA_REPLACEMENT_NAME: ${{ inputs.replacement_name }}
      FLOWCORDIA_PRIVATE_BETA_EXPECTED_APPLICATION_COMMIT_SHA: ${{ inputs.application_commit_sha }}
      FLOWCORDIA_PRIVATE_BETA_PAYLOAD_JSON: ${{ secrets.FLOWCORDIA_PRIVATE_BETA_PAYLOAD_JSON }}
      FLOWCORDIA_PRIVATE_BETA_STORAGE_STATE_B64: ${{ secrets.FLOWCORDIA_PRIVATE_BETA_STORAGE_STATE_B64 }}
      FLOWCORDIA_PRIVATE_BETA_TIMEOUT_SECONDS: "1200"

    steps:
      - name: Checkout exact acceptance harness
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20.20.2
          cache: pnpm

      - name: Prepare private browser and evidence files
        shell: bash
        run: |
          set -euo pipefail
          private_dir="$(mktemp -d "$RUNNER_TEMP/flowcordia-private-beta.XXXXXX")"
          chmod 700 "$private_dir"
          storage_path="$private_dir/storage-state.json"
          evidence_path="$private_dir/evidence.json"
          output_path="$private_dir/playwright-output"
          {
            echo "FLOWCORDIA_PRIVATE_BETA_PRIVATE_DIR=$private_dir"
            echo "FLOWCORDIA_PRIVATE_BETA_STORAGE_STATE_PATH=$storage_path"
            echo "FLOWCORDIA_PRIVATE_BETA_EVIDENCE_PATH=$evidence_path"
            echo "FLOWCORDIA_PRIVATE_BETA_OUTPUT_DIR=$output_path"
          } >> "$GITHUB_ENV"
          EVIDENCE_PATH="$evidence_path" node -e '
            const fs = require("node:fs");
            const workflowId = /^[a-z][a-z0-9_-]{2,127}$/.test(process.env.FLOWCORDIA_PRIVATE_BETA_WORKFLOW_ID || "")
              ? process.env.FLOWCORDIA_PRIVATE_BETA_WORKFLOW_ID
              : "invalid_workflow";
            const now = new Date().toISOString();
            fs.writeFileSync(process.env.EVIDENCE_PATH, JSON.stringify({
              schemaVersion: "0.2",
              mode: "private_beta_author_journey",
              result: "FAILED",
              stage: "configuration",
              workflowId,
              startedAt: now,
              completedAt: now,
              failure: {
                code: "INVALID_CONFIGURATION",
                message: "Private beta author journey configuration is invalid."
              }
            }, null, 2) + "\n", { mode: 0o600 });
          '
          [[ "$GITHUB_REF" == "refs/heads/main" ]]
          [[ "$FLOWCORDIA_PRIVATE_BETA_CONFIRMATION" == "STANDARD_NON_MAINTAINER_ZERO_INTERVENTION" ]]
          [[ "$FLOWCORDIA_PRIVATE_BETA_REPOSITORY_MAINTAINER" == "false" ]]
          [[ "$FLOWCORDIA_PRIVATE_BETA_ASSISTANCE_COUNT" == "0" ]]
          [[ "$FLOWCORDIA_PRIVATE_BETA_WORKFLOW_ID" =~ ^[a-z][a-z0-9_-]{2,127}$ ]]
          [[ "$FLOWCORDIA_PRIVATE_BETA_EXPECTED_APPLICATION_COMMIT_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ -n "$FLOWCORDIA_PRIVATE_BETA_BASE_URL" ]]
          [[ -n "$FLOWCORDIA_PRIVATE_BETA_PAYLOAD_JSON" ]]
          [[ -n "$FLOWCORDIA_PRIVATE_BETA_STORAGE_STATE_B64" ]]
          printf '%s' "$FLOWCORDIA_PRIVATE_BETA_STORAGE_STATE_B64" | base64 --decode > "$storage_path"
          chmod 600 "$storage_path"
          node -e 'const fs=require("node:fs"); const value=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); if (!value || typeof value!=="object" || !Array.isArray(value.cookies) || !Array.isArray(value.origins)) process.exit(1);' "$storage_path"

      - name: Install repository dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Install isolated Chromium runtime
        run: pnpm exec playwright install --with-deps chromium

      - name: Run standard-account author journey
        run: pnpm exec playwright test --config=playwright.flowcordia-private-beta.config.ts

      - name: Upload sanitized journey evidence only
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flowcordia-private-beta-author-${{ github.run_id }}
          path: ${{ env.FLOWCORDIA_PRIVATE_BETA_EVIDENCE_PATH }}
          if-no-files-found: error
          retention-days: 30
          include-hidden-files: false

      - name: Remove private browser state and transient output
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          case "${FLOWCORDIA_PRIVATE_BETA_PRIVATE_DIR:-}" in
            "$RUNNER_TEMP"/flowcordia-private-beta.*)
              rm -rf -- "$FLOWCORDIA_PRIVATE_BETA_PRIVATE_DIR"
              ;;
            "")
              ;;
            *)
              echo "Refusing to remove an unexpected private-beta path." >&2
              exit 1
              ;;
          esac
