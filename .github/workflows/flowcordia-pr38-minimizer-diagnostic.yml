name: "Flowcordia PR38 minimizer diagnostic"

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/flowcordia-pr38-minimizer-diagnostic.yml"

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'agent/flowcordia-pr38-connected-acceptance-harness'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Capture minimizer output
        shell: bash
        run: |
          mkdir -p diagnostics
          sed -i 's#origin/main#7170f1a37f3ec7adda71d7cc937af8926dd189f2#' \
            scripts/flowcordia-pr38-minimize-studio-diff.py
          set +e
          python scripts/flowcordia-pr38-minimize-studio-diff.py > diagnostics/minimizer.log 2>&1
          status=$?
          echo "status=$status" >> diagnostics/minimizer.log
          cat diagnostics/minimizer.log
          exit 0

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flowcordia-pr38-minimizer-diagnostic
          path: diagnostics/minimizer.log
          retention-days: 1
